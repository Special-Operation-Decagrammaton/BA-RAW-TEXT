[translation]
10018-100180010 = "선생님은 휴식 시간에는 어디서 시간을 보내시나요?"
10018-100180020 = "샬레 생활관."
10018-100180030 = "화장실."
10018-100180040 = "그렇군요. 확실히 샬레 생활관에는 쉬기 편한 공간이 많으니까요."
10018-100180050 = "……조금 습하긴 해도 나쁘지 않은 공간이네요."
10018-100180060 = "저는…… 사람이 지나다니지 않는 어둡고 그늘진 장소가 좋아요."
10018-100180070 = "아무에게도 방해받지 않는 저만의 안식처……."
10018-100180080 = "그곳에 있으면 마음이 편안해져서, 얼마든지 머무를 수 있어요."
10018-100180090 = "선생님, 다음부터는 다른 캐비닛을 알아봐 주세요……."
10018-100180100 = "게임개발부의 캐비닛은 제 전용 캐비닛이에요."
10018-100180110 = "유즈의 캐비닛이 좋아."
10018-100180120 = "그렇게 말씀하셔도……."
10018-100180130 = "안 되는 건 안 된다고요."
10018-100180140 = "선생님은 어떤 종류의 게임을 좋아하세요?"
10018-100180150 = "콘솔 게임이 좋아."
10018-100180160 = "아케이드 게임이 좋아."
10018-100180170 = "저는 게임이라면 대부분 좋아하지만,"
10018-100180180 = "다른 사람들과 협력해서 플레이해야 하는 온라인 게임만큼은 어쩐지 대화가 부담스러워서……"
10018-100180190 = "그다지 즐기지는 않아요."
10018-100180200 = "그래도 대전 격투 게임만큼은 괜찮아요."
10018-100180210 = "대전 격투 게임?"
10018-100180220 = "네, 대전 격투 게임은 직접 대화를 나누지 않더라도 충분히 즐길 수 있으니까요."
10018-100180230 = "안 그래도 이번에 좋아하는 게임사에서 새로운 신작 대전 격투 게임이 나온다고 해서 기대하고 있답니다."
10018-100180240 = "뭔가 유즈와는 어울리지 않는 장르의 게임이네."
10018-100180250 = "그런가요? 저는 잘 모르겠어요……."
10018-100180260 = "게임을 개발하는 데 이렇게 많은 돈이 필요할 줄은 예전에는 미처 몰랐어요."
10018-100180270 = "저번 개발 때는 서버를 유지할 돈이 부족해서"
10018-100180280 = "중간에 데이터가 날아가는 일도 있었을 정도니……."
10018-100180290 = "(ﾟﾛﾟ;) 큰일이잖아. 그래서 어떻게 되었어?"
10018-100180300 = "다행히 백업해 둔 자료가 있어서 데이터를 완전히 날리지는 않았지만,"
10018-100180310 = "사흘 치의 작업이 물거품이 되고 말았어요."
10018-100180320 = "게임 개발의 세계는 냉혹하구나."
10018-100180330 = "네……."
10018-100180340 = "차기작을 개발할 때는 같은 실수를 반복하지 않도록"
10018-100180350 = "미리 부지런히 개발비를 모아둬야겠어요."
10018-100180360 = "지난번에 한 아르바이트는 최악이었어요."
10018-100180370 = "손님 앞에만 서면 자꾸 몸이 얼어붙어서 실수만 연발하고……."
10018-100180380 = "점장님도 괜찮다고는 하셨지만, 분명 크게 실망하셨을 거예요."
10018-100180390 = "그럼 다른 새로운 아르바이트를 해보지 않을래?"
10018-100180400 = "네? 새로운 아르바이트요……?"
10018-100180410 = "무, 무리예요! 지난번의 편의점 아르바이트도 겨우 해냈는걸요……."
10018-100180420 = "괜찮아. 이번 아르바이트는 사람의 얼굴을 직접 보지 않아도 할 수 있거든."
10018-100180430 = "사람의 얼굴을 직접 보지 않아도 할 수 있는 아르바이트……."
10018-100180440 = "그, 그렇다면 괜찮을지도……."
10018-100180450 = "선생님, 이번 달의 아르바이트 급여를 받았어요!"
10018-100180460 = "생각보다 높은 액수를 받아서 남는 돈으로 부원들에게 선물도 할 수 있었답니다."
10018-100180470 = "('‿') 좋은 일이네. 축하해!"
10018-100180480 = "저…… 괜찮으시다면 이번 주말에 제가 일하는 놀이공원으로 와 주시지 않으시겠어요?"
10018-100180490 = "놀이공원에? 갑자기 왜?"
10018-100180500 = "……선생님께도 드리고 싶은 선물이 있어요."
10018-100180510 = "선물은 주지 않아도 괜찮은데."
10018-100180520 = "아뇨. 이번에는 꼭 선생님과 같이……."
10018-100180530 = "아니,"
10018-100180540 = "선생님께 꼭 선물을 드리고 싶어요!"
10018-100180550 = "그러니까 이번 주말에는 꼭 놀이공원으로 와 주세요!"
10018-100180570 = "선물해드린 티켓을 바로 돌려주시다니……."
10018-100180580 = "무슨 시키실 일이라도 있으신가요, 선생님?"
10018-100180590 = "샬레에 오는 길에 빵하고 우유 좀 사다 줘."
10018-100180600 = "뭐든지라고는 했지만 겨우 이런 일에 자유이용권을 쓰지 말아 주세요!"
10018-100180610 = "이 정도는 그냥 부탁해도 사다 드릴 수 있다고요!"
10018-100180620 = "잃어버렸다고 생각한 물건은"
10018-100180630 = "꼭 예상치 못한 의외의 장소에서"
10018-100180640 = "나오는 경우가 많은 것 같아요."
10018-100180650 = "아, 알 것 같아."
10018-100180660 = "리모콘처럼 자주 쓰는 물건이라면 더더욱……"
10018-100180670 = "물론 실제로는 단순히"
10018-100180680 = "물건을 둔 장소를 잊어버렸을 가능성이"
10018-100180690 = "높지만요."
10018-100180700 = "하지만 다른 사람들도"
10018-100180710 = "비슷한 경험을 자주 겪었는지"
10018-100180720 = "옛날에는 이런 일이 생기면"
10018-100180730 = "장난꾸러기 요정이 물건을 훔쳐 갔다고"
10018-100180740 = "여겼다네요."
10018-100180750 = "흥미로운 이야기네."
10018-100180760 = "그나저나 그런 화제를 꺼내는 걸 보니"
10018-100180770 = "뭔가 잃어버린 물건이라도 있는 거야?"
10018-100180780 = "아뇨"
10018-100180790 = "……사실 뭔가 잃어버렸다 하더라도"
10018-100180800 = "지금은 기억할 수 없을 것 같아요."

[translation]
10018-100180010 = "ตอนช่วงว่างๆ คุณครูมักอยู่ที่ไหน\nเหรอคะ?"
10018-100180020 = "ที่พักชาเล่ต์"
10018-100180030 = "ห้องน้ำ..."
10018-100180040 = "งั้นเหรอคะ คือว่า ในที่พักชาเล่ต์มีพื้น\nที่ให้พักผ่อนเยอะมั้ยคะ?"
10018-100180050 = "ถึงจะรู้สึกชื้นๆ ไปบ้าง แต่ก็ไม่แย่\nเท่าไหร่ค่ะ"
10018-100180060 = "สำหรับฉัน... ฉันชอบที่มืดๆ ที่คนไม่\nค่อยพลุกพล่านค่ะ"
10018-100180070 = "สถานที่ที่เป็นของฉันเอง และไม่มี\nใครมารบกวน..."
10018-100180080 = "ถ้าอยู่ที่แบบนั้นล่ะก็คงสบายใจขึ้น\nให้อยู่นานแค่ไหนก็ได้ค่ะ"
10018-100180090 = "คุณครูคะ คราวหน้ารบกวนหาตู้อัน\nใหม่แทนนะคะ"
10018-100180100 = "ตู้เก็บของที่ชมรมพัฒนาเกมน่ะ เป็นตู้\nที่ฉันใช้คนเดียวค่ะ"
10018-100180110 = "แต่ครูชอบตู้ของยูสึนะ"
10018-100180120 = "ถ้าคุณครูพูดแบบนั้น..."
10018-100180130 = "ฉันก็คงต้องยอมแบ่งให้ใช้ค่ะ "
10018-100180140 = "คุณครูชอบเกมแบบไหนเหรอคะ?"
10018-100180150 = "ครูชอบเกมคอนโซลน่ะ"
10018-100180160 = "ครูชอบเล่นพวกเกมตู้น่ะ"
10018-100180170 = "สำหรับฉันแล้ว ถ้าเป็นเกม ส่วนใหญ่\nฉันก็ชอบทั้งหมดค่ะ"
10018-100180180 = "แต่ฉันมักรู้สึกไม่ชอบการพูดคุย\nเหมือนกับตอนที่เล่นเกมออนไลน์\nแล้วต้องไปปาร์ตี้กับคนอื่นๆ...."
10018-100180190 = "แบบนั้นมันไม่สนุกเท่าไหร่เลยค่ะ"
10018-100180200 = "แต่ถ้าเป็นเกมต่อสู้ล่ะก็พอไหวอยู่ค่ะ"
10018-100180210 = "เกมการต่อสู้งั้นเหรอ?"
10018-100180220 = "ค่ะ ถ้าเป็นเกมต่อสู้ ถึงไม่ต้องคุยกัน\nแต่ก็สามารถเล่นด้วยกันได้แบบสนุก\nนี่คะ"
10018-100180230 = "ที่จริงฉันกำลังตั้งตารอให้เกมต่อสู้\nที่ฉันชอบตัวใหม่เปิดตัวอยู่ค่ะ"
10018-100180240 = "ดูเป็นเกมที่ยูสึไม่น่าจะเล่นเลยนะ"
10018-100180250 = "งั้นเหรอคะ? ไม่รู้สิคะ..."
10018-100180260 = "ฉันไม่รู้มาก่อนเลยว่าในการพัฒนา\nเกมจะต้องใช้เงินเยอะขนาดนี้ค่ะ"
10018-100180270 = "ตอนที่พัฒนาเกมครั้งที่แล้ว เราไม่มี\nเงินที่จะเช่าเซิร์ฟเวอร์ต่อ..."
10018-100180280 = "ระหว่างที่พัฒนาเกมอยู่ก็มีตอนที่\nข้อมูลหายเกลี้ยงเลยด้วยค่ะ..."
10018-100180290 = "(ﾟﾛﾟ;) เรื่องใหญ่เลยนะ\nแล้วเป็นยังไงบ้าง?"
10018-100180300 = "โชคดีที่มีข้อมูลสำรองไว้นิดหน่อย\nเลยพอกู้กลับมาได้บ้างค่ะ"
10018-100180310 = "แต่รู้สึกเหมือนความพยายามตลอด\nสามวันสามคืนของฉัน... มันปลิวหาย\nวั๊บไปเลยค่ะ"
10018-100180320 = "โลกแห่งการพัฒนาเกมนี่มัน\nโหดร้ายจริงๆ เลยนะ"
10018-100180330 = "ค่ะ..."
10018-100180340 = "และเพื่อให้ตอนที่พัฒนาเกมต่อไป\nไม่เกิดปัญหาซ้ำรอยอีก"
10018-100180350 = "เลยต้องเตรียมเงินค่าพัฒนาเกมเอา\nไว้ให้พอล่วงหน้าค่ะ"
10018-100180360 = "งานพิเศษคราวที่แล้วเลวร้ายสุดๆ\nเลยค่ะ"
10018-100180370 = "พอฉันไปยืนต่อหน้าลูกค้าแล้ว ตัวมันก็\nรู้สึกแข็งทื่อจนทำพลาดไปหมดเลย..."
10018-100180380 = "ถึงคุณผู้จัดการจะบอกว่าไม่เป็นอะไร\nแต่เขาคงผิดหวังมากแน่ๆ เลยค่ะ"
10018-100180390 = "ถ้างั้นไม่ลองหางานพิเศษแบบอื่นดูล่ะ?"
10018-100180400 = "คะ? งานพิเศษงานใหม่เหรอคะ?"
10018-100180410 = "มะ...ไม่ไหวหรอกค่ะ! ตอนที่ไปทำ\nงานพิเศษที่ร้านสะดวกซื้อก็เกือบจะ\nไม่รอดเลยค่ะ"
10018-100180420 = "ไม่เป็นไรหรอก รอบนี้เป็นงานที่ไม่ต้องไป\nเจอหน้าคนอื่นด้วยนะ"
10018-100180430 = "งานพิเศษที่ไม่ต้องเจอหน้าคนอื่น..."
10018-100180440 = "ถะ...ถ้างั้นก็อาจจะไม่เป็นไรก็ได้ค่ะ..."
10018-100180450 = "คุณครูคะ ฉันได้ค่าจ้างจากงานพิเศษ\nมาแล้วค่ะ!"
10018-100180460 = "พอดีได้ค่าจ้างมามากกว่าที่คิด เลยคิด\nว่าคงจะเอาไปแบ่งเป็นค่าขนมให้กับ\nสมาชิกชมรมได้ด้วยค่ะ"
10018-100180470 = "('◡') ดีจังเลยน้า~ ดีใจด้วย!"
10018-100180480 = "คือ... ถ้าคุณครูไม่ว่าอะไร อาทิตย์นี้\nคุณครูช่วยมาที่สวนสนุกที่ฉันทำงาน\nได้มั้ยคะ?"
10018-100180490 = "ที่สวนสนุก? ทำไมเหรอ?"
10018-100180500 = "ฉันมีของขวัญที่อยากให้คุณครูน่ะค่ะ"
10018-100180510 = "ไม่ต้องให้ครูก็ได้นะ"
10018-100180520 = "ไม่ค่ะ คราวนี้ฉันกับคุณครูจะต้อง..."
10018-100180530 = "ไม่สิ "
10018-100180540 = "ฉันจะต้องให้ของขวัญคุณครูให้ได้ค่ะ"
10018-100180550 = "เพราะงั้นอาทิตย์นี้ช่วยมาที่สวนสนุก\nด้วยนะคะ!"
10018-100180570 = "คิดไม่ถึงเลยว่าคุณครูจะให้ตั๋วที่ฉันให้\nไปเป็นของขวัญคืนมาแบบนี้..."
10018-100180580 = "คุณครูมีภารกิจอะไรจะให้ฉันทำรึเปล่า\nคะ?"
10018-100180590 = "ถ้ามาที่ชาเล่ต์ ช่วยซื้อขนมปัง\nกับนมมาให้หน่อยนะ"
10018-100180600 = "ถึงฉันจะบอกว่าจะให้ทำอะไรก็ได้\nแต่อย่าใช้ตั๋วกับเรื่องแบบนี้สิคะ"
10018-100180610 = "เรื่องแบบนี้น่ะ แค่ไหว้วานกันก็พอค่ะ!"
10018-100180620 = "ของที่คิดว่าหายไปแล้ว"
10018-100180630 = "แต่มีหลายๆ ครั้งเลย"
10018-100180640 = "ที่บังเอิญเจอมันในที่ที่คาดไม่ถึงค่ะ"
10018-100180650 = "กะ... ก็พอเข้าใจได้นะ"
10018-100180660 = "โดยเฉพาะพวกของที่ใช้บ่อยๆ\nอย่างรีโมต"
10018-100180670 = "แน่นอนว่าในความเป็นจริง..."
10018-100180680 = "เรามักจะลืมสถานที่ที่เอาไปวางไว้"
10018-100180690 = "ได้ง่ายมากเลยค่ะ"
10018-100180700 = "แต่ว่าคนอื่นๆ เอง"
10018-100180710 = "เคยเจอเรื่องแบบนี้บ้างรึเปล่านะ"
10018-100180720 = "สมัยก่อนเวลาที่ของหายบ่อยๆ แบบนี้"
10018-100180730 = "ดูเหมือนจะเชื่อกันว่า"
10018-100180740 = "มีนางฟ้าจอมซนมาขโมยของไปค่ะ"
10018-100180750 = "น่าสนใจดีนะ"
10018-100180760 = "ว่าแต่ว่าที่พูดเรื่องนี้ขึ้นมาเนี่ย..."
10018-100180770 = "เผลอทำของอะไรหายรึเปล่า?"
10018-100180780 = "เปล่าค่ะ"
10018-100180790 = "ถึงฉันจะทำอะไรหายไปจริงๆ..."
10018-100180800 = "คิดว่าตอนนี้ก็จำไม่ได้แล้วละค่ะ"

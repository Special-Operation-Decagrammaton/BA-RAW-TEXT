[translation]
10018-100180010 = "Where do you spend your free time, Sensei?"
10018-100180020 = "In the Schale Residence Hall."
10018-100180030 = "In the bathroom."
10018-100180040 = "I see. There are lots of places to rest in the Schale Residence Hall."
10018-100180050 = "...It's a little humid in there, but I guess it's not so bad."
10018-100180060 = "As for me...I like dark, shady areas where there aren't too many people around."
10018-100180070 = "A quiet rest spot where no one will bother me..."
10018-100180080 = "I feel at peace when I'm there, and I can stay for as long as I want."
10018-100180090 = "Please look for a different cabinet next time, Sensei."
10018-100180100 = "The Game Development Department's cabinet belongs to me."
10018-100180110 = "I like your cabinet."
10018-100180120 = "I know, but..."
10018-100180130 = "No means no. "
10018-100180140 = "What type of games do you like, Sensei?"
10018-100180150 = "I like console games."
10018-100180160 = "I like arcade games."
10018-100180170 = "I like almost all games,"
10018-100180180 = "but I don't really like online games where you have to work together with other people..."
10018-100180190 = "I don't like how you have to talk to people."
10018-100180200 = "But I still like fighting games."
10018-100180210 = "Fighting games?"
10018-100180220 = "Yeah. You don't have to talk to anyone in order to play those games."
10018-100180230 = "One of my favorite game developers is creating a new fighting game, so I'm really looking forward to that."
10018-100180240 = "I can't picture you playing that type of game, Yuzu."
10018-100180250 = "Really? I'm not sure about that..."
10018-100180260 = "When I was young, I had no idea it cost so much money to develop a game."
10018-100180270 = "The last time I made a game, I didn't have enough money to maintain the servers..."
10018-100180280 = "Sometimes people were losing data in the middle of their game..."
10018-100180290 = "(ﾟﾛﾟ;) What a nightmare. So, what did you do?"
10018-100180300 = "Thankfully, I had a backup, so we didn't lose all the data."
10018-100180310 = "But still, that was four days of work that ended up out the window."
10018-100180320 = "The world of game development sounds brutal."
10018-100180330 = "It is..."
10018-100180340 = "When we started work on our next game, we made sure to save up enough money"
10018-100180350 = "so that we wouldn't repeat the same mistake."
10018-100180360 = "The part-time job I got last time was a nightmare."
10018-100180370 = "Whenever I was standing in front of a customer, I would freeze up and make a million mistakes..."
10018-100180380 = "The manager told me it was okay, but I know they were disappointed in me."
10018-100180390 = "Why don't you try a different part-time job?"
10018-100180400 = "Huh? A different part-time job?"
10018-100180410 = "I can't! I could barely handle the convenience store job..."
10018-100180420 = "It's okay. You don't even need to see people in-person for this job."
10018-100180430 = "A job where I don't need to see people...?"
10018-100180440 = "That sounds okay..."
10018-100180450 = "I got my first paycheck, Sensei!"
10018-100180460 = "I got a lot more than I expected, so I bought presents for our club members with the leftover cash."
10018-100180470 = "('◡') That's great. Congrats!"
10018-100180480 = "Um... If you have time this weekend, do you wanna come see me at the theme park I work at?"
10018-100180490 = "The theme park? Why?"
10018-100180500 = "I have something I want to give you..."
10018-100180510 = "You don't need to give me a gift."
10018-100180520 = "No, I really want to be with you..."
10018-100180530 = "I mean... "
10018-100180540 = "I want to give you a gift!"
10018-100180550 = "So please come to the theme park this weekend!"
10018-100180570 = "You're giving back the ticket I gave you...?"
10018-100180580 = "Is there anything you want me to do, Sensei?"
10018-100180590 = "Buy me some bread and milk on the way to Schale."
10018-100180600 = "I know I said \"anything,\" but please don't use the free pass on something like that!"
10018-100180610 = "I can do that for you without the pass I gave you!"
10018-100180620 = "A lot of times when you lose things"
10018-100180630 = "you end up finding them"
10018-100180640 = "in the weirdest places, huh?"
10018-100180650 = "A phenomenon many experience..."
10018-100180660 = "Remotes especially..."
10018-100180670 = "Tbh"
10018-100180680 = "I probably just forgot"
10018-100180690 = "where I left it..."
10018-100180700 = "But it's definitely"
10018-100180710 = "not just me"
10018-100180720 = "That's where old stories of"
10018-100180730 = "thieving pixies or other tricksters"
10018-100180740 = "come from."
10018-100180750 = "That's a fun fact."
10018-100180760 = "So, my best guess would be"
10018-100180770 = "that you lost something?"
10018-100180780 = "No."
10018-100180790 = "...Well, maybe I did?"
10018-100180800 = "Maybe I didn't..."

[translation]
26014-260140010 = "งานเสร็จซักที"
26014-260140020 = "จากนี้คงได้หยุดพักสักสองสามวัน"
26014-260140030 = "แต่ฉันก็น่าจะใส่ชุดนักเรียน\nเหมือนเดิมนะ"
26014-260140040 = "ดีจังเลยนะที่ได้มีวันหยุดบ้าง"
26014-260140050 = "ปกติวันหยุดทำอะไรเหรอ?"
26014-260140060 = "อืม..."
26014-260140070 = "ทำอะไรนะ?"
26014-260140080 = "เจ้าตัวก็ตอบไม่ได้แฮะ...?"
26014-260140090 = "คุณครู"
26014-260140100 = "ติดต่อมาตั้งแต่เช้าเลยนะ?"
26014-260140110 = "อืม"
26014-260140120 = "ขอโทษนะ"
26014-260140130 = "พอดีว่า"
26014-260140140 = "ฉันลืมไปว่าวันนี้วันหยุด ก็เลยตื่นแต่\nเช้าเลย"
26014-260140150 = "ปกติพอชินแล้วก็จะเป็นแบบนี้ละ..."
26014-260140160 = "ฉันก็เลยงงอยู่ว่า"
26014-260140170 = "งั้นควรไปทำอะไรดี..."
26014-260140180 = "งั้นมาพักผ่อนที่ชาเล่ต์มั้ยล่ะ?"
26014-260140190 = "วันนี้สนุกมากเลย"
26014-260140200 = "แล้วก็"
26014-260140210 = "เมื่อกี้ขอโทษด้วยนะ"
26014-260140220 = "ฉันคิดว่าคุณครูอาจต้องการความ\nช่วยเหลือจากฉัน"
26014-260140230 = "ก็เลยใจร้อนไปหน่อย"
26014-260140240 = "ครูไม่อยากรบกวนวันหยุดของคารินน่ะ"
26014-260140250 = "ไม่ต้องรู้สึกแบบนั้นก็ได้"
26014-260140260 = "เรื่องการช่วยคุณครูน่ะ ฉันเต็มใจเสมอ\nนั่นละ"
26014-260140270 = "คุณครู"
26014-260140280 = "ฉันมีข่าวดี"
26014-260140290 = "ข่าวดี?"
26014-260140300 = "จู่ๆ ฉันก็ได้ไอเดียดีๆ"
26014-260140310 = "ไอเดียที่จะใช้วันหยุดอย่างพิเศษน่ะ"
26014-260140320 = "ถึงจะไม่รู้ว่าอะไร แต่ครูจะช่วยอย่าง\nสุดกำลังเลย!"
26014-260140330 = "ขอบคุณนะ"
26014-260140340 = "ฉันยินดีรับความช่วยเหลือจากคุณครู\nเสมอเลย"
26014-260140350 = "ฉันคิดว่าจะไปโรงเรียนตอนนี้น่ะ"
26014-260140360 = "ถ้าอยากเดินเข้าโรงเรียนพร้อมกัน\nก็มาที่หน้าบ้านฉันนะ"
26014-260140370 = "ไปโรงเรียนเหรอ...?"

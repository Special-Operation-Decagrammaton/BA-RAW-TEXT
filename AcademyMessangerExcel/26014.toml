[translation]
26014-260140010 = "任務告一段落了"
26014-260140020 = "接下來幾天雖然是假日"
26014-260140030 = "但我應該會繼續穿著制服"
26014-260140040 = "能放假真不錯呢"
26014-260140050 = "你放假時通常會做什麼呢？"
26014-260140060 = "唔嗯"
26014-260140070 = "會做什麼呢？"
26014-260140080 = "……為什麼問我？"
26014-260140090 = "老師"
26014-260140100 = "這麼早有什麼事嗎？"
26014-260140110 = "唔嗯"
26014-260140120 = "抱歉"
26014-260140130 = "那個"
26014-260140140 = "我忘記今天是假日，所以就照常早起了"
26014-260140150 = "如果太習慣平時的生活，有時候就會這樣……"
26014-260140160 = "我現在還有點恍惚"
26014-260140170 = "不知道接下來該做什麼……"
26014-260140180 = "那要不要來夏萊休息？"
26014-260140190 = "今天我很開心"
26014-260140200 = "還有"
26014-260140210 = "剛才真抱歉"
26014-260140220 = "一想到老師不需要我的幫助"
26014-260140230 = "就有點太著急了"
26014-260140240 = "我不想打擾花凛的假日"
26014-260140250 = "沒關係，不需要覺得有負擔"
26014-260140260 = "如果老師需要幫助的話，我隨時歡迎"
26014-260140270 = "老師"
26014-260140280 = "我有個好消息"
26014-260140290 = "好消息？"
26014-260140300 = "我想到了一個主意"
26014-260140310 = "一個度過特別假日的主意"
26014-260140320 = "雖然不知道是什麼，但我會盡力幫忙！"
26014-260140330 = "謝謝你"
26014-260140340 = "我隨時歡迎老師的協助"
26014-260140350 = "我現在正準備去上學"
26014-260140360 = "如果你想一起的話，就到我家門口來吧"
26014-260140370 = "……上學？"

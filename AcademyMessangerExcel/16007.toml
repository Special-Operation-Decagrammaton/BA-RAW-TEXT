[translation]
16007-160070010 = "안녕하세요, 선생님."
16007-160070020 = "혹시 실례가 되지 않는다면 오후에 잠깐 시간을 내어주실 수 있으신가요?"
16007-160070030 = "괜찮아. 무슨 일이야?"
16007-160070040 = "다름이 아니라 붉은겨울 사무국의 업무에 필요한 물건을 구입하기 위해 샬레 근처의 상점가를 방문하려 했는데……"
16007-160070050 = "붉은겨울의 자치구를 벗어나는 건 오랜만이라, 부끄럽게도 이 근처의 길에는 익숙지가 않아서요."
16007-160070060 = "괜찮으시다면 선생님께서 동행해 주셨으면 합니다."
16007-160070070 = "그래."
16007-160070080 = "감사합니다, 선생님."
16007-160070090 = "그럼 오후에 상점가 앞에서 뵙겠습니다."
16007-160070100 = "선생님, 늦은 시간에 실례하겠습니다."
16007-160070110 = "다름이 아니라 붉은겨울 학원과 관련된 샬레의 당번 보고서 처리가 늦어지고 있어서요."
16007-160070120 = "오늘까지가 기한이었는데, 혹시 잊고 있지는 않으신지요?"
16007-160070130 = "미안, 완전히 잊고 있었어!"
16007-160070140 = "내일까지 꼭 준비해둘게!"
16007-160070150 = "후후, 너무 서두르지 않으셔도 괜찮답니다."
16007-160070160 = "붉은겨울 학원과 관련된 일이라면 제가 '어떻게든' 미룰 수 있으니까요."
16007-160070170 = "……더 무서워!"
16007-160070180 = "최근 붉은겨울 학원 곳곳에 체리노 회장을 비방하는 선전물이 자주 보이는 것 같네요."
16007-160070190 = "……아무래도 <정기 순회 연설>을 나가야 할 때가 돌아온 것 같습니다."
16007-160070200 = "정기 순회 연설?"
16007-160070210 = "저희 학원의 순회 연설에 관심이 있으신가요, 선생님?"
16007-160070220 = "붉은겨울 학원의 순회 연설이란, 자치구의 곳곳을 순회하며 연설을 통해 체리노 회장님의 위대함을 널리 알리는— 일종의 행사랍니다."
16007-160070230 = "다만 자치구가 넓은 탓에 학원 전역을 순회하려면 꽤 오랜 시간이 걸리지만요."
16007-160070240 = "선생님께서도 괜찮으시다면 이번 순회 연설에 함께 참여하시겠어요?"
16007-160070250 = "나는 괜찮은데……."
16007-160070260 = "아뇨. 부디 와주셨으면 합니다."
16007-160070270 = "선생님께도 들려드리고 싶은 체리노 회장님의 멋진 에피소드가 아직 잔뜩 남아 있거든요!"
16007-160070280 = "강제 참여냐!"
16007-160070290 = "선생님. 지금 혹시 바쁘신가요?"
16007-160070300 = "다름이 아니라 급히 선생님의 도움이 필요한 일이 있습니다."
16007-160070310 = "응, 괜찮아."
16007-160070320 = "무슨 일이야?"
16007-160070330 = "그게, 체리노 회장님이 이번에 새로 내주신 과제가 너무 어려워서……."
16007-160070340 = "……어쩌면 숙청을 당할지도 모르겠습니다."
16007-160070350 = "……나는 빠지면 안 될까?"
16007-160070360 = "안 됩니다! 이야기를 듣고 도망치려 하시다니……."
16007-160070370 = "제가 만약 숙청당하게 된다면, 제 배후에 선생님이 있었다고 증언할 테니까요!"
16007-160070380 = "무서워!"
16007-160070390 = "선생님께서는 어떤 영화를 좋아하시나요?"
16007-160070400 = "잔잔한 인디 영화를 좋아해."
16007-160070410 = "화려한 블록버스터 영화를 좋아해."
16007-160070420 = "그렇군요. 후후, 선생님다운 취향이시네요."
16007-160070430 = "토모에가 제일 좋아하는 영화는 뭐야?"
16007-160070440 = "제가 제일 좋아하는 영화요?"
16007-160070450 = "저는……"
16007-160070460 = "<위대한 수염의 행적>이라는 영화를 제일 좋아한답니다."
16007-160070470 = "처음 듣는 영화인데."
16007-160070480 = "그야 당연하지요."
16007-160070490 = "<위대한 수염의 행적>은 체리노 회장님의 취향과 일상을 다룬 기록 영화로서……"
16007-160070500 = "지금부터 제가 찍을 예정인 영화니까요!"
16007-160070510 = "자, 선생님. 위대한 체리노 회장님의 행적을 기록하기 위해 저와 함께해주세요!"
16007-160070520 = "이번에도 강제 참여야?!"

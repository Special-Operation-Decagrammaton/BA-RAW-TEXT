[translation]
20008-200080010 = "선생님. 늘 신세가 많습니다."
20008-200080020 = "게헨나 선도부의 선임 행정관 아마우 아코입니다."
20008-200080030 = "다름이 아니라 이번에 샬레와의 업무 협력 건으로 연락드립니다만,"
20008-200080040 = "……아코?"
20008-200080050 = "나중에 날짜와 장소에 대한 자세한 내용을 보내드리겠으니, 바쁘시더라도 조금만 시간을 내주시면 감사하겠습니다."
20008-200080060 = "잘 부탁드립니다."
20008-200080070 = "으, 으응."
20008-200080080 = "선생님. 신세 졌습니다."
20008-200080090 = "오늘 이야기와는 별로 관계없습니다만, 확인해보니 어젯밤 배전 관련 공사로 일시적인 정전이 있었다고 하네요."
20008-200080100 = "그래서 말인데, 혹시 감시 카메라 100대 필요하지 않으세요?"
20008-200080110 = "필요 없어!!"
20008-200080120 = "……쳇."
20008-200080130 = "하아."
20008-200080140 = "못 해 먹겠네."
20008-200080150 = "……아코?"
20008-200080160 = "왜 이렇게 꼬리에 꼬리를 물고……!"
20008-200080170 = "저기, 괜찮아……?"
20008-200080180 = "선생님. 중요한 용건이 있습니다."
20008-200080190 = "아무튼 급한 일이니까 지금 당장 와 주셔야 해요."
20008-200080200 = "도망칠 생각은 하지 마세요?"
20008-200080210 = "네, 네에……"
20008-200080220 = "선생님."
20008-200080230 = "오늘 수고 많으셨습니다."
20008-200080240 = "그럼 다음에 또 신세 지도록 하겠습니다."
20008-200080250 = "아니, 사양할게……."
20008-200080260 = "선생님"
20008-200080270 = "다름이 아니라……"
20008-200080280 = "바빠요."
20008-200080290 = "네?"
20008-200080300 = "뭔가요, 그 반응은!"
20008-200080310 = "안 사요. 안 사."
20008-200080320 = "잡상인 취급 받고 있어……!"
20008-200080330 = "뭐, 뭔가요, 진짜!"
20008-200080340 = "그건가요? 신종 괴롭힘인가요?"
20008-200080350 = "정말이지, 선생님까지 그런……"
20008-200080360 = "……?"
20008-200080370 = "무슨 일 있었어……?"
20008-200080380 = "아……."
20008-200080390 = "……네. 그러게요."
20008-200080400 = "딱히 무슨 일이 있었던 건 아니에요."
20008-200080410 = "그냥"
20008-200080420 = "……?"
20008-200080430 = "……아코?"
20008-200080440 = "선생님? 잘 들어가셨나요?"
20008-200080450 = "이 목줄, 모르고 가져와 버렸어."
20008-200080460 = "아아. 과연."
20008-200080470 = "그랬군요."
20008-200080480 = "내일 돌려주러 갈게."
20008-200080490 = "네."
20008-200080500 = "아."
20008-200080510 = "아니에요. 괜히 번거롭게 그럴 필요까진 없어요."
20008-200080520 = "그냥 선생님이 가지고 계세요."
20008-200080530 = "……응?"
20008-200080540 = "오늘도 고생 많으셨어요."
20008-200080550 = "그럼, 다음에 또 뵙겠습니다. 선생님."

[translation]
20008-200080010 = "一直以來承蒙您的關照"
20008-200080020 = "我是格黑娜風紀委員會的行政官天雨亞子"
20008-200080030 = "這次聯絡您，是想討論有關與夏萊合作的業務相關事項"
20008-200080040 = "亞子……？"
20008-200080050 = "稍後將發給您詳細的日期與地點，很抱歉在百忙之中打擾，希望能占用您的一些時間"
20008-200080060 = "還請您多加指教"
20008-200080070 = "唔，嗯"
20008-200080080 = "辛苦了，老師"
20008-200080090 = "雖然和今天提及的事無關，但在確認後發現，昨晚似乎是由於配電相關的工程所導致的暫時停電"
20008-200080100 = "……對了，不嫌棄的話，需不需要100台左右的監視攝影機？"
20008-200080110 = "不需要"
20008-200080120 = "……唉"
20008-200080130 = "真受不了"
20008-200080140 = "真的是做不下去了……"
20008-200080150 = "亞子？"
20008-200080160 = "怎麼這樣一個接著一個……！"
20008-200080170 = "那個，沒事吧……？"
20008-200080180 = "老師，我有件重要的事──"
20008-200080190 = "而且是件急事，能請您馬上過來嗎？"
20008-200080200 = "您不會棄我不顧吧？"
20008-200080210 = "好，好的……"
20008-200080220 = "老師"
20008-200080230 = "今天也辛苦了"
20008-200080240 = "那麼之後也拜託您了唷"
20008-200080250 = "已經確定還有下一次了啊……"
20008-200080260 = "老師"
20008-200080270 = "今天找您不為別的……"
20008-200080280 = "今天很忙"
20008-200080290 = "咦？"
20008-200080300 = "那是什麼反應！"
20008-200080310 = "先說我不買哦"
20008-200080320 = "被當成強迫推銷的人了……！"
20008-200080330 = "什麼嘛，真是的！"
20008-200080340 = "是那個嗎，新的欺凌方式嗎？"
20008-200080350 = "真受不了，連老師都這樣……"
20008-200080360 = "……？"
20008-200080370 = "沒事吧？發生了什麼事嗎？"
20008-200080380 = "唉……"
20008-200080390 = "這麼說也沒錯"
20008-200080400 = "雖然也不是什麼大事"
20008-200080410 = "不過"
20008-200080420 = "？"
20008-200080430 = "……亞子？"
20008-200080440 = "老師，平安到家了嗎？"
20008-200080450 = "抱歉，我把項圈帶回去了"
20008-200080460 = "啊啊，原來如此"
20008-200080470 = "這樣啊"
20008-200080480 = "我明天拿去還你唷"
20008-200080490 = "好的"
20008-200080500 = "啊"
20008-200080510 = "不，不用帶來也沒關係"
20008-200080520 = "請老師留著吧"
20008-200080530 = "……？"
20008-200080540 = "今天也辛苦了"
20008-200080550 = "那麼，下次見囉"

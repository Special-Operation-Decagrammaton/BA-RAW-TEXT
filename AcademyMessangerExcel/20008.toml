[translation]
20008-200080010 = "I'm always indebted to you, Sensei."
20008-200080020 = "This is Amau Ako, the senior administrator of the Gehenna Prefect Team."
20008-200080030 = "It's about a cooperative task for Schale."
20008-200080040 = "...Ako?"
20008-200080050 = "I'll provide you with the exact details regarding location and time at a later time. I would really appreciate it if you could take some time out of your busy schedule."
20008-200080060 = "I look forward to seeing you."
20008-200080070 = "O-Okay."
20008-200080080 = "Sensei, I am indebted to you."
20008-200080090 = "It doesn't have much to do with what we were talking about , but when I checked on the case, it turned out the power was cut due to electrical repairs last night."
20008-200080100 = "On that note, do you perhaps need 100 surveillance cameras?"
20008-200080110 = "I don't!!"
20008-200080120 = "...tsk."
20008-200080130 = "*sigh*"
20008-200080140 = "I can't put up with this."
20008-200080150 = "...Ako?"
20008-200080160 = "It just keeps going in circles...!"
20008-200080170 = "Are you all right...?"
20008-200080180 = "Sensei, I have something important to do."
20008-200080190 = "Anyway, it's urgent, so you have to come right away."
20008-200080200 = "Don't think of running away."
20008-200080210 = "Yup, uh-huh..."
20008-200080220 = "Sensei."
20008-200080230 = "You did a great job today."
20008-200080240 = "I'll be relying on you again next time."
20008-200080250 = "No, I decline..."
20008-200080260 = "Sensei"
20008-200080270 = "It's nothing serious, but..."
20008-200080280 = "I'm busy."
20008-200080290 = "Huh?"
20008-200080300 = "What's with that reaction?!"
20008-200080310 = "Not interested. Not interested."
20008-200080320 = "I'm getting treated like a door-to-door salesperson!"
20008-200080330 = "Wh-What is this?!"
20008-200080340 = "Is that it? A new way of bullying me?"
20008-200080350 = "You too, Sensei?"
20008-200080360 = "...?"
20008-200080370 = "Did something happen...?"
20008-200080380 = "Ah!"
20008-200080390 = "...Yeah, exactly."
20008-200080400 = "It's not that something happened."
20008-200080410 = "I just..."
20008-200080420 = "...?"
20008-200080430 = "...Ako?"
20008-200080440 = "Sensei? Did you get back safely?"
20008-200080450 = "I brought the leash with me by mistake."
20008-200080460 = "Oh. I see."
20008-200080470 = "I understand now."
20008-200080480 = "I'll return it tomorrow."
20008-200080490 = "Yes."
20008-200080500 = "Oh."
20008-200080510 = "No, it's fine. There's no need to complicate things."
20008-200080520 = "Just keep it, Sensei."
20008-200080530 = "Huh?"
20008-200080540 = "Thanks for your hard work today."
20008-200080550 = "I'll see you again next time, Sensei."

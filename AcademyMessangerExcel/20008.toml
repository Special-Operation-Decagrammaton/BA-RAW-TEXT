[translation]
20008-200080010 = "คุณครู ฉันต้องรบกวนคุณครูอยู่\nตลอดเลยค่ะ"
20008-200080020 = "ฉันอามาอุ อาโกะ เจ้าหน้าที่อาวุโส\nของคณะกรรมการวินัยเกเฮนน่าค่ะ"
20008-200080030 = "ฉันติดต่อมาครั้งนี้ก็เพราะ\nเรื่องความร่วมมือกับทางชาเล่ต์…"
20008-200080040 = "อาโกะ...?"
20008-200080050 = "ฉันจะส่งรายละเอียดเรื่องสถานที่\nและวันเวลาตามไป ขอบคุณที่สละ\nเวลาให้ทั้งที่คุณครูก็งานยุ่งมากนะคะ"
20008-200080060 = "ขอรบกวนด้วยค่ะ"
20008-200080070 = "อะ...อื้อ..."
20008-200080080 = "ฉันไปรบกวนคุณครูซะแล้ว"
20008-200080090 = "ถึงไม่ได้เกี่ยวกับเรื่องที่คุยกันวันนี้\nแต่ฉันไปตรวจสอบเรื่องไฟดับแล้วนะคะ\nเกิดจากการซ่อมแซมระบบจ่ายไฟค่ะ"
20008-200080100 = "ว่าแต่ว่า... ฉันควรติดกล้องวงจรปิด\nเพิ่ม 100 ตัวมั้ยคะ?"
20008-200080110 = "ไม่ต้องหรอก!!"
20008-200080120 = "ชิส์..."
20008-200080130 = "เฮ้อ..."
20008-200080140 = "ดื้อจริงๆ เลยเชียว"
20008-200080150 = "อาโกะ...?"
20008-200080160 = "อ๊าาา ไม่จบไม่สิ้นกันสักที...!"
20008-200080170 = "เอ่อ เป็นอะไรรึเปล่า...?"
20008-200080180 = "คุณครูคะ ฉันมีเรื่องสำคัญจะแจ้งค่ะ"
20008-200080190 = "เรื่องนี้เป็นเรื่องด่วนมาก ช่วยมา\nที่นี่ตอนนี้เลยนะคะ"
20008-200080200 = "ห้ามคิดหนีเชียวนะคะ"
20008-200080210 = "ดะ...ได้"
20008-200080220 = "คุณครู"
20008-200080230 = "วันนี้ขอบคุณมากเลยนะคะ"
20008-200080240 = "ถ้างั้นคราวหน้าฉันก็จะขอรบกวน\nคุณครูอีกนะคะ"
20008-200080250 = "ไม่ละ ขอปฏิเสธ..."
20008-200080260 = "คุณครู"
20008-200080270 = "ก็คือว่า..."
20008-200080280 = "ครูติดงานน่ะ"
20008-200080290 = "คะ?"
20008-200080300 = "ทำไมพูดแบบนั้นล่ะคะ...!"
20008-200080310 = "ไม่ซื้อ... ยังไงก็ไม่ซื้อ"
20008-200080320 = "ฉันไม่ได้มาขายของนะคะ...!"
20008-200080330 = "อะไรกันเนี่ย?!"
20008-200080340 = "แบบนี้มันอะไรกันคะ?\nวิธีกลั่นแกล้งฉันวิธีใหม่เหรอคะ?"
20008-200080350 = "จริงๆ เลย คุณครูเนี่ยนะ..."
20008-200080360 = "...?"
20008-200080370 = "มีเรื่องอะไรเหรอ?"
20008-200080380 = "อา..."
20008-200080390 = "ค่ะ... นั่นสิคะ"
20008-200080400 = "ไม่มีอะไรหรอกค่ะ"
20008-200080410 = "ก็แค่..."
20008-200080420 = "...?"
20008-200080430 = "...อาโกะ?"
20008-200080440 = "คุณครูคะ? กลับถึงรึยังคะ?"
20008-200080450 = "ครูเผลอเอาปลอกคอนี่ติดมือ\nกลับมาด้วยซะแล้ว"
20008-200080460 = "อ๊ะ งั้นเหรอคะ"
20008-200080470 = "เข้าใจแล้วค่ะ"
20008-200080480 = "พรุ่งนี้ครูจะเอาไปคืนนะ"
20008-200080490 = "ค่ะ..."
20008-200080500 = "อ๊ะ..."
20008-200080510 = "ไม่ต้องหรอกค่ะ แบบนั้นจะเป็น\nการรบกวนคุณครูเปล่าๆ"
20008-200080520 = "คุณครูเก็บไว้เถอะค่ะ"
20008-200080530 = "หืม...?"
20008-200080540 = "วันนี้ขอบคุณมากเลยนะคะ"
20008-200080550 = "ถ้างั้นไว้พบกันใหม่นะคะคุณครู"

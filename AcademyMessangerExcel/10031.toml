10031-100310390 = "So, I was just wondering..."
10031-100310400 = "Will you spend time with me today, Sensei?"
10031-100310410 = "Sensei, it's the new year."
10031-100310420 = "As a business owner, it's natural to want to take advantage of events that only happen during this time of year."
10031-100310430 = "Not that I'm superstitious or anything."
10031-100310440 = "Certainly not. That's definitely not the case. Nevertheless..."
10031-100310450 = "What do you say to drawing omikuji together?!"

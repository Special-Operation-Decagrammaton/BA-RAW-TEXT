[translation]
10031-100310010 = "ขอบคุณคุณครูมากๆ ที่สนใจ\nและมอบความรักให้กับหน่วยรับจ้าง\nสารพัด 68 ของเรานะคะ"
10031-100310020 = "...?"
10031-100310030 = "อะไรกัน! ทำไมถึง\nตอบกลับแปลกๆ แบบนี้!"
10031-100310040 = "ครูแค่ตกใจที่จู่ๆ\nเธอก็ทักทายแบบแปลกๆ"
10031-100310050 = "พอเห็นข้อความที่ไม่สมกับเป็นอารุ\nเลยนึกว่าเป็นข้อความสแปมน่ะ"
10031-100310060 = "อะ...อะไรกัน แต่ช่างเถอะ!\nฉันเป็นคนใจกว้าง ไม่ถือหรอก!"
10031-100310070 = "ฮุฮุฮุ ทักทายเป็นพิธีพอแล้ว!"
10031-100310080 = "คุณครู อีกไม่นานปีนี้ก็จะผ่านไปแล้วนะ"
10031-100310090 = "เพราะงั้นวันนี้ไปเที่ยวกับฉันหน่อยสิ"
10031-100310100 = "ขอบอกเอาไว้ก่อน หุ้นส่วนธุรกิจ\nอย่างคุณครูไม่มีสิทธิ์ปฏิเสธเด็ดขาด!"
10031-100310110 = "คือ..."
10031-100310120 = "วันนี้คุณครูว่างอยู่ใช่มั้ย?"
10031-100310130 = "สวัสดีปีใหม่ค่ะ คุณครู"
10031-100310140 = "อื้อ ปีใหม่นี้\nมีความสุขมากๆ นะ อารุ"
10031-100310150 = "อืมมม ที่ฉันติดต่อมาวันนี้..."
10031-100310160 = "คราวก่อนเราไปเช่าชุด\nกิโมโนราคาแพงมา"
10031-100310170 = "อื้อ อารุตกลงเช่าง่ายๆ เลย"
10031-100310180 = "ให้ไปคืนเป็นเพื่อนเหรอ?"
10031-100310190 = "ดะ...เดี๋ยวสิ! ตอนนั้นมัน...\nเป็นแค่ส่วนหนึ่งของกลยุทธ์\nการลงทุนเท่านั้น!"
10031-100310200 = "ที่ติดต่อมาวันนี้ก็เพื่อจะบอกว่ามีโอกาสเหมาะๆ ที่จะใช้ชุดนั้นแล้วน่ะ...!"
10031-100310210 = "ถ้าเอามาตกแต่งห้องก็คงจะสวย\nมากแน่ๆ ให้ครูช่วยมั้ย?"
10031-100310220 = "ฉันไม่ได้จะเรียกคุณครูมา\nตกแต่งสำนักงานสักหน่อยนะ?!"
10031-100310230 = "ทั้งที่ฉันบอกว่ามีโอกาสเหมาะๆ\nที่จะใช้ชุดนี้แล้ว ทำไมถึงพูดเรื่อง\nพวกนี้ออกมากันเนี่ย!"
10031-100310240 = "ยังไงก็เถอะ เอาเป็นว่า\nมีงานเลี้ยงให้ใส่ชุดนี้ไปได้แล้ว"
10031-100310250 = "งานสำคัญมากเหมาะกับ\nกิโมโนชั้นสูงแบบนี้"
10031-100310260 = "เพราะงั้นคุณครูจะว่ายังไง\nถ้าฉันอยากจะขอให้ไปด้วยกันน่ะ\nจะไปด้วยกันมั้ย?"
10031-100310270 = "นะ...แน่นอนว่าฉันไปคนเดียวก็ได้\nไปคนเดียวได้สบายๆ ไม่มีปัญหาเลย!"
10031-100310280 = "แต่คุณครูจะไปด้วยกันใช่มั้ย?"
10031-100310290 = "อื้อ ไปสิ"
10031-100310300 = "อะ...อื้อ!"
10031-100310310 = "ฮุฮุ ถ้างั้นฉันจะรอนะ♪"
10031-100310320 = "คุณครู ฉันอยากคุยเรื่องนั้น\nต่อจากคราวที่แล้วน่ะ"
10031-100310330 = "ถึงมันจะช้าไปสักหน่อย..."
10031-100310340 = "ปีใหม่ทั้งที แต่ฉันยังไม่ได้\nไปเที่ยวงานปีใหม่กับคุณครูเลยนะ"
10031-100310350 = "เรายุ่งจนไม่มีเวลาไปเลยนี่นา"
10031-100310360 = "อึก... เข้าร่วมกิจกรรม\nฟาร์มไอเทม...!"
10031-100310370 = "ใช่มั้ยล่ะ?"
10031-100310380 = "หืม? พูดอะไรของคุณครูน่ะ?"
10031-100310390 = "เพราะงั้น..."
10031-100310400 = "วันนี้คุณครูไปเที่ยวกับฉันมั้ย"
10031-100310410 = "คุณครู ปีใหม่แล้วนะ"
10031-100310420 = "ในฐานะนักธุรกิจ การออกไป\nสำรวจงานเทศกาลพิเศษแบบนี้\nก็เป็นเรื่องที่ควรทำไม่ใช่รึไง?"
10031-100310430 = "อืม ถึงฉันจะไม่ค่อยเชื่อเท่าไรก็เถอะ"
10031-100310440 = "อื้อ มันไม่ได้เป็นแบบนั้นเสมอไปหรอก"
10031-100310450 = "เราไปเสี่ยงทายโอะมิกุจิกันเถอะ!"
10031-100310460 = "ไหนบอกว่าไม่เชื่อไง..."
10031-100310470 = "ชะ...ช่างเหอะน่า! รีบออกมาได้แล้ว!"

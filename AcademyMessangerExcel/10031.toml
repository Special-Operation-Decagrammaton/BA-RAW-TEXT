[translation]
10031-100310010 = "今年一年，承蒙您對我們便利屋68的熱情支持與惠顧，誠心感謝"
10031-100310020 = "……？"
10031-100310030 = "什，什麼呀！那種反應！"
10031-100310040 = "抱歉，剛剛有點嚇一跳"
10031-100310050 = "先確認發送人是誰……"
10031-100310060 = "算……算了！我是很寬容大量的！"
10031-100310070 = "總之，拘謹的寒暄到此為止！"
10031-100310080 = "吶，老師，今年也只剩一點點了"
10031-100310090 = "為了準備跨年有些事要做，所以今天會陪我吧？"
10031-100310100 = "順帶一提，身為合夥人的老師沒有拒絕的權利！"
10031-100310110 = "……"
10031-100310120 = "那個，老師，日程還空著吧……？是吧……？"
10031-100310130 = "我姑且就再說一次吧，新年快樂"
10031-100310140 = "新年快樂"
10031-100310150 = "今天聯絡不為別的……"
10031-100310160 = "之前不是租了和服嗎？"
10031-100310170 = "啊啊，是亞瑠被牽著鼻子走的那時候的"
10031-100310180 = "如果是那個話，要一起去店裡詢問是否能退貨嗎？"
10031-100310190 = "不是的，不是那樣！應該說那時候的那個，說到底都是戰略性的投資！"
10031-100310200 = "今天只是想告訴你，那件和服有用處了……！"
10031-100310210 = "用處……裝飾辦公室之類的？"
10031-100310220 = "不可能只為了這個就叫老師吧！？話說回來，你明明知道吧！？"
10031-100310230 = "連穿都沒穿就拿去裝潢，太傷心了吧！"
10031-100310240 = "……總，總之！有能穿這件和服的地方了！"
10031-100310250 = "是與和服相配，相當文雅的場合……"
10031-100310260 = "所以，我想拜託老師護送我……如何？"
10031-100310270 = "當，當然，我自己一個人也沒問題的！？"
10031-100310280 = "……會很忙嗎？"
10031-100310290 = "當然會去唷"
10031-100310300 = "是，是啊！果然會來啊！"
10031-100310310 = "呵呵，那我等著唷♪"
10031-100310320 = "老師，你還記得上次說的話吧？"
10031-100310330 = "雖然有點晚了……"
10031-100310340 = "難得的新年，都沒能跟老師一起參加到有過年氛圍的活動呢？"
10031-100310350 = "畢竟彼此都很忙呢"
10031-100310360 = "活動、周回、道具……"
10031-100310370 = "是吧？"
10031-100310380 = "……老師，沒事吧？說什麼呢？"
10031-100310390 = "嘛，總之，那個……"
10031-100310400 = "今天能占用你一點時間嗎？"
10031-100310410 = "老師，新年開始了呢"
10031-100310420 = "這樣的話，你不覺得先舉辦只有這個時期才有的活動，也是身為企業家該做的事情之一嗎？"
10031-100310430 = "嗯，雖然我不是特別信這套"
10031-100310440 = "沒錯！我不太相信"
10031-100310450 = "和我一起去抽籤吧？"
10031-100310460 = "……亞瑠是非常相信抽籤的人嗎？"
10031-100310470 = "別管那個了！快來！"

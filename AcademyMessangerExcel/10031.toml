10031-100310110 = "Um..."
10031-100310120 = "Your schedule is free today...right?"
10031-100310130 = "Happy New Year, Sensei."
10031-100310140 = "Happy New Year to you too, Aru."
10031-100310150 = "Ahem, I have a good reason for contacting you like this..."

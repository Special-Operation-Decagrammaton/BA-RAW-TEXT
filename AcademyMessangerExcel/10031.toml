10031-100310300 = "Oh... Yay!"
10031-100310310 = "Heehee, okay then. I'll be waiting! ♪"
10031-100310320 = "Sensei, I would like to continue what I was talking about last time..."
10031-100310330 = "So, it is a bit late, but..."
10031-100310340 = "It's still New Year's, but I haven't been able to participate in any events with you."

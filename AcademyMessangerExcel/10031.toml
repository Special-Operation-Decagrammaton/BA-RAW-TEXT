10031-100310040 = "I was just taken aback by your sudden strange greeting."
10031-100310050 = "I thought it was spam because it wasn't like your usual messages."
10031-100310060 = "W-Well, it's okay! Because I am magnanimous!"
10031-100310070 = "Heeheehee, no more formal greetings!"
10031-100310080 = "Sensei, this year is almost over."
10031-100310090 = "So on that note, hang out with me today."

[translation]
10031-100310010 = "올 한 해 저희 흥신소 68에 보내주신 귀하의 관심과 사랑에 진심으로 감사드립니다."
10031-100310020 = "……?"
10031-100310030 = "뭐, 뭐야! 그 꺼림칙한 반응은!"
10031-100310040 = "갑자기 이상한 인사를 보내서 당황했을 뿐이야."
10031-100310050 = "아루답지 않게 이상한 문자를 보내길래 스팸인 줄 알았어."
10031-100310060 = "뭐, 뭐어. 괜찮아! 나는 관대하니까!"
10031-100310070 = "……후후후훗, 딱딱한 인사는 이걸로 끝!"
10031-100310080 = "자, 선생님, 올해도 얼마 남지 않았어."
10031-100310090 = "그래서 말인데 오늘은 나와 어울려줘."
10031-100310100 = "참고로 동업자인 선생님에게 거부권은 없으니까 말이야!"
10031-100310110 = "그……,"
10031-100310120 = "선생님 예정, 비어 있는 거 맞지……? 응…?"
10031-100310130 = "새해 복 많이 받으세요. 선생님."
10031-100310140 = "응, 아루도 새해 복 많이 받아."
10031-100310150 = "흠흠, 오늘 이렇게 연락을 한 건 다름이 아니라……."
10031-100310160 = "요전번에 그……. 비싼 기모노를 렌탈한 적이 있었잖아?"
10031-100310170 = "응, 아루, 엄청 팔랑귀였지."
10031-100310180 = "역시 반품하러 같이 가줄까?"
10031-100310190 = "자, 잠깐! 그때의 그건, 어디까지나 전략적인 투자의 일환이었고!"
10031-100310200 = "오늘 이렇게 연락한 건 마침 그 옷의 쓰임새가 생긴 걸 알려주려고……!"
10031-100310210 = "확실히 방에 장식하면 이쁠 거 같긴 했지. 거들어줄까?"
10031-100310220 = "딱히 사무실에 장식하려고 선생님을 부르려던 게 아니거든?!"
10031-100310230 = "뭐냐고! 쓰임새가 생겼다고 당당하게 외친 직후에 그런 처량한 전개……!"
10031-100310240 = "……어, 어쨌거나 이 옷을 입고 갈 장소가 생겼어."
10031-100310250 = "고급스러운 기모노가 어울리는, 매우 중요한 자리거든."
10031-100310260 = "그래서 말이지만…… 어때, 선생님. 에스코트를 부탁하고 싶은데……. 같이 가지 않을래?"
10031-100310270 = "……무, 물론 나 혼자서도 완전 괜찮지만? 응, 아무런 문제도 없긴 하지만 그래도……!"
10031-100310280 = "……같이 가줄 거지?"
10031-100310290 = "응, 물론이야."
10031-100310300 = "아……, 응!"
10031-100310310 = "후후, 그럼 기다리고 있을게♪"
10031-100310320 = "선생님, 저번에 했던 이야기의 연장선인데 말이야……."
10031-100310330 = "그, 조금 늦어지게 됐지만……."
10031-100310340 = "아직 새해인데도 모처럼 선생님하고 새해다운 행사에 참가하질 못했잖아?"
10031-100310350 = "바빠서 그럴 시간이 없긴 했었지."
10031-100310360 = "윽 이벤트 참가, 아이템 파밍……!"
10031-100310370 = "그렇지?"
10031-100310380 = "응? 무슨 말을 하는 거야, 선생님은?"
10031-100310390 = "그래서 말인데……."
10031-100310400 = "오늘, 나한테 시간 좀 내어주지 않을래? 선생님."
10031-100310410 = "선생님, 새해야."
10031-100310420 = "그럼 이런 시기에만 존재하는 이벤트를 경험해 보는 것도 사업가로서 당연히 갖춰야 할 태도가 아닐까?"
10031-100310430 = "응, 딱히 믿는 건 아니지만."
10031-100310440 = "응, 절대로 그런 건 아니지만."
10031-100310450 = "나랑 같이 오미쿠지를 뽑으러 가자."
10031-100310460 = "오히려 그런 말을 할수록 믿고 있는 게……."
10031-100310470 = "돼, 됐고! 집합이야!"

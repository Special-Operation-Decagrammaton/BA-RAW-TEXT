10031-100310230 = "Come on! What's with this sad development right after I proudly shouted that I have a good use for it!"
10031-100310240 = "...A-Anyway, I have a place to go to in that outfit."
10031-100310250 = "It's a very important meeting where an elegant kimono would fit right in."
10031-100310260 = "On that note... What do you say, Sensei? I want to ask you to be my escort. Would you like to go with me?"
10031-100310270 = "...O-Of course, I'm perfectly fine on my own. Yeah, no problem at all, but still!"
10031-100310280 = "...Will you go with me?"

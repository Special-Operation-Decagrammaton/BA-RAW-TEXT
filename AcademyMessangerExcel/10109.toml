[translation]
10109-101090010 = "老師，我是乃愛"
10109-101090020 = "非常抱歉，明天我恐怕無法如期到夏萊完成值日生的工作了"
10109-101090030 = "今天從早上就有點發燒，到下午又更嚴重了……"
10109-101090040 = "真糟糕。身體會很不舒服嗎？"
10109-101090050 = "不用擔心。吃過藥後已經比較好了"
10109-101090060 = "我只是擔心如果用這種狀態去夏萊，反而會給老師添麻煩……"
10109-101090070 = "突然調整日程真的很抱歉"
10109-101090080 = "不用擔心，你好好休息吧"
10109-101090090 = "如果有事隨時可以跟我說"
10109-101090100 = "好的，老師晚安"
10109-101090110 = "你好，老師"
10109-101090120 = "因為感冒的關係，很久沒去見老師了……"
10109-101090130 = "最近過得還好嗎？"
10109-101090140 = "我過得很好哦"
10109-101090150 = "乃愛的身體有比較好了嗎？"
10109-101090160 = "是，這都多虧了老師"
10109-101090170 = "話說回來，如果方便的話"
10109-101090180 = "這週末能請老師到我的房間來一趟嗎？"
10109-101090190 = "去乃愛的房間……？"
10109-101090200 = "哎呀"
10109-101090210 = "上次老師來探病的時候，不是跟我約好下次要幫我裝飾房間嗎？"
10109-101090220 = "難道這段期間，老師已經忘記了自己的承諾嗎？"
10109-101090230 = "我，我當然記得！"
10109-101090240 = "只是隨口問一下而已！"
10109-101090250 = "呵呵，老師不必這麼慌張"
10109-101090260 = "我只是開個玩笑而已"
10109-101090270 = "那麼我們週末見"
10109-101090280 = "老師，你身體還好嗎？"
10109-101090290 = "我聽其他學生說你感冒了……"
10109-101090300 = "啊，是乃愛啊"
10109-101090310 = "我沒事。多虧感冒也能難得休息一下"
10109-101090320 = "雖然老師說沒事"
10109-101090330 = "但我有點擔心"
10109-101090340 = "是不是之前來看我的時候被我傳染了……"
10109-101090350 = "這不是乃愛的錯"
10109-101090360 = "別放在心上"
10109-101090370 = "可是……"
10109-101090380 = "老師明天應該沒有特別的行程吧？"
10109-101090390 = "我可以在中午左右過去探病嗎？"
10109-101090400 = "可以是可以……"
10109-101090410 = "這樣好嗎？研討會的工作會不會忙不過來？"
10109-101090420 = "不必擔心。病假期間累積的工作，都已經妥善處理完畢了"
10109-101090430 = "那麼明天見"
10109-101090440 = "因為這幾天一直下雨的關係，天氣漸漸變涼爽了呢"
10109-101090450 = "雖然洗好的制服一直不乾，讓人有點煩惱就是了"
10109-101090460 = "我能理解那種心情……"
10109-101090470 = "有時候衣服曬太久會有味道對吧"
10109-101090480 = "話說回來，乃愛有幾套制服呢？"
10109-101090490 = "唔嗯"
10109-101090500 = "包括備用的在內大約有4套吧"
10109-101090510 = "由於千年的服儀規定並不是特別嚴格"
10109-101090520 = "所以幾乎沒有學生會有好幾套相同的制服……"
10109-101090530 = "但我畢竟是研討會的幹部"
10109-101090540 = "這麼說來，我幾乎沒見過乃愛穿便服的樣子呢"
10109-101090550 = "突然覺得有點可惜……"
10109-101090560 = "呵呵"
10109-101090570 = "之後有機會的話，我會讓老師看看的"

[translation]
10109-101090010 = "Sensei, this is Noa."
10109-101090020 = "I'm sorry, but I don't think I can make my Student Rep shift tomorrow."
10109-101090030 = "I woke up with a small fever, but it's gotten worse throughout the day."
10109-101090040 = "Oh no, is it bad?"
10109-101090050 = "Don't worry. I took some medicine, and I'm already feeling better."
10109-101090060 = "But I am concerned about getting you sick if I go to Schale in this condition."
10109-101090070 = "I'm sorry for the last-minute cancellation."
10109-101090080 = "Don't worry about me. Just rest up!"
10109-101090090 = "If anything happens, feel free to contact me anytime."
10109-101090100 = "Yes, have a good night, Sensei."
10109-101090110 = "Hello, Sensei."
10109-101090120 = "My cold has kept me from visiting you lately."
10109-101090130 = "Have you been keeping healthy?"
10109-101090140 = "Of course, I'm fine."
10109-101090150 = "Are you feeling better now?"
10109-101090160 = "I'm all healed up!"
10109-101090170 = "So if it's okay with you..."
10109-101090180 = "Do you mind coming over to my room again this weekend?"
10109-101090190 = "Your room?"
10109-101090200 = "Well..."
10109-101090210 = "Last time you were here, you promised to help me decorate."
10109-101090220 = "You didn't forget, did you?"
10109-101090230 = "Ah! Yeah! Of course I do!"
10109-101090240 = "I was asking just in case!"
10109-101090250 = "Fufu, you don't have to be so flustered."
10109-101090260 = "I was just teasing you."
10109-101090270 = "Then I'll see you this weekend."
10109-101090280 = "Sensei, are you okay?"
10109-101090290 = "I heard from another student that you caught a cold..."
10109-101090300 = "Oh, Noa."
10109-101090310 = "I'm okay. I get to take some time off for the first time in a while."
10109-101090320 = "Even if you say it's okay,"
10109-101090330 = "I can't help but feel like I got you sick."
10109-101090340 = "I feel so bad..."
10109-101090350 = "It's not your fault, Noa."
10109-101090360 = "Don't worry about it."
10109-101090370 = "But still..."
10109-101090380 = "Sensei, you don't have anything special planned tomorrow, do you?"
10109-101090390 = "Is it okay if I come visit around lunchtime, then?"
10109-101090400 = "I don't mind you coming by, but..."
10109-101090410 = "Will you have time? You don't have any Seminar duties?"
10109-101090420 = "It's okay. I've already handled all the work that piled up during my sick leave."
10109-101090430 = "I'll see you tomorrow."
10109-101090440 = "It's been nice that the weather has cooled down with the rain,"
10109-101090450 = "but on the other hand, my laundry isn't drying fast enough."
10109-101090460 = "I understand that feeling..."
10109-101090470 = "And if you hang your laundry out to dry for too long, it can start to smell."
10109-101090480 = "By the way, how many school uniforms do you have, Noa?"
10109-101090490 = "Hmm..."
10109-101090500 = "Including extras, about 4 sets?"
10109-101090510 = "The dress code at Millennium isn't very strict,"
10109-101090520 = "so I doubt most students own duplicates of the same exact uniform."
10109-101090530 = "But I'm part of Seminar, you know?"
10109-101090540 = "Come to think of it, I never see you in casual clothes."
10109-101090550 = "Hm... What a shame..."
10109-101090560 = "Heehee."
10109-101090570 = "I'll show you one day, when we get the chance."

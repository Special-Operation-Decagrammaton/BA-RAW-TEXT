[translation]
10109-101090010 = "선생님, 노아입니다."
10109-101090020 = "죄송합니다만, 내일 예정된 샬레의 당번 업무를 수행하기 어려울 것 같아서요."
10109-101090030 = "아침부터 약간의 미열이 있었는데, 오후에는 상태가 더 나빠져서…"
10109-101090040 = "큰일이네. 몸이 많이 안 좋은 거야?"
10109-101090050 = "걱정하실 정도는 아녜요. 약을 먹고 나니 지금은 괜찮아진 것 같아요."
10109-101090060 = "다만 이 상태로 샬레에 갔다가는 오히려 선생님께 더 폐를 끼칠 것 같아서…"
10109-101090070 = "갑자기 일정을 조정하게 되어 죄송합니다."
10109-101090080 = "내 걱정은 말고 일단은 푹 쉬어."
10109-101090090 = "무슨 일 있으면 언제든 연락 주고."
10109-101090100 = "네, 선생님도 좋은 밤 되세요."
10109-101090110 = "안녕하세요, 선생님."
10109-101090120 = "감기 때문에 오랫동안 찾아뵙지 못했었는데…"
10109-101090130 = "건강히 잘 지내고 계신가요?"
10109-101090140 = "나야 물론 건강하지."
10109-101090150 = "노아도 몸은 괜찮아졌어?"
10109-101090160 = "네, 덕분에."
10109-101090170 = "그보다 괜찮으시다면"
10109-101090180 = "이번주 주말에 제 방에 한 번 더 와주시지 않겠어요?"
10109-101090190 = "노아의 방에…?"
10109-101090200 = "어머나"
10109-101090210 = "지난번 병문안을 오셨을 때, 다음에 제 방을 꾸미는 걸 도와주기로 하셔놓고"
10109-101090220 = "설마 그사이에 약속을 잊으신 건 아니시겠지요?"
10109-101090230 = "ㄷ 당연히 기억하고 있지!"
10109-101090240 = "혹시나 해서 물어본 것뿐이야!"
10109-101090250 = "후후, 그렇게 당황하지 않으셔도 괜찮아요."
10109-101090260 = "농담이니까요."
10109-101090270 = "그럼 이번 주말에 뵙겠습니다."
10109-101090280 = "선생님, 괜찮으신가요?"
10109-101090290 = "다른 학생으로부터 전해 들었는데 감기에 걸리셨다고…"
10109-101090300 = "아, 노아구나."
10109-101090310 = "나는 괜찮아. 덕분에 오랜만에 쉬고 있으니까."
10109-101090320 = "괜찮다고 하셔도"
10109-101090330 = "혹시 전에 제 병문안을 오셨다 제게 감기가 옮은 건 아닐지"
10109-101090340 = "조금 마음에 걸리네요…"
10109-101090350 = "노아의 탓이 아닌걸."
10109-101090360 = "신경 쓰지 마."
10109-101090370 = "그래도"
10109-101090380 = "선생님, 내일 특별한 약속은 없으시지요?"
10109-101090390 = "그렇다면 내일 점심 즈음에 병문안을 가도 괜찮을까요?"
10109-101090400 = "찾아오는 건 문제 없지만…"
10109-101090410 = "괜찮겠어? 세미나의 일로 바쁘지 않아?"
10109-101090420 = "괜찮습니다. 병가 중 밀린 업무는 이미 완벽히 다 처리했으니까요."
10109-101090430 = "그럼 내일 뵙겠습니다."
10109-101090440 = "요 며칠간 비가 계속 내린 덕분에 시원해진 건 좋지만"
10109-101090450 = "세탁한 교복이 좀처럼 마르질 않아서 큰일이네요."
10109-101090460 = "그 기분 이해해…"
10109-101090470 = "빨래를 너무 오래 널어두면 냄새가 날 때도 있으니까."
10109-101090480 = "그러고 보니 노아는 교복을 몇 벌이나 가지고 있어?"
10109-101090490 = "음"
10109-101090500 = "여분까지 포함해서 4벌 정도일까요."
10109-101090510 = "밀레니엄의 복장 규칙은 그렇게 엄격하지는 않은지라"
10109-101090520 = "같은 교복을 여러 벌 가지고 있는 학생은 거의 없겠지만……"
10109-101090530 = "일단은 세미나의 임원이니까요"
10109-101090540 = "그러고 보니 노아의 사복은 거의 본 기억이 없네"
10109-101090550 = "새삼 아쉬워지는 걸……"
10109-101090560 = "후후"
10109-101090570 = "나중에 기회가 되면 한 번 보여 드릴게요."

[translation]
10109-101090010 = "คุณครู ฉันโนอานะคะ"
10109-101090020 = "ขอโทษนะคะ แต่พรุ่งนี้ฉันน่าจะไป\nเข้าเวรที่ชาเล่ต์ไม่ได้แล้วค่ะ"
10109-101090030 = "ฉันมีไข้ต่ำๆ ตั้งแต่เช้าแล้ว\nแล้วพอตกเย็น อาการของฉันก็ยิ่งแย่ลง..."
10109-101090040 = "เป็นเรื่องใหญ่แล้วแฮะ\nไม่สบายมากหรือเปล่า?"
10109-101090050 = "ไม่ต้องเป็นห่วงหรอกค่ะ ฉันกินยา\nเข้าไปแล้ว ก็เลยดีขึ้นมาหน่อยแล้วค่ะ"
10109-101090060 = "แต่แค่เกรงว่าถ้าไปที่ชาเล่ต์ จะยิ่ง\nเป็นการเพิ่มภาระให้คุณครูเปล่าๆ..."
10109-101090070 = "ขอโทษที่ขอเปลี่ยนตารางอย่าง\nกะทันหันนะคะ"
10109-101090080 = "ไม่ต้องห่วงครูนะ พักรักษาตัวก่อนเถอะ"
10109-101090090 = "ถ้ามีเรื่องอะไรก็บอกครูนะ"
10109-101090100 = "ค่ะ ราตรีสวัสดิ์นะคะคุณครู"
10109-101090110 = "สวัสดีค่ะ คุณครู"
10109-101090120 = "ตั้งแต่ไม่สบาย ฉันก็ไม่ได้ไปหาคุณครู\nนานเลย..."
10109-101090130 = "คุณครูแข็งแรงดีมั้ยคะ?"
10109-101090140 = "ครูแข็งแรงอยู่แล้ว"
10109-101090150 = "โนอาดีขึ้นบ้างแล้วหรือยัง?"
10109-101090160 = "ค่ะ ต้องขอบคุณคุณครูด้วยค่ะ"
10109-101090170 = "แต่ว่า ถ้าคุณครูไม่ว่าอะไร"
10109-101090180 = "สุดสัปดาห์นี้ช่วยมาที่ห้องของฉัน\nอีกรอบจะได้มั้ยคะ?"
10109-101090190 = "ห้องของโนอาเหรอ...?"
10109-101090200 = "เอ๋..."
10109-101090210 = "ครั้งที่แล้วคุณครูบอกว่าจะมาช่วย\nตกแต่งห้องให้ฉันไม่ใช่เหรอคะ?"
10109-101090220 = "อย่าบอกนะคะว่าแค่ไม่กี่วัน แต่คุณครูก็\nลืมหมดแล้ว?"
10109-101090230 = "ตะ... ต้องจำได้อยู่แล้ว!"
10109-101090240 = "ครูแค่ถามไปงั้นน่ะ!"
10109-101090250 = "ฮุฮุ ไม่ต้องตกใจขนาดนั้นก็ได้ค่ะ"
10109-101090260 = "ฉันล้อเล่นค่ะ"
10109-101090270 = "งั้นไว้เจอกันสุดสัปดาห์นี้นะคะ"
10109-101090280 = "คุณครู เป็นยังไงบ้างคะ?"
10109-101090290 = "ฉันได้ยินจากนักเรียนคนอื่นว่าคุณครู\nไม่สบาย..."
10109-101090300 = "อ๊ะ โนอาเองเหรอ"
10109-101090310 = "ครูไม่เป็นไร พอไม่สบายก็เลยได้\nพักผ่อนน่ะ"
10109-101090320 = "ถึงจะบอกว่าไม่เป็นไรก็เถอะ"
10109-101090330 = "แต่ฉันคิดว่าคุณครูติดหวัดจากฉัน\nตอนมาหาฉันคราวก่อน"
10109-101090340 = "ก็เลยเป็นกังวลน่ะค่ะ..."
10109-101090350 = "ไม่ใช่ความผิดของโนอาหรอกนะ"
10109-101090360 = "ไม่ต้องกังวลหรอก"
10109-101090370 = "ถึงอย่างนั้นก็เถอะ"
10109-101090380 = "คุณครู พรุ่งนี้มีนัดอะไรเป็นพิเศษมั้ยคะ?"
10109-101090390 = "ถ้าไม่มีนัดอะไร ฉันแวะเข้าไปเยี่ยมไข้\nตอนกลางวันได้มั้ยคะ?"
10109-101090400 = "จะมาครูก็ไม่ว่าหรอก..."
10109-101090410 = "แต่จะไม่เป็นไรเหรอ? งานที่เซมิน่า\nไม่ยุ่งเหรอ?"
10109-101090420 = "ไม่เป็นไรค่ะ ฉันเคลียร์งานที่ค้างไว้\nระหว่างที่ลาป่วยเสร็จหมดแล้วค่ะ"
10109-101090430 = "งั้นไว้เจอกันพรุ่งนี้นะคะ"
10109-101090440 = "มันก็ดีอยู่ที่อากาศเย็นขึ้นเพราะฝนตก\nติดต่อมาหลายวัน"
10109-101090450 = "แต่ชุดนักเรียนที่ฉันซักไว้ยังไม่แห้ง\nเลยค่ะ"
10109-101090460 = "ครูเข้าใจดีเลย..."
10109-101090470 = "พอตากผ้าชื้นๆ ไว้นานๆ ก็อาจจะ\nมีกลิ่นได้"
10109-101090480 = "ว่าแต่โนอามีชุดนักเรียนกี่ชุดเหรอ?"
10109-101090490 = "อืม"
10109-101090500 = "ถ้านับชุดที่ซื้อมาไว้เผื่อด้วย\nรวมๆ แล้วก็สี่ชุดค่ะ"
10109-101090510 = "แต่กฏเรื่องเครื่องแบบนักเรียนของ\nมิลเลเนียมไม่ได้เข้มงวดนัก"
10109-101090520 = "ก็เลยไม่ค่อยมีนักเรียนที่มีชุดนักเรียน\nชุดเดียวกันหลายๆ ชุด..."
10109-101090530 = "แต่ว่าฉันเป็นสมาชิกของเซมิน่านี่คะ"
10109-101090540 = "จะว่าไป ครูก็ไม่ค่อยเห็นชุดอื่นของ\nโนอาเลยนะ"
10109-101090550 = "น่าเสียดายจัง..."
10109-101090560 = "ฮุฮุ"
10109-101090570 = "ไว้ถ้ามีโอกาส ฉันจะใส่ชุดอื่นให้ดูค่ะ"

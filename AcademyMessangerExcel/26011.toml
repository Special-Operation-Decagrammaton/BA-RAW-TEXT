[translation]
26011-260110010 = "คุณครู"
26011-260110020 = "คุณครู!"
26011-260110030 = "สุดยอดเลย ที่นี่มันสุดยอดไปเลยค่ะ!"
26011-260110040 = "ซาเต็น?"
26011-260110050 = "หืม? มีเรื่องอะไรเหรอ?"
26011-260110060 = "อ่า"
26011-260110070 = "ฉันมาแบบไม่มีปี่ไม่มีขลุ่ยเลยสินะ\nขอโทษค่ะ"
26011-260110080 = "เอาเป็นว่าฉันจะเล่าให้ฟังตอนคุณครู\nมาถึงค่ะ!!"
26011-260110090 = "อืม"
26011-260110100 = "แปลกจังเลยนะคะ"
26011-260110110 = "หรือว่าหาแบบผิดวิธีนะ?"
26011-260110120 = "ยังเร็วเกินกว่าจะยอมแพ้น่า"
26011-260110130 = "ถ้าหาเจอง่ายๆ ก็ไม่ใช่ตำนานน่ะสิ"
26011-260110140 = "อืม"
26011-260110150 = "นั่นสิ! ก็น่าจะใช่นะคะ!"
26011-260110160 = "งั้นถ้าเจออะไรแล้วจะติดต่อไปนะคะ!!"
26011-260110170 = "อืม"
26011-260110180 = "งั้นสินะคะ"
26011-260110190 = "ฉันได้พบอีกอย่างแล้วค่ะ"
26011-260110200 = "พบอีกอย่าง? พบอะไรเหรอ?"
26011-260110210 = "ซาเต็น?"
26011-260110220 = "คุณครู"
26011-260110230 = "ตอนนี้พอมีเวลาสักครู่ไหมคะ?"
26011-260110240 = "อืม"
26011-260110250 = "มันยังค้างคาใจฉันอยู่น่ะค่ะ"
26011-260110260 = "การที่ไม่สามารถรู้ผลแพ้ชนะน่ะ..."
26011-260110270 = "ครูลืมเป้าหมายแรกเริ่มไปแล้ว..."
26011-260110280 = "ครูคิดว่าเธอชนะแล้วนะ"
26011-260110290 = "เอ๋?"
26011-260110300 = "งั้นเหรอคะ?"
26011-260110310 = "ฮืม..."
26011-260110320 = "ฟังดูแล้วก็น่าจะเป็นอย่างนั้นนะ..."
26011-260110330 = "ฉันว่า"
26011-260110340 = "ฉันน่าจะต้องพักสักหน่อยแล้วค่ะ"
26011-260110350 = "มาเจอที่ที่เหมาะพอดีเลย"
26011-260110360 = "ถ้าคุณครูไม่ติดอะไร ช่วยออกมาหา\nหน่อยได้ไหมคะ?"
26011-260110370 = "ได้สิ ว่าแต่อยู่ไหนเหรอ?"
26011-260110380 = "เจออะไรสนุกๆ ที่นั่นมั้ย?"
26011-260110390 = "อ่า"
26011-260110400 = "นั่นสิคะ"
26011-260110410 = "ฮู่ว!"
26011-260110420 = "สดชื่นจังเลยค่ะ! ดีนะที่ลองทำดู"
26011-260110430 = "พอดีฉันเป็นพวกที่หากมีอะไรคาใจก็\nจะปล่อยผ่านไม่ได้น่ะค่ะ"
26011-260110440 = "บอกตรงๆ เลยว่าตกใจ"
26011-260110450 = "สุดยอดไปเลยนะ เป็นอดีตนักกีฬา\nเหรอเนี่ย?"
26011-260110460 = "ฮิฮิ"
26011-260110470 = "ไม่ใช่หรอกค่ะ"
26011-260110480 = "แต่ถ้าจะให้อธิบาย ฉันก็คงพูดยืดยาว..."
26011-260110490 = "อืม"
26011-260110500 = "ฉันก็แค่..."
26011-260110510 = "ได้ทำอะไรตามใจเยอะเลย...!\nประมาณนี้น่ะ!"
26011-260110520 = "กะไว้แล้วเชียว"
26011-260110530 = "มันไม่ง่ายอย่างที่คิดเลยค่ะ"
26011-260110540 = "ก็นะ"
26011-260110550 = "แต่ฉันก็คาดเอาไว้แล้วแหละ!"
26011-260110560 = "หืม? มีเรื่องอะไรเหรอ?"
26011-260110570 = "...ซาเต็น?"
26011-260110580 = "อ้อ"
26011-260110590 = "ก็แค่"
26011-260110600 = "อืม"
26011-260110610 = "ไม่มีอะไรมากหรอกค่ะ!"
26011-260110620 = "อื้ม!"
26011-260110630 = "โล่งใจจังเลยค่ะ!"
26011-260110640 = "แต่ว่าฉันก็เก่งขึ้นกว่าเดิมใช่มั้ยคะ?"
26011-260110650 = "ช่วงหลังๆ ฉันยิงได้เฉียบเลยใช่มั้ยคะ?"
26011-260110660 = "พอมาคิดดู ก็เหมือนตอนที่ตีลูกเลย"
26011-260110670 = "เพราะจริงๆ แล้วพรสวรรค์มันเป็นเรื่อง\nความตั้งใจนี่เอง"
26011-260110680 = "เอาอีกแล้ว"
26011-260110690 = "พูดอะไรเหมือนเป็นครูอีกแล้ว"
26011-260110700 = "อ๊ะ"
26011-260110710 = "พอมาคิดดู คุณครูเป็นครูนี่คะ?"
26011-260110720 = "แหะๆ"
26011-260110730 = "ขอบคุณนะคะคุณครู!!"

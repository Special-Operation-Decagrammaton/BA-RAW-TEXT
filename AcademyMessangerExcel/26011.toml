[translation]
26011-260110010 = "老師"
26011-260110020 = "老師！"
26011-260110030 = "太酷了，這裡真的是太酷了！"
26011-260110040 = "佐天？"
26011-260110050 = "嗯？你指的是什麼？"
26011-260110060 = "啊"
26011-260110070 = "這樣有點沒頭沒尾的對吧，不好意思"
26011-260110080 = "等老師來了之後，我會跟你解釋的！！"
26011-260110090 = "唔嗯"
26011-260110100 = "真奇怪"
26011-260110110 = "難道我們用錯方法了嗎？"
26011-260110120 = "現在放棄還太早囉"
26011-260110130 = "如果這麼好找的話，就不會被稱為傳說了"
26011-260110140 = "說的也是"
26011-260110150 = "果然沒錯！我就知道是這樣！"
26011-260110160 = "那麼，等我找到新的線索之後會再聯絡的！！"
26011-260110170 = "嗯～"
26011-260110180 = "原來如此"
26011-260110190 = "又明白了一件事"
26011-260110200 = "明白了一件事？"
26011-260110210 = "佐天？"
26011-260110220 = "老師"
26011-260110230 = "如果方便的話，現在能見個面嗎？"
26011-260110240 = "嗯～"
26011-260110250 = "我果然還是很在意"
26011-260110260 = "沒有跟他們分出勝負的事……"
26011-260110270 = "結果忘記原本的目的了……"
26011-260110280 = "我覺得從某方面來看，已經分出勝負了"
26011-260110290 = "咦……"
26011-260110300 = "是這樣嗎？"
26011-260110310 = "嗯……"
26011-260110320 = "聽老師這麼一說，好像也沒錯……"
26011-260110330 = "我突然覺得"
26011-260110340 = "稍微放鬆一下好像也不賴"
26011-260110350 = "正好我找到了一個不錯的地方"
26011-260110360 = "假如老師沒事的話，要不要來找我？"
26011-260110370 = "可以是可以，不過你在哪裡？"
26011-260110380 = "找到了什麼有趣的東西嗎？"
26011-260110390 = "啊"
26011-260110400 = "關於這點……"
26011-260110410 = "呼～！"
26011-260110420 = "真痛快！果然勇於嘗試是對的"
26011-260110430 = "其實我只要在意起一件事，就沒辦法安心去做別的事"
26011-260110440 = "老實說我真的吃了一驚"
26011-260110450 = "太厲害了，你以前該不會當過職業選手吧？"
26011-260110460 = "嘿嘿"
26011-260110470 = "這倒是沒有"
26011-260110480 = "不過這件事可能要說明很久……"
26011-260110490 = "嗯……"
26011-260110500 = "果然還是簡單說一下"
26011-260110510 = "很常有揮棒的機會……可以這麼說吧！"
26011-260110520 = "果然"
26011-260110530 = "事情不像我想得那麼簡單"
26011-260110540 = "不過算了"
26011-260110550 = "反正早就預料到了！"
26011-260110560 = "嗯？發生什麼事了嗎？"
26011-260110570 = "……佐天？"
26011-260110580 = "啊"
26011-260110590 = "只是……"
26011-260110600 = "嗯"
26011-260110610 = "其實也沒什麼！"
26011-260110620 = "嗯～！"
26011-260110630 = "真痛快！"
26011-260110640 = "老師不覺得我現在用起槍來熟練許多嗎？"
26011-260110650 = "我自己覺得後半的命中率還挺高的哦？"
26011-260110660 = "仔細想想，你也挺擅長打擊的呢"
26011-260110670 = "所謂的才能指的或許就是這種心態吧"
26011-260110680 = "又"
26011-260110690 = "又說這種像是老師會說的話"
26011-260110700 = "啊"
26011-260110710 = "這麼說來你確實是老師呢！"
26011-260110720 = "哈哈"
26011-260110730 = "謝謝你，老師！！"

[translation]
26011-260110010 = "선생님"
26011-260110020 = "선생님!"
26011-260110030 = "굉장해, 여긴 정말 굉장하네요!"
26011-260110040 = "사텐?"
26011-260110050 = "응? 무슨 이야기야?"
26011-260110060 = "아"
26011-260110070 = "두서가 없었네요. 죄송합니다."
26011-260110080 = "일단 오시면 말씀드릴게요!!"
26011-260110090 = "으음"
26011-260110100 = "이상하네요."
26011-260110110 = "역시 접근법이 잘못됐던 걸까요."
26011-260110120 = "포기하기엔 이르지."
26011-260110130 = "쉽게 찾아지면 전설이 아니잖아."
26011-260110140 = "음"
26011-260110150 = "과연! 그럴듯한 이야기예요!"
26011-260110160 = "그럼, 뭔가 찾으면 다시 연락드리겠습니다!!"
26011-260110170 = "음"
26011-260110180 = "그렇군요"
26011-260110190 = "한가지 또 알아냈습니다."
26011-260110200 = "알아냈다니? 뭘?"
26011-260110210 = "사텐?"
26011-260110220 = "선생님"
26011-260110230 = "지금 좀 괜찮으실까요?"
26011-260110240 = "음"
26011-260110250 = "역시 조금 마음에 걸리는 걸요"
26011-260110260 = "승부를 마저 내지 못한 게……."
26011-260110270 = "당초의 목적을 잊어버렸어……."
26011-260110280 = "어떤 의미로는 승부가 났다고 생각하는데"
26011-260110290 = "어라"
26011-260110300 = "그런가요?"
26011-260110310 = "흠……."
26011-260110320 = "듣고 보니 그런 것 같기도……."
26011-260110330 = "뭔가"
26011-260110340 = "조금은 쉬는 것도 좋겠다는 생각이 드네요"
26011-260110350 = "마침 적당한 곳을 찾은 것 같은데"
26011-260110360 = "선생님만 괜찮으시다면, 한 번 와 주시겠어요?"
26011-260110370 = "나야 좋지만, 어딘데?"
26011-260110380 = "뭔가 재밌는 거라도 찾았어?"
26011-260110390 = "아"
26011-260110400 = "그게 말이죠"
26011-260110410 = "후우-!"
26011-260110420 = "시원하네요! 역시 해보길 잘했달까"
26011-260110430 = "저, 뭔가 찝찝한 건 그냥 넘어가지 못하는 버릇이 있거든요"
26011-260110440 = "솔직하게 놀랐어."
26011-260110450 = "굉장했어. 혹시 선수 출신이야?"
26011-260110460 = "헤헤"
26011-260110470 = "뭐, 그런 건 아니고요."
26011-260110480 = "뭔가 설명하기에는 말이 너무 길어질 것 같기도……."
26011-260110490 = "음."
26011-260110500 = "역시, 그냥 조금"
26011-260110510 = "휘두를 일이 많았다……! 정도로!"
26011-260110520 = "역시"
26011-260110530 = "생각만큼 잘되지는 않네요"
26011-260110540 = "뭐어"
26011-260110550 = "솔직히 예상은 했지만요!"
26011-260110560 = "응? 무슨 일 있어?"
26011-260110570 = "……사텐?"
26011-260110580 = "아"
26011-260110590 = "그냥"
26011-260110600 = "음"
26011-260110610 = "별 건 아니고요!"
26011-260110620 = "음!"
26011-260110630 = "개운하네요!"
26011-260110640 = "그래도 저, 전보다는 꽤 능숙해지지 않았던가요?"
26011-260110650 = "나중에 쏜 것들은 꽤 깔끔했다고 생각하는데?"
26011-260110660 = "생각해 보면 배팅도 잘했었고 말이지."
26011-260110670 = "사실 재능이라는 건 그런 마음가짐이니까."
26011-260110680 = "또"
26011-260110690 = "또 그렇게 선생님 같은 말을"
26011-260110700 = "앗"
26011-260110710 = "생각해 보니 선생님이셨죠?"
26011-260110720 = "하하"
26011-260110730 = "감사합니다, 선생님!!"

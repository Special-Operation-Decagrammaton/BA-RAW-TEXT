[translation]
10140-101400010 = "선생님, 나를 찾았다고 들었는데"
10140-101400020 = "무슨 일이야?"
10140-101400030 = "혹시 내 힘이 필요한 위험한 사건에 휘말린 거야?"
10140-101400040 = "아, 쿠루미. 안 그래도 한참 찾았었어."
10140-101400050 = "근처 상점가에서 선물로 과일 우유를 받았는데 가져가서 먹어."
10140-101400060 = "쿠루미는 달콤한 우유를 좋아하잖아?"
10140-101400070 = "잠깐"
10140-101400080 = "내 취향을 어떻게"
10140-101400090 = "아니"
10140-101400100 = "나를 간식이 있다면 쪼르르 달려가는 꼬마로 생각하는 거야?"
10140-101400110 = "SRT의 특수 요원을 그런 사소한 일로 불러내지 말라고!"
10140-101400120 = "정말 안 먹을 거야?"
10140-101400130 = "진짜 과일이 들어가서 엄청 고급스러운 과일 우유인데"
10140-101400140 = "그게"
10140-101400150 = "음"
10140-101400160 = "딸기 우유도 있어?"
10140-101400170 = "바나나랑 멜론도 있으니까 원하는대로 가져가"
10140-101400180 = "그럼 작전 끝나고 보고서 제출할 때 가져갈게"
10140-101400190 = "다시 말해두지만"
10140-101400200 = "어디까지나 간식 때문에 가는 게 아니니까!"
10140-101400210 = "피곤해……"
10140-101400220 = "어젯밤에 작전이라도 있었던 거야?"
10140-101400230 = "아니"
10140-101400240 = "사실은 자기 전에 SNS에 흥미로운 숏폼 동영상이 올라와서 봤는데"
10140-101400250 = "생각없이 보다 보니 시간이 너무 흘러서 잘 타이밍을 놓치고 말았어"
10140-101400260 = "확실히 숏폼 영상을 보면 시간이 빨리 가지"
10140-101400270 = "긴 영상보다 중독적인 것 같아"
10140-101400280 = "맞아"
10140-101400290 = "최근에는 Life Hack 이라고 해서 일상에서 쓸 수 있는 간단한 팁 영상을 자주 보는데"
10140-101400300 = "요새는 굳이 팁이 필요없는 단순 작업에도 팁이랍시고, 이상한 도구를 쓰는 영상이 늘어난 것 같아"
10140-101400310 = "뭐 숏폼 영상을 보며 비효율을 논하는 것도 우습지만"
10140-101400320 = "그래도 평범한 물건으로 난관을 헤쳐나가는 건 언제나 흥미롭지."
10140-101400330 = "뭔가 맥O이버 같기도 하고……"
10140-101400340 = "맥O이버? 그게 뭐야?"
10140-101400350 = "음…… 설명하자면 길어지는데"
10140-101400360 = "Life Hack의 대명사 같은 거야"
10140-101400370 = "?"
10140-101400380 = "어른들은 가끔 이상한 유행어를 쓴다니까"
10140-101400390 = "선생님"
10140-101400400 = "혹시 이 근처에 증명 사진을 찍을 만한 곳이 없을까?"
10140-101400410 = "근처에 사진관은 없는 것 같은데……"
10140-101400420 = "갑자기 증명 사진은 왜?"
10140-101400430 = "그게, 작전에 필요한 증명서를 새로 발급받아야 하는데"
10140-101400440 = "최근에 찍은 증명 사진을 첨부해야 한다지 뭐야"
10140-101400450 = "그래서 SRT 학원 시절에 쓰던 증명 사진은 쓸 수가 없어서."
10140-101400460 = "무인 사진기를 이용하는 건 어때?"
10140-101400470 = "무인 사진기?"
10140-101400480 = "응. 역 앞에 증명 사진을 찍을 수 있는 무인 사진기가 있어."
10140-101400490 = "아무 때나 이용할 수 있으니까 써보는 게 어때?"
10140-101400500 = "무인 사진기는 조금"
10140-101400510 = "음"
10140-101400520 = "어쩔 수 없나"
10140-101400530 = "알겠어. 나중에 참고해 볼게."
10140-101400540 = "최근에 출시된 스마트폰 RPG를 플레이하고 있는데"
10140-101400550 = "이 게임, 방패병의 능력치가 너무 나쁜 것 같아"
10140-101400560 = "다른 건 몰라도 방패병의 공격력이 수도승보다 낮은 건 너무 하지 않아?"
10140-101400570 = "캐릭터 밸런스 때문에 그런 게 아닐까?"
10140-101400580 = "방패는 방어에 치중된 장비라는 인식도 있고"
10140-101400590 = "하지만"
10140-101400600 = "방패는 단순한 방어구가 아니라고"
10140-101400610 = "쓰는 사람에 따라서는 어지간한 무기보다 위협적이거든?"
10140-101400620 = "방패가 무기가 된다고……?"
10140-101400630 = "일단은 거대한 쇳덩어리나 다름없으니까"
10140-101400640 = "내가 쓰는 방패만 하더라도 수십 kg이 훌쩍 넘는 걸"
10140-101400650 = "그걸 한 손으로 들고 다녔던 거야?"
10140-101400660 = "?"
10140-101400670 = "당연하지. 다른 한 손에는 총을 들고 있잖아?"
10140-101400680 = "확실히 방패병은 강하구나……"
10140-101400690 = "선생님, 그 소문 들었어?"
10140-101400700 = "최근 이 주변 골목에서 금품을 목적으로 한 강도가 나타나는 모양이야"
10140-101400710 = "인적이 드문 어두운 골목길에서 몰래 뒤를 밟은 뒤에"
10140-101400720 = "뒤를 급습해서 쓰러트리고 주머니를 털어 간다나 봐"
10140-101400730 = "흉흉한 소문이네……"
10140-101400740 = "범인은 아직 잡히지 않은 거야?"
10140-101400750 = "발키리 경비국에서 집중 수사에 나섰으니, 금방 잡히겠지만……"
10140-101400760 = "그래도 선생님도 조심해."
10140-101400770 = "안 그래도 우리보다 몸도 약하면서, 밤길을 혼자 걸을 때가 많잖아?"
10140-101400780 = "뭣하다면"
10140-101400790 = "샬레 근처에서 부르면 내가 마중을 나갈테니까"
10140-101400800 = "쿠루미가 마중을 나온다니 뭔가 설레네"
10140-101400810 = "앞치마 차림으로 마중 나와 줄 수 있어?"
10140-101400820 = "시끄러워!"
10140-101400830 = "그런 의미로 말한 게 아니거든?!"

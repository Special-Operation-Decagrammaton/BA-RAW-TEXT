[translation]
20026-200260010 = "<廣告>赤冬聯邦學園工務部 /\n專業人力派遣 / 長期、短期、單日 /\n土木、建設、擴建、拆除、翻修 /\n任何事情都歡迎聯絡！ /\n若此信箱無法聯絡請使用MomoTalk"
20026-200260020 = "老師，你需要工人嗎？"
20026-200260030 = "為什麼突然這麼問……？"
20026-200260040 = "那個……"
20026-200260050 = "最近接不到什麼委託"
20026-200260060 = "工務部的手上都沒有工作了"
20026-200260070 = "夏萊需要人力嗎？"
20026-200260080 = "有沒有擴建辦公室"
20026-200260090 = "或是建個老師紀念碑之類的計畫？"
20026-200260100 = "目前還沒有這個打算……"
20026-200260110 = "是嗎？真可惜"
20026-200260120 = "如果需要人力的話"
20026-200260130 = "就由我們赤冬聯邦學園的工務部負責吧"
20026-200260140 = "不用找仲介，直接連絡我就可以了！"
20026-200260150 = "嗯，謝謝你"
20026-200260160 = "老師，可以打擾一下嗎？"
20026-200260170 = "我打算寫一篇文章，卻不知道該如何下筆"
20026-200260180 = "希望老師能給我一些意見"
20026-200260190 = "寫作很不容易呢"
20026-200260200 = "你想寫什麼樣的文章呢？"
20026-200260210 = "唔呣"
20026-200260220 = "首先要能動搖讀者的感情"
20026-200260230 = "使其燃起革命的鬥志"
20026-200260240 = "並且將作者的思想灌入腦中"
20026-200260250 = "讓人想起身反抗那些惡毒的布爾喬亞階級的既得利益者"
20026-200260260 = "的那種文章"
20026-200260270 = "……真，真是激進呢"
20026-200260280 = "老師，我記得明天……"
20026-200260290 = "有跟你約好要來工務部參訪對吧？"
20026-200260300 = "嗯，怎麼了嗎……？"
20026-200260310 = "我看天氣預報說，明天好像有強烈寒流會來"
20026-200260320 = "為了避免發生意外，明天的作業決定中止了"
20026-200260330 = "突然更改計畫真是非常抱歉"
20026-200260340 = "沒關係"
20026-200260350 = "畢竟安全第一啊"
20026-200260360 = "沒錯，工作現場追求的永遠是安全第一"
20026-200260370 = "那麼，下次老師有空的時候再過來吧"
20026-200260380 = "這麼說來，老師"
20026-200260390 = "我最近看了一本很有趣的書"
20026-200260400 = "書名叫做《為何奇普托斯的學生會不幸呢》"
20026-200260410 = "書裡寫了什麼呢？"
20026-200260420 = "作者似乎是一名曾任職於聯邦學生會財務室的學生"
20026-200260430 = "在調查了奇普托斯流通的布丁等等奢侈品的供需情形後……"
20026-200260440 = "他發現如果能公平分給所有學生的話，數量是十分足夠的"
20026-200260450 = "然而由於部分的學生吃了兩個以上的布丁，導致均衡遭到了破壞"
20026-200260460 = "真是個有趣的統計呢"
20026-200260470 = "但是，那些能夠吃超過兩個布丁的學生，自然是不會顧慮其他人的"
20026-200260480 = "因此才會造成近半數的學生由於吃不到布丁而陷入不幸"
20026-200260490 = "布丁應該不代表一切吧……"
20026-200260500 = "你在說什麼？布丁就是幸福的根源吧"
20026-200260510 = "總之，除非從布爾喬亞階級手中奪走布丁，否則不幸就會永遠持續下去"
20026-200260520 = "但我們光是進行學園鬥爭就分身乏術了……"
20026-200260530 = "所以我想過從根本上解決這個問題的方法"
20026-200260540 = "你覺得將學生人數減少一半怎麼樣……？"
20026-200260550 = "思考方式可以不要跟某個最終BOSS一樣嗎……"

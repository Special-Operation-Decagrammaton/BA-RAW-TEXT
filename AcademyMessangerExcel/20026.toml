[translation]
20026-200260010 = "<광고> 붉은겨울 용역부 / 전문 인력 파견 / 맞춤 인력, 장기, 단기, 일용직 / 토목, 건설, 증축, 철거, 리모델링 / 일 쓰실 분 / 일하실 분 / 연락 기다리고 있습니다 / 수신 거부는 모모톡으로"
20026-200260020 = "선생, 혹시 용역 필요하지 않아?"
20026-200260030 = "갑작스럽게 웬 용역……?"
20026-200260040 = "그게 말이지……"
20026-200260050 = "최근 원자재 값이 올라서 그런지, 건설 시장이 불황이라"
20026-200260060 = "우리 붉은겨울 용역부에도 일감이 통 없어서 말이야."
20026-200260070 = "그래서 말인데. 혹시 샬레에 사람이 필요한 일은 없어?"
20026-200260080 = "샬레 업무관을 증축한다거나……"
20026-200260090 = "샬레 빌딩 앞에 선생의 기념비를 세운다거나……?"
20026-200260100 = "그런 공사 예정은 없는데……"
20026-200260110 = "그런가, 아쉽게 됐네."
20026-200260120 = "지금은 괜찮더라도 나중에 용역이 필요한 일이 생긴다면"
20026-200260130 = "꼭 우리 붉은겨울 용역부에 연락줘"
20026-200260140 = "외부 용역 쓰지 말고!!"
20026-200260150 = "참고해 둘게."
20026-200260160 = "선생. 잠깐 시간 괜찮아?"
20026-200260170 = "작문을 하는 데 글이 잘 안 써져서……"
20026-200260180 = "선생의 조언을 좀 받았으면 하는데."
20026-200260190 = "작문에서 가장 중요한 건 글을 쓰는 목적이지."
20026-200260200 = "어떤 글을 쓰려고 하는데?"
20026-200260210 = "음"
20026-200260220 = "글을 읽자마자 감정이 격렬하게 고양되어"
20026-200260230 = "혁명에 대한 투지가 넘쳐흐르고"
20026-200260240 = "글쓴이의 사상에 동화되어"
20026-200260250 = "기득 세력에 대한 투쟁을 하게 만드는"
20026-200260260 = "그런 글을 쓰고 싶어"
20026-200260270 = "……최면 어플과 착각한 거 아냐?"
20026-200260280 = "선생, 그러고 보니 내일 쯤에"
20026-200260290 = "용역부의 업무를 견학하기 위해 붉은겨울 학원에 방문한다고 했었지?"
20026-200260300 = "응. 무슨 문제라도 생겼어?"
20026-200260310 = "그게 일기예보를 보니, 내일 강력한 한파가 예고되어 있어서……"
20026-200260320 = "안전사고가 일어날 것 같아서 용역부의 현장 작업은 중지하기로 했어"
20026-200260330 = "갑작스럽게 일정을 변경한 점에 대해 양해 부탁할게"
20026-200260340 = "괜찮아. 신경 쓰지 마."
20026-200260350 = "안전과 관련된 일이니 어쩔 수 없지"
20026-200260360 = "음, 안전은 그 무엇보다 중요하니까."
20026-200260370 = "여하튼 그럼 다음에 시간 날 때 보자고."
20026-200260380 = "그러고 보니 선생"
20026-200260390 = "최근 흥미로운 책을 하나 읽었는데"
20026-200260400 = "<왜 키보토스의 절반은 불행한가> 라는 내용의 책이었어"
20026-200260410 = "오, 어떤 내용이었어?"
20026-200260420 = "총학생회 재무실 출신의 어느 학생이 집필한 책이었는데"
20026-200260430 = "키보토스 전체에 유통되는 푸딩과 같은 사치품의 수요를 조사해 보니"
20026-200260440 = "이를 공평하게 나눈다면 모든 학생들이 푸딩을 배불리 먹고도 남을 양이라나 봐"
20026-200260450 = "하지만 일부 학생들이 푸딩을 두 개나 먹기 때문에 유통에 불균형이 발생하고 있어"
20026-200260460 = "흥미로운 통계네"
20026-200260470 = "하지만 푸딩을 두 개씩 먹는 학생들이 자신의 푸딩을 포기할 리가 없기 때문에"
20026-200260480 = "절반에 가까운 학생들은 푸딩을 먹지 못하고 불행해지는 거야"
20026-200260490 = "불행의 원인은 푸딩뿐만이 아니겠지만……"
20026-200260500 = "무슨 소리야, 푸딩은 모든 행복의 근원이거든?"
20026-200260510 = "여하튼 부르주아들에게서 푸딩을 빼앗지 못한다면 이러한 불행은 계속될 거야"
20026-200260520 = "하지만 현재는 붉은겨울 학원 내에서의 투쟁만으로도 벅차니."
20026-200260530 = "이 문제를 해결할 근본적인 방법이라면……"
20026-200260540 = "대신 학생의 수를 절반으로 줄인다던가……?"
20026-200260550 = "어딘가의 빌런 같은 주장은 그만둬"

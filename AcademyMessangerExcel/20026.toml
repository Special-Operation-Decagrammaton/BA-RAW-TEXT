[translation]
20026-200260010 = "<Ad> Red Winter Labor Party / Professional, Customized Staffing for Long or Short Term Day Labor / Civil Engineering, Construction, Renovation, Demolition, Remodeling / Looking to Hire / Looking for Work / Contact Us! / Opt Out with MomoTalk"
20026-200260020 = "Sensei, do you need any workers?"
20026-200260030 = "Uh... What's this about workers?"
20026-200260040 = "Well..."
20026-200260050 = "With the recent increase in material costs, the construction market is in a slump."
20026-200260060 = "The Red Winter Labor Party doesn't have much work these days."
20026-200260070 = "Does Schale need any workers?"
20026-200260080 = "You could build an extension to the Schale office..."
20026-200260090 = "Or we could build a monument to you in front of the building..."
20026-200260100 = "We don't have any upcoming construction plans..."
20026-200260110 = "Oh, that's too bad."
20026-200260120 = "Well, if anything comes up that requires workers,"
20026-200260130 = "please let us know."
20026-200260140 = "Don't use anyone else's workers!!"
20026-200260150 = "I won't."
20026-200260160 = "Sensei, do you have a moment?"
20026-200260170 = "I'm trying to write something, but I'm having a hard time..."
20026-200260180 = "I was hoping to get some advice."
20026-200260190 = "The most important thing about writing is your purpose."
20026-200260200 = "What are you writing about?"
20026-200260210 = "Well..."
20026-200260220 = "Something that elevates your emotions!"
20026-200260230 = "Fills you with revolutionary fervor!"
20026-200260240 = "Wins you over to the author's philosophy!"
20026-200260250 = "Inspires you to fight the establishment!"
20026-200260260 = "Something like that."
20026-200260270 = "Ah, propaganda. A classic genre."
20026-200260280 = "Sensei, didn't you mention that tomorrow"
20026-200260290 = "you're visiting Red Winter Academy to watch the Labor Party at work?"
20026-200260300 = "Yes. Is there a problem?"
20026-200260310 = "Well, I looked at the weather forecast, and there's a strong cold snap coming tomorrow..."
20026-200260320 = "We've decided to pause field work to avoid any accidents."
20026-200260330 = "I apologize for the sudden change in schedule."
20026-200260340 = "Don't worry about it."
20026-200260350 = "It's a safety issue, so it's okay."
20026-200260360 = "Yeah! Safety is more important than anything else."
20026-200260370 = "Anyway, I'll see you next time."
20026-200260380 = "By the way, Sensei."
20026-200260390 = "I recently read a very interesting book."
20026-200260400 = "The book was called, \"Why Half of Kivotos is Unhappy\"."
20026-200260410 = "Oh, what was it about?"
20026-200260420 = "It was written by a student who worked in the General Student Council's finance office."
20026-200260430 = "After investigating the demand for luxury items like pudding throughout Kivotos,"
20026-200260440 = "the author discovered there was enough pudding for everyone if they divided it equally."
20026-200260450 = "But since some students eat two puddings, there is an imbalance in the distribution."
20026-200260460 = "That's an interesting statistic."
20026-200260470 = "But since the students who eat two puddings won't give up their pudding,"
20026-200260480 = "almost half of the students can't have any pudding and are unhappy."
20026-200260490 = "Of course the cause of unhappiness is probably not just pudding..."
20026-200260500 = "What do you mean? Pudding is the source of all happiness!"
20026-200260510 = "Unless we take pudding away from the bourgeoisie, the unhappiness will continue!"
20026-200260520 = "But since the current struggles within Red Winter Academy are daunting enough,"
20026-200260530 = "the fundamental solution to this problem may be..."
20026-200260540 = "to cut the number of students in half...?"
20026-200260550 = "Don't be ridiculous!"

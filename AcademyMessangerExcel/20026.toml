[translation]
20026-200260010 = "<โฆษณา> ชมรมผู้รับจ้างเรดวินเทอร์ /\nส่งแรงงานชำนาญการ / งานตามกำลังคน\nงานระยะยาว งานระยะสั้น งานรายวัน /\nการโยธา ก่อสร้าง ต่อเติมอาคาร รื้อถอน\nรีโมเดลลิง / จ้างงาน / รับงาน /\nเรากำลังรอการติดต่อจากคุณ /\nปฏิเสธการรับข่าวสารผ่าน MOMOTALK"
20026-200260020 = "ครู... ครูไม่อยากได้แรงงานเหรอ?"
20026-200260030 = "ทำไมจู่ๆ ถึงพูดเรื่องแรงงานล่ะ...?"
20026-200260040 = "ก็คือว่า..."
20026-200260050 = "ช่วงนี้ราคาวัสดุแพงขึ้น พวกตลาดงาน\nก่อสร้างก็เลยซบเซาลงมาก"
20026-200260060 = "ชมรมผู้รับจ้างเรดวินเทอร์ของเราก็ไม่มี\nงานเหมือนกัน"
20026-200260070 = "เลยอยากถามว่า ชาเล่ต์ไม่มีงานที่\nต้องการแรงงานบ้างเลยเหรอ?"
20026-200260080 = "จะเป็นงานต่อเติมอาคารสำนักงาน\nชาเล่ต์ก็ได้..."
20026-200260090 = "สร้างอนุสรณ์ของครูหน้าตึกชาเล่ต์\nก็เข้าท่าดีนะ...?"
20026-200260100 = "ไม่มีการก่อสร้างอะไรแบบนั้นหรอกนะ..."
20026-200260110 = "งั้นเหรอ เสียดายจัง"
20026-200260120 = "ถึงตอนนี้จะไม่เป็นไร แต่ถ้าคราวหน้า\nมีงานที่ต้องการแรงงานละก็"
20026-200260130 = "ต้องติดต่อชมรมผู้รับจ้างเรดวินเทอร์\nของเราเลยนะ"
20026-200260140 = "อย่าใช้บริการองค์กรภายนอกล่ะ!!"
20026-200260150 = "ครูจะจำไว้นะ"
20026-200260160 = "ครู มีเวลาสักแป๊บมั้ย?"
20026-200260170 = "พอดีฉันเขียนเรียงความได้ไม่ดี..."
20026-200260180 = "เลยอยากได้คำแนะนำจากครูหน่อยน่ะ"
20026-200260190 = "สิ่งสำคัญที่สุดของเรียงความ\nคือเป้าหมายในการเขียน"
20026-200260200 = "อยากเขียนเรียงความแบบไหนล่ะ?"
20026-200260210 = "อืม"
20026-200260220 = "เรียงความที่อ่านแล้วให้ความรู้สึกดุดัน\nไม่เกรงใจใคร"
20026-200260230 = "มุ่งมั่นกับการปฏิวัติอย่างเต็มเปี่ยม"
20026-200260240 = "กลมกลืนกับทัศนคติของผู้เขียน"
20026-200260250 = "ก่อให้เกิดการต่อสู้เกี่ยวกับอำนาจใน\nครอบครอง"
20026-200260260 = "ฉันอยากเขียนเรียงความแนวนั้นน่ะ"
20026-200260270 = "จำสลับกับแอปสะกดจิตหรือเปล่า...?"
20026-200260280 = "ครู... จะว่าไปแล้ววันพรุ่งนี้น่ะ"
20026-200260290 = "ครูบอกว่าจะมาดูงานของชมรมผู้รับจ้าง\nที่สหภาพเรดวินเทอร์ใช่มั้ย?"
20026-200260300 = "อื้ม มีปัญหาอะไรหรือเปล่า?"
20026-200260310 = "ดูพยากรณ์อากาศแล้วเขาบอกว่าจะมี\nกระแสลมหนาวอย่างรุนแรง..."
20026-200260320 = "ฉันเลยตัดสินใจหยุดงานของชมรม\nผู้รับจ้างเพราะกลัวว่าจะเกิดอุบัติเหตุ\nด้านความปลอดภัยน่ะ"
20026-200260330 = "ขออภัยที่เปลี่ยนตารางงานกะทันหันนะ"
20026-200260340 = "ไม่เป็นไรหรอก อย่าคิดมากนะ"
20026-200260350 = "ช่วยไม่ได้เนอะ ก็มันเป็นงานที่เกี่ยวกับ\nความปลอดภัยนี่นา"
20026-200260360 = "อื้ม ยังไงความปลอดภัยก็สำคัญที่สุด"
20026-200260370 = "เอาเป็นว่าค่อยมาเจอกันตอนที่ครูว่างๆ\nคราวหน้านะ"
20026-200260380 = "ว่าแต่ครู..."
20026-200260390 = "ล่าสุดนี้ฉันอ่านหนังสือที่น่าสนใจไปเล่ม\nหนึ่งน่ะ"
20026-200260400 = "เป็นหนังสือที่เล่าว่า <ทำไมครึ่งหนึ่ง\nของคิโวทอสถึงไม่มีความสุข>"
20026-200260410 = "โอ้ มันเล่าถึงอะไรบ้าง?"
20026-200260420 = "มันคือหนังสือจากปลายปากกาของ\nนักเรียนคนหนึ่งที่มาจากฝ่ายการเงิน\nขององค์การนักเรียน"
20026-200260430 = "เธอสำรวจอุปสงค์ของสินค้าฟุ่มเฟือย\nอย่างเช่นพุดดิ้งที่วางขายทั่วคิโวทอส"
20026-200260440 = "แล้วพบว่ามันคือปริมาณเหลือทิ้งจาก\nการแบ่งพุดดิ้งให้นักเรียนทุกคนกินอิ่ม\nอย่างเท่าเทียมกัน"
20026-200260450 = "แต่นักเรียนบางกลุ่มกลับกินถึงสองชิ้น\nมันเลยทำให้ระบบหมุนเวียนสินค้าเกิด\nความไม่สมดุลกัน"
20026-200260460 = "สถิติน่าสนใจดีนะ"
20026-200260470 = "เนื่องจากนักเรียนที่กินพุดดิ้งสองชิ้น\nไม่มีทางหักห้ามใจตัวเองได้"
20026-200260480 = "นักเรียนเกือบครึ่งก็เลยต้องอดกินพุดดิ้ง\nและไม่มีความสุขยิ่งกว่าเดิม"
20026-200260490 = "พุดดิ้งอาจไม่ใช่ต้นเหตุของการไม่มี\nความสุขเพียงอย่างเดียว แต่ว่า..."
20026-200260500 = "พูดอะไรน่ะ พุดดิ้งคือบ่อเกิดแห่ง\nความสุขทุกอย่างนะ?"
20026-200260510 = "เอาเป็นว่าถ้าเราแย่งพุดดิ้งมาจากพวก\nชนชั้นกลางไม่ได้ ทุกคนก็จะไม่มีความสุข\nแบบนี้ไปเรื่อยๆ"
20026-200260520 = "แต่ทุกวันนี้สหภาพเรดวินเทอร์ก็มี\nเรื่องต่อสู้กันไม่หวาดไม่ไหวแล้ว"
20026-200260530 = "ถ้ามีแนวทางแก้ปัญหาที่เป็นแบบแผน\nบ้างละก็..."
20026-200260540 = "เช่น ลดจำนวนนักเรียนลงครึ่งหนึ่ง...?"
20026-200260550 = "เลิกแสดงจุดยืนเหมือนตัวร้ายลึกลับ\nเถอะนะ..."

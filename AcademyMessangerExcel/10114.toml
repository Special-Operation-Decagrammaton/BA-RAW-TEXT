[translation]
10114-101140010 = "สวัสดีค่ะ คุณครู"
10114-101140020 = "ฉันเริ่มทำงานพาร์ทไทม์แล้วค่ะ!"
10114-101140030 = "งานพาร์ทไทม์? งานแบบไหนเหรอ?"
10114-101140040 = "ฉันไปเป็นพนักงานเสิร์ฟที่คาเฟ่แถวนี้\nน่ะค่ะ"
10114-101140050 = "เอ่อ คุณครูคะ?"
10114-101140060 = "ถ้าคุณครูพอจะมีเวลาละก็..."
10114-101140070 = "บังเอิญจังที่ตอนนี้"
10114-101140080 = "ครูอยากไปคาเฟ่... อยู่พอดีเลย!"
10114-101140090 = "คะ? หมายความว่า..."
10114-101140100 = "ขอบคุณนะคะ คุณครู"
10114-101140110 = "แล้วฉันจะรอค่ะ"
10114-101140120 = "คุณครู"
10114-101140130 = "คุณครู..."
10114-101140140 = "จูริ? เป็นอะไรหรือเปล่า?"
10114-101140150 = "เมื่อคืนฉันนอนไม่ค่อยหลับค่ะ..."
10114-101140160 = "พอคิดถึงการแข่งขันพนักงานเสิร์ฟ\nในวันนี้"
10114-101140170 = "ฉันก็รู้สึกเครียดมากไปหน่อย..."
10114-101140180 = "ถ้าฉันทำออกมาไม่ดีล่ะคะ?"
10114-101140190 = "ไม่ต้องใส่ใจผลลัพธ์ให้มาก\nเกินไปหรอก..."
10114-101140200 = "จะออกมาไม่ดีก็ไม่เป็นไร แค่ทำให้\nเต็มที่ก็พอ"
10114-101140210 = "ค่ะ... ฉันจะพยายามค่ะ"
10114-101140220 = "แต่ถ้ามีอะไรผิดพลาด..."
10114-101140230 = "ตอนนั้น... ช่วยจับมือของฉันไว้ด้วย\nนะคะ..."
10114-101140240 = "คุณครู! กำลังยุ่งมากหรือเปล่าคะ?"
10114-101140250 = "ครูกำลังแกะพัสดุของเล่นที่สั่งมาน่ะ"
10114-101140260 = "งะ... งั้นเหรอคะ?"
10114-101140270 = "งั้นก็คงยุ่งมากๆ สินะ..."
10114-101140280 = "ครูจะบอกว่าครูว่างมาก จนมาแกะ\nของเล่นได้ต่างหาก"
10114-101140290 = "อย่างนั้นเหรอคะ!"
10114-101140300 = "..."
10114-101140310 = "เอ่อ คุณครูคะ"
10114-101140320 = "ถ้าไม่เป็นการรบกวน..."
10114-101140330 = "ช่วยซ่อนตัวฉันหน่อยได้มั้ยคะ!"
10114-101140340 = "ว่าไงนะ...?"

[translation]
10114-101140010 = "안녕하세요. 선생님."
10114-101140020 = "저, 아르바이트를 시작했어요!"
10114-101140030 = "아르바이트? 어떤 일인데?"
10114-101140040 = "근처 카페에서, 웨이트리스를 해 보기로 했거든요."
10114-101140050 = "저, 선생님?"
10114-101140060 = "혹시 괜찮으시면……."
10114-101140070 = "참으로 우연찮게도 지금 이 순간."
10114-101140080 = "카페에…… 가고 싶어졌다!"
10114-101140090 = "네? 그 말씀은……."
10114-101140100 = "감사합니다. 선생님."
10114-101140110 = "기다릴게요."
10114-101140120 = "선생님."
10114-101140130 = "선생니임……."
10114-101140140 = "주리? 괜찮아?"
10114-101140150 = "잠을 제대로 못 잤어요……."
10114-101140160 = "오늘이 웨이트리스 선발 대회라는 걸 생각했더니"
10114-101140170 = "너무 긴장이 되어서……."
10114-101140180 = "제가 잘 해내지 못하면…… 어떡하죠?"
10114-101140190 = "결과에 너무 신경 쓰지 말자……."
10114-101140200 = "잘 안돼도 좋으니까, 후회만 남기지 말자."
10114-101140210 = "네…… 노력해 볼게요."
10114-101140220 = "혹시 뭔가 잘 안되면……"
10114-101140230 = "그때는, 제 손을 잡아 주세요……."
10114-101140240 = "선생님! 지금 혹시 많이 바쁘신가요?"
10114-101140250 = "마침 장난감 택배를 풀어 보고 있었어."
10114-101140260 = "그, 그러신가요?"
10114-101140270 = "그렇다면 어떤 의미로는 매우 바쁘신 것이……."
10114-101140280 = "완전히 한가하다는 뜻이었습니다."
10114-101140290 = "그러시군요!"
10114-101140300 = "……."
10114-101140310 = "저, 선생님."
10114-101140320 = "폐가 되지 않는다면, 이지만……."
10114-101140330 = "저 좀 숨겨 주세요!"
10114-101140340 = "……뭐?"

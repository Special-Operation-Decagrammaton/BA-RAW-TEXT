[translation]
10080-100800010 = "อืม"
10080-100800020 = "เป็นแบบนี้เองสินะ"
10080-100800030 = "โชคุโฮว?"
10080-100800040 = "มีเรื่องอะไรเหรอ?"
10080-100800050 = "อ่า ไม่มีอะไรหรอก"
10080-100800060 = "ก็แค่สงสัยเฉยๆ น่ะว่ามือถือเครื่องนี้\nใช้ส่งข้อความที่นี่ได้รึเปล่า"
10080-100800070 = "ก็เลยลองๆ ส่งดูน่ะ☆"
10080-100800080 = "เป็นไงบ้าง"
10080-100800090 = "น้ำผลไม้อร่อยมั้ย? พอหายง่วงขึ้นมา\nบ้างรึยัง? "
10080-100800100 = "ขมมากเลย"
10080-100800110 = "ทำเอาตาสว่างเลยแหละ"
10080-100800120 = "ใช่มั้ยล่ะ?"
10080-100800130 = "งั้นก็ถือว่าแก้ปัญหาได้เรียบร้อย☆"
10080-100800140 = "นานกว่าที่คิดอีกนะเนี่ย"
10080-100800150 = "ต้องวางแผนรับมืออะไรรึเปล่านะ?"
10080-100800160 = "นานกว่าที่คิดงั้นเหรอ?"
10080-100800170 = "มีเรื่องอะไรรึเปล่า?"
10080-100800180 = "ไม่ใช่เรื่องใหญ่อะไรหรอก"
10080-100800190 = "ก็แค่ปัญหาที่ยังแก้ไม่ได้หลังจาก\nมาที่นี่น่ะ"
10080-100800200 = "มันน่าอึดอัดจนฉันไม่มีสมาธิเลย"
10080-100800210 = "ครูพอจะรู้แล้วละ"
10080-100800220 = "ครูมีวิธีดีๆ อยู่นะ"
10080-100800230 = "...?"
10080-100800240 = "คุณครู?"
10080-100800250 = "ถึงที่นี่จะเป็นที่ที่ดูน่าสนใจ"
10080-100800260 = "แต่ในบางมุม ก็ไม่ได้ต่างจากโลก\nของฉันเท่าไหร่"
10080-100800270 = "ก็นะ"
10080-100800280 = "เอาเป็นว่าปรับตัวเข้ากับที่นี่ได้\nก็ดีแล้วละ"
10080-100800290 = "คุณครูเนี่ย ตอบทื่อๆ แบบนี้\nไม่สนุกเลย"
10080-100800300 = "สงสัยจะเป็นนิสัยของคุณครูสินะ"
10080-100800310 = "อืม..."
10080-100800320 = "งั้นก็ดี"
10080-100800330 = "นั่นก็น่าจะเป็นอีกวิธีหนึ่งเลย"
10080-100800340 = "หืม?"
10080-100800350 = "เรียกฉันเหรอ?"
10080-100800360 = "โชคุโฮว เอ่อ เมื่อกี้..."
10080-100800370 = "เรื่องเมื่อกี้น่ะ..."
10080-100800380 = "เรื่องเมื่อกี้?"
10080-100800390 = "เกิดอะไรขึ้นน่ะ จำไม่ได้เลย!"
10080-100800400 = "เรื่องแบบนี้น่ะ ถ้าเป็นเรื่องดีๆ ละก็\nปล่อยๆ ไปบ้างก็ได้น่า"
10080-100800410 = "ว่ามั้ย?"
10080-100800420 = "ไว้เจอกันใหม่นะคุณครู"
10080-100800430 = "อืม"
10080-100800440 = "ไม่มีที่ที่เหมาะๆ เลยรึไงน้า"
10080-100800450 = "คุณครู มีที่ที่รู้จักบ้างมั้ย?"
10080-100800460 = "ที่เหมาะๆ แบบไหนล่ะ...?"
10080-100800470 = "กำลังหาอะไรอยู่งั้นเหรอ?"
10080-100800480 = "อืม"
10080-100800490 = "พอดีฉันหิว ก็เลยกำลังหา\nที่กินอะไรหน่อย..."
10080-100800500 = "แต่ว่า"
10080-100800510 = "ฉันมีข้อจำกัดอะไรอยู่นิดหน่อยน่ะ"
10080-100800520 = "สุดยอดไปเลยนะคุณครู ฉันไปดูมาอีก\nรอบแล้วละ"
10080-100800530 = "และ..."
10080-100800540 = "ดูเหมือนจะมีคนที่คอยช่วย\n'ตรวจสอบ' แทนคุณครูอยู่ด้วย"
10080-100800550 = "ถ้าไม่ติดอะไร ฉันไปเจอพวกนั้นด้วยได้มั้ย?\nฉันเองก็เริ่มสนใจขึ้นมาแล้วละ"
10080-100800560 = "เรื่องนั้น... อาจจะยากสักหน่อย"
10080-100800570 = "ขอโทษนะ เพื่อทุกคนแล้ว\nครูทำไม่ได้จริงๆ"

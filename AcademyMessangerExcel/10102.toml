[translation]
10102-101020010 = "안녕하세요 선"
10102-101020020 = "생님. 헤헤"
10102-101020030 = "안녕 히요리."
10102-101020040 = "여전히 와이파이 상태가 안 좋구나……."
10102-101020050 = "여름이라서 은신처도 덥고, 와이파이도 끊기고……."
10102-101020060 = "그래도 견딜 수 있어요……!"
10102-101020070 = "바다에 가기로 했"
10102-101020080 = "으니까요!"
10102-101020090 = "무엇보다 기대되는 건"
10102-101020100 = "예쁜 수영복이에요!"
10102-101020110 = "저, 조만간 신상 수영복을 공짜로 얻을 수 있을지도 모르거든요!"
10102-101020120 = "선생님"
10102-101020130 = "역시 이 수영복……."
10102-101020140 = "무슨 문제라도 있는 거야?"
10102-101020150 = "진실을 알아버렸어요……."
10102-101020160 = "히요리, 그게 사실은……."
10102-101020170 = "사이즈가 한 치수 작아요!"
10102-101020180 = "엽서에 정확히 적어 놓을 걸 그랬어요!"
10102-101020190 = "아하."
10102-101020200 = "그, 그래도 다행히 우겨넣으면 들어가니까요"
10102-101020210 = "너무 걱정 마세요 선생님……."
10102-101020220 = "이상하네요……."
10102-101020230 = "왜 햇빛 아래에서는 피부가 아플까요……?"
10102-101020240 = "역시 해변을 즐기는 것도 고통인 거네요"
10102-101020250 = "저한테 여유와 낭만은 허락되지 않는 거네요"
10102-101020260 = "자외선 차단제는 발랐어?"
10102-101020270 = "네"
10102-101020280 = "일단 없어서 대체품을 바르긴 했는데요"
10102-101020290 = "갈수록 피부가 따갑네요"
10102-101020300 = "대체품……?"
10102-101020310 = "선생님 안"
10102-101020320 = "녕하세요 히요리에요"
10102-101020330 = "안녕, 히요리."
10102-101020340 = "사실은 그게, 드릴 말씀이 있어서 연락드렸는데요"
10102-101020350 = "선생님? 보고 계신가요??"
10102-101020360 = "(사진)"
10102-101020370 = "(동영상)"
10102-101020380 = "(히요리 님이 쿠폰을 보내셨습니다.)"
10102-101020390 = "어라……."
10102-101020400 = "<모모톡 무조건 읽게 하는 법>, 통하지 않는 건가요?!"
10102-101020410 = "진정해, 히요리. 와이파이 때문이니까!"
10102-101020420 = "앗, 다행이네요……."
10102-101020430 = "선생님, 오늘 저녁에 해변으로 와 주셨으면 해요"
10102-101020440 = "이유는 비밀이에요……!"
10102-101020450 = "오늘은 재밌었어요, 선생님……."
10102-101020460 = "계획이 조금 틀어지기는 했지만……."
10102-101020470 = "히요리 덕분에 즐거웠는걸."
10102-101020480 = "헤헤…… 다행이네요……."
10102-101020490 = "저"
10102-101020500 = "저도 즐거웠어요"
10102-101020510 = "선생님이랑 불꽃놀이 한 거……"
10102-101020520 = "잊지 못할 추억이 될 것 같아요……."

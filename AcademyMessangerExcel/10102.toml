[translation]
10102-101020010 = "สวัสดีค่ะ คุณ"
10102-101020020 = "ครู แหะๆ"
10102-101020030 = "สวัสดี ฮิโยริ"
10102-101020040 = "Wi-Fi ยังไม่ค่อยเสถียรเหมือนเดิม\nเลยสินะ..."
10102-101020050 = "พอเข้าฤดูร้อน ที่ซ่อนก็ร้อนอบอ้าว\nWi-Fi ก็ไม่ค่อยดีด้วย..."
10102-101020060 = "แต่ฉันก็ทนได้ค่ะ...!"
10102-101020070 = "เพราะเดี๋ยวฉันจะไปทะ"
10102-101020080 = "เลแล้วค่ะ!"
10102-101020090 = "สิ่งที่ฉันตื่นเต้นกว่าอะไรทั้งหมด"
10102-101020100 = "ก็คือชุดว่ายน้ำสวยๆ ค่ะ!"
10102-101020110 = "ฉันอาจจะได้ชุดว่ายน้ำแบบใหม่ฟรี\nในเร็วๆ นี้ก็ได้ค่ะ!"
10102-101020120 = "คุณครู"
10102-101020130 = "ชุดว่ายน้ำชุดนี้มัน..."
10102-101020140 = "มีปัญหาอะไรเหรอ?"
10102-101020150 = "ฉันรู้ความจริงของมันแล้วค่ะ..."
10102-101020160 = "ฮิโยริ คือว่า ที่จริงแล้ว..."
10102-101020170 = "ไซซ์มันเล็กไปไซซ์หนึ่งค่ะ!"
10102-101020180 = "ฉันควรบอกไซซ์ในไปรษณียบัตรให้\nชัดเจนแท้ๆ เลย!"
10102-101020190 = "อ่า..."
10102-101020200 = "ตะ... แต่ถึงอย่างนั้นฉันก็ยัดตัวเอง\nเข้าไปได้ค่ะ"
10102-101020210 = "ไม่ต้องกังวลให้มากนะคะ คุณครู..."
10102-101020220 = "แปลกจังเลยนะคะ..."
10102-101020230 = "ทำไมเวลาออกแดดแล้วถึงได้แสบผิว\nล่ะคะ...?"
10102-101020240 = "สุดท้ายการมาสนุกที่ชายหาดก็เป็น\nเรื่องที่เจ็บปวดสินะคะ"
10102-101020250 = "ฉันคงไม่มีสิทธิ์ได้พักผ่อนหรือมี\nโมเมนต์ดีๆ อย่างคนอื่นสินะคะ"
10102-101020260 = "ได้ทาครีมกันแดดหรือเปล่า?"
10102-101020270 = "ก็ทาอยู่หรอกค่ะ"
10102-101020280 = "แต่ที่ทาไม่ใช่ครีมกันแดด แต่ว่าเป็น\nอย่างอื่นที่แทนกันได้ค่ะ"
10102-101020290 = "แต่มันยิ่งทำให้ผิวแสบค่ะ"
10102-101020300 = "อย่างอื่นที่แทนกันได้เหรอ...?"
10102-101020310 = "สวัสดีค่ะ คุณ"
10102-101020320 = "ครู ฉันฮิโยรินะคะ"
10102-101020330 = "สวัสดี ฮิโยริ"
10102-101020340 = "ที่จริงฉันมีเรื่องอยากบอกคุณครู\nก็เลยติดต่อมาหาค่ะ"
10102-101020350 = "คุณครู? กำลังอ่านอยู่หรือเปล่าคะ??"
10102-101020360 = "(รูปภาพ)"
10102-101020370 = "(วิดีโอ)"
10102-101020380 = "(คุณได้รับคูปองจากฮิโยริ)"
10102-101020390 = "เอ๋..."
10102-101020400 = "<วิธีทำให้คนอื่นอ่าน MOMOTALK>\nใช้ไม่ได้ผลงั้นเหรอคะ?!"
10102-101020410 = "ใจเย็นๆ ก่อน ฮิโยริ มันเป็น\nเพราะ Wi-Fi น่ะ!"
10102-101020420 = "อ๊ะ งั้นก็โล่งอกไปทีค่ะ..."
10102-101020430 = "คุณครูคะ เย็นนี้ฉันอยากให้คุณครูมา\nที่ชายหาดหน่อยค่ะ"
10102-101020440 = "ส่วนเหตุผลนั้น... เป็นความลับค่ะ!"
10102-101020450 = "วันนี้สนุกมากเลยค่ะ คุณครู..."
10102-101020460 = "ถึงจะผิดแผนไปบ้างก็เถอะ..."
10102-101020470 = "ฮิโยริก็ทำให้ครูสนุกมากเลย"
10102-101020480 = "แหะๆ... โล่งอกไปทีนะคะ..."
10102-101020490 = "ฉัน"
10102-101020500 = "ฉันก็สนุกเหมือนกันค่ะ"
10102-101020510 = "การที่ได้เล่นดอกไม้ไฟกับคุณครู..."
10102-101020520 = "จะเป็นความทรงจำที่ฉันไม่ลืมเลยค่ะ..."

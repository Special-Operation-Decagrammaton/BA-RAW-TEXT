[translation]
10102-101020010 = "你好呀，老"
10102-101020020 = "師，耶嘿嘿"
10102-101020030 = "嗨，日和"
10102-101020040 = "你那邊的Wi-Fi還是一如既往地糟糕呢……"
10102-101020050 = "到了夏天之後，我們的藏身處就越來越熱，甚至連Wi-Fi也常常斷掉……"
10102-101020060 = "不過我還撐得下去……！"
10102-101020070 = "因為我們很快就"
10102-101020080 = "要去海邊了！"
10102-101020090 = "但最讓我期待的"
10102-101020100 = "還是穿上漂亮的泳裝！"
10102-101020110 = "偷偷跟你說，我之後說不定能免費得到一件泳裝哦！"
10102-101020120 = "老師"
10102-101020130 = "這件泳裝果然……"
10102-101020140 = "有什麼問題嗎？"
10102-101020150 = "我其實已經知道了……"
10102-101020160 = "日和，那個，其實我……"
10102-101020170 = "那就是這件泳裝小了一號！"
10102-101020180 = "早知道當初就在明信片上寫清楚了！"
10102-101020190 = "啊哈哈……"
10102-101020200 = "不，不過只要稍微擠一下，還是勉強能穿上就是了"
10102-101020210 = "老師也不用太擔心……"
10102-101020220 = "真奇怪……"
10102-101020230 = "為什麼皮膚曬到太陽會痛呢……？"
10102-101020240 = "果然就連來海邊享受也只是一種痛苦而已"
10102-101020250 = "難道我連片刻的從容和浪漫都無法擁有嗎？"
10102-101020260 = "你有擦防曬油嗎？"
10102-101020270 = "呃"
10102-101020280 = "我手邊沒有防曬油，所以就擦了類似的東西來代替"
10102-101020290 = "可是現在皮膚越來越痛了"
10102-101020300 = "類似的東西……？"
10102-101020310 = "老師，你"
10102-101020320 = "好，我是日和"
10102-101020330 = "嗨，日和"
10102-101020340 = "這次之所以聯絡老師，是因為有些話想跟你說"
10102-101020350 = "老師？有看到嗎？"
10102-101020360 = "（照片）"
10102-101020370 = "（影片）"
10102-101020380 = "（用戶「日和」向您發送了優惠券）"
10102-101020390 = "咦……"
10102-101020400 = "難道「必定會讓對方查看MomoTalk的密技」根本不管用嗎！？"
10102-101020410 = "日和你先冷靜，剛才是Wi-Fi的關係啦！"
10102-101020420 = "啊，那就好……"
10102-101020430 = "老師，今天傍晚能請你來海邊一趟嗎？"
10102-101020440 = "不過理由必須保密……！"
10102-101020450 = "我今天真的玩得很開心，老師……"
10102-101020460 = "雖然計畫出了點差錯……"
10102-101020470 = "多虧了日和，我今天也很開心哦"
10102-101020480 = "耶嘿嘿……太好了……"
10102-101020490 = "我"
10102-101020500 = "我也很開心"
10102-101020510 = "和老師一起放煙火……"
10102-101020520 = "肯定會成為我永生難忘的回憶……"

[translation]
10039-100390010 = "คือว่า... คุณครูคะ"
10039-100390020 = "คือ..."
10039-100390030 = "ถ้าคุณครูไม่ว่าอะไร..."
10039-100390040 = "ฉันขอรบกวนเวลาวันหยุดสุดสัปดาห์นี้\nหน่อยได้มั้ยคะ?"
10039-100390050 = "ได้อยู่แล้ว มีเรื่องอะไรเหรอ?"
10039-100390060 = "คือว่า..."
10039-100390070 = "คือเรื่องนั้น..."
10039-100390080 = "สุดสัปดาห์นี้ ฉันว่าจะไปซื้ออุปกรณ์ใหม่ที่\nร้านขายอุปกรณ์ตั้งแคมป์ในเมืองค่ะ..."
10039-100390090 = "ตอนนี้ในกองทหารของเรา คนที่พอจะ\nว่าง ดันมีแค่ฉันคนเดียว..."
10039-100390100 = "คุณครูพอจะช่วยฉันหน่อยได้รึเปล่าคะ?"
10039-100390110 = "มีของที่ต้องซื้อเยอะเลยสินะ"
10039-100390120 = "ไม่ได้เยอะอะไรมากมายหรอกค่ะ..."
10039-100390130 = "แต่ถ้าฉันไปซื้อของคนเดียว..."
10039-100390140 = "อาจไม่มีใครยอมคุยด้วยเลยก็ได้ค่ะ..."
10039-100390150 = "หมายความว่ายังไงน่ะ?"
10039-100390160 = "คือ... คุณครูคะ"
10039-100390170 = "วันนี้ภารกิจของกองทหาร RABBIT\nเสร็จเร็วกว่ากำหนด"
10039-100390180 = "ฉันคงไปเข้าเวรได้เร็วกว่ากำหนดน่ะค่ะ"
10039-100390190 = "คือว่า..."
10039-100390200 = "ก่อนที่จะไปชาเล่ต์ มีงานอื่นที่ต้องทำอีก\nหรือเปล่าคะ?"
10039-100390210 = "คือว่า..."
10039-100390220 = "คุณครูคะ?"
10039-100390230 = "หรือว่าหลับอยู่เหรอคะ?"
10039-100390240 = "คุณครูคะ..."
10039-100390250 = "ฉันได้ยินว่าคุณครูเจอปัญหาใหญ่เพราะ\nปลอกคอนั่น..."
10039-100390260 = "ขอโทษด้วยนะคะ..."
10039-100390270 = "คิดแล้วเชียวว่าฉันมันไร้ประโยชน์จริงๆ ค่ะ..."
10039-100390280 = "ไม่เป็นไรนะ ไม่ต้องคิดมากหรอก"
10039-100390290 = "ตั้งแต่เกิดมาฉันเพิ่งเคยได้รับความสนใจ\nมากแบบนี้เป็นครั้งแรก..."
10039-100390300 = "ฉันเลยรู้สึกเสียดายถ้าจะต้องปล่อย\nมือจากปลอกคอนี้ไปค่ะ"
10039-100390310 = "ถ้าคุณครูไม่ว่าอะไร..."
10039-100390320 = "อย่างน้อยขอแค่ตอนอยู่ที่ชาเล่ต์ ขอใส่\nปลอกคอนี่ได้รึเปล่าคะ?"
10039-100390330 = "แบบนั้นจะยิ่งถูกเข้าใจผิดไปกันใหญ่\nอย่าดีกว่านะ..."
10039-100390340 = "ไม่รู้ว่าทำไมช่วงนี้..."
10039-100390350 = "ฉันรู้สึกว่าทำผิดบ่อยๆ ตอนอยู่ใน\nกองทหารน่ะค่ะ..."
10039-100390360 = "คิดแล้วเชียวว่าฉันเป็นคนที่ไร้ประโยชน์\nจริงๆ ค่ะ..."
10039-100390370 = "ไม่หรอกนะ"
10039-100390380 = "มิยุเป็นสไนเปอร์ที่เก่งมากเลย"
10039-100390390 = "แต่ว่า..."
10039-100390400 = "ฉันได้รับการฝึกอย่างเป็นทางการเมื่อนาน\nมาแล้ว..."
10039-100390410 = "ตอนนี้ไม่รู้เลยค่ะว่าจะยิงได้แม่นเหมือน\nเมื่อก่อนรึเปล่า"
10039-100390420 = "ถ้าคุณครูไม่ว่าอะไร..."
10039-100390430 = "ช่วยไปร่วมฝึกกับฉันหน่อยได้มั้ยคะ?"
10039-100390440 = "จากการฝึกครั้งที่แล้ว..."
10039-100390450 = "ดูเหมือนทักษะการยิงของฉันจะดีขึ้นมา\nนิดหน่อยค่ะ..."
10039-100390460 = "แต่ฉันกลับเจอปัญหาบ่อยๆ เพราะเอาแต่\nคิดแง่ลบน่ะค่ะ..."
10039-100390470 = "รู้สึกหดหู่บ่อยๆ..."
10039-100390480 = "ลองหางานอดิเรกทำดีมั้ย?"
10039-100390490 = "งานอดิเรก..."
10039-100390500 = "นั่นสินะคะ......"
10039-100390510 = "ถ้าทำงานอดิเรกละก็"
10039-100390520 = "ความรู้สึกแบบนี้อาจจะหายไปก็ได้ค่ะ..."
10039-100390530 = "คุณครูคะ คือว่าตอนเข้าเมืองพรุ่งนี้..."
10039-100390540 = "ถ้าคุณครูสะดวก ช่วยพาฉันไปด้วย\nได้รึเปล่าคะ...?"
10039-100390550 = "ได้อยู่แล้วสิ!"
10039-100390560 = "ว่าแต่ว่าจะเข้าเมืองไปทำอะไรเหรอ?"
10039-100390570 = "คือว่า..."
10039-100390580 = "พอดีมีภารกิจของ SRT ที่ต้องไปทำ\nในเมืองน่ะค่ะ..."
10039-100390590 = "อย่าบอกนะว่าจะไปต่อสู้ในเมืองน่ะ?!"
10039-100390600 = "เปล่าค่ะ ไม่ใช่ภารกิจใหญ่ๆ อะไร\nแบบนั้นหรอกค่ะ! "
10039-100390610 = "คือว่า..."
10039-100390620 = "บางครั้งเราก็จะได้รับคำขอจาก\nชาวเมืองแถวๆ นี้"
10039-100390630 = "ให้มาช่วยรับผักหรือวัตถุดิบอาหารที่\nเหลือ แล้วก็งานอื่นๆ น่ะค่ะ..."
10039-100390640 = "ถ้าเรื่องพวกนั้น เดี๋ยวครูไปช่วยนะ"
10039-100390650 = "คุณครูจะมาช่วยจริงๆ เหรอคะ?"
10039-100390660 = "ฉันไม่รู้ว่ามันจะใช้เวลานานรึเปล่า..."

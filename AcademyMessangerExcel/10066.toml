[translation]
10066-100660010 = "우우우…… 우우우……"
10066-100660020 = "아리스? 왜 그래? 무슨 일 있어?"
10066-100660030 = "우우우…… 아리스는 도움이 필요합니다."
10066-100660040 = "꼼짝도 할 수 없는 겁니다. 몸에 힘이 들어가지 않습니다……"
10066-100660050 = "지금 갈게!"
10066-100660060 = "선생님."
10066-100660070 = "아리스는 찾아내고 말았습니다."
10066-100660080 = "무엇을……?"
10066-100660090 = "그것은 바로, 메이드 레벨을 올리는 새로운 방법입니다."
10066-100660100 = "굉장한 선언을 들은 것 같은 기분이다……"
10066-100660110 = "오늘의 아리스는 다릅니다. 다를 겁니다."
10066-100660120 = "메이드라는 것은 무엇인가! 어떤 일을 하는가!"
10066-100660130 = "그것을 공부하는 겁니다, 선생님!"
10066-100660140 = "그리고 아리스는, 그러기 위한 자료를 찾아내고야 말았으니까요!"
10066-100660150 = "메이드 자료?!"
10066-100660160 = "선생님."
10066-100660170 = "중대한 소식이 있습니다."
10066-100660180 = "아리스의 중대한 소식……"
10066-100660190 = "뭔가 대단한 일이 일어날 것 같은 기분이 든다……"
10066-100660200 = "정말 중요한 소식입니다."
10066-100660210 = "그러니까 선생님이 꼭 와 주셨으면 합니다."
10066-100660220 = "큰일이 난 거 아니지!?"
10066-100660230 = "선생님."
10066-100660240 = "오늘은 바쁘신가요?"
10066-100660250 = "별다른 예정은 없는데?"
10066-100660260 = "그렇군요!"
10066-100660270 = "큰 예정이 없는 날……."
10066-100660280 = "그것은 청소를 하기 좋은 날이라고 배웠습니다!"
10066-100660290 = "청소라니~!"
10066-100660300 = "걱정 마세요, 선생님!"
10066-100660310 = "견습 메이드 용사인 아리스가, 선생님을 돕겠습니다!"
10066-100660320 = "메이드 용사는 결코 도움이 필요한 사람을 저버리지 않으니까요!"

[translation]
10066-100660010 = "ฮือ... ฮือ..."
10066-100660020 = "อาริสึ? เป็นอะไรเหรอ? เกิดอะไรขึ้น?"
10066-100660030 = "ฮือ... อาริสึต้องการความช่วยเหลือค่ะ"
10066-100660040 = "อาริสึขยับไม่ได้เลยค่ะ ร่างกายไม่มี\nแรงเลยค่ะ..."
10066-100660050 = "ครูจะไปเดี๋ยวนี้เลย!"
10066-100660060 = "คุณครู"
10066-100660070 = "อาริสึหามันเจอแล้วค่ะ"
10066-100660080 = "อะไรเหรอ...?"
10066-100660090 = "มันก็คือ วิธีใหม่ที่จะเพิ่มเลเวลของ\nเมดค่ะ"
10066-100660100 = "รู้สึกเหมือนได้ยินคำประกาศที่ยิ่งใหญ่\nเลย..."
10066-100660110 = "อาริสึในวันนี้ไม่เหมือนแต่ก่อนแล้วค่ะ"
10066-100660120 = "อาริสึจะศึกษาว่า"
10066-100660130 = "เมดคืออะไร และทำงานแบบไหนค่ะ\nคุณครู!"
10066-100660140 = "และอาริสึก็เจอข้อมูลเพื่อเอาไปศึกษา\nแล้วค่ะ!"
10066-100660150 = "ข้อมูลของเมดเหรอ?!"
10066-100660160 = "คุณครู"
10066-100660170 = "นี่คือข่าวสำคัญค่ะ"
10066-100660180 = "ข่าวสำคัญของอาริสึ..."
10066-100660190 = "เหมือนจะมีเรื่องยิ่งใหญ่เกิดขึ้นเลย..."
10066-100660200 = "เป็นข่าวที่สำคัญจริงๆ นะคะ"
10066-100660210 = "อาริสึก็เลยอยากให้คุณครูช่วยมาที่นี่ค่ะ"
10066-100660220 = "ไม่ได้เกิดเรื่องร้ายแรงอะไรใช่มั้ย!?"
10066-100660230 = "คุณครู"
10066-100660240 = "วันนี้งานยุ่งรึเปล่าคะ?"
10066-100660250 = "วันนี้ครูไม่ได้มีงานอะไรเป็นพิเศษนะ"
10066-100660260 = "งั้นเหรอคะ!"
10066-100660270 = "วันที่ไม่มีงานอะไรเป็นพิเศษ..."
10066-100660280 = "ได้ยินมาว่าเป็นวันที่เหมาะกับการ\nทำความสะอาดเลยนะคะ!"
10066-100660290 = "ทำความสะอาดเหรอ~!"
10066-100660300 = "ไม่ต้องกังวลนะคะ คุณครู!"
10066-100660310 = "ผู้กล้าเมดฝึกหัด อาริสึจะช่วยคุณครู\nเองค่ะ!"
10066-100660320 = "ผู้กล้าเมดจะไม่ทอดทิ้งผู้ที่ต้องการ\nความช่วยเหลือเด็ดขาดค่ะ!"

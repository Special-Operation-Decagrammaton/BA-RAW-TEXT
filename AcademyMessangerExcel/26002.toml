[translation]
26002-1972 = "老師覺得料理中最重要的調味料是什麼？"
26002-1973 = "糖？"
26002-1974 = "鹽？"
26002-1975 = "是啊，那些當然也很重要，但是……"
26002-1976 = "但是……？"
26002-1977 = "真正重要的調味料……"
26002-1978 = "不是糖和鹽那種普通的東西"
26002-1979 = "答案是……"
26002-1980 = "愛！"
26002-1981 = "愛……？"
26002-1982 = "確實……"
26002-1983 = "是吧？"
26002-1984 = "但是，我有一個疑問"
26002-1985 = "疑問？"
26002-1986 = "愛是料理最佳的調味料，這一點沒有異議"
26002-1987 = "但就算這樣……"
26002-1988 = "在料理中要放入多少的愛才是適量的呢？"
26002-1989 = "……適量？"
26002-1990 = "微微的，提味的程度嗎？"
26002-1991 = "還是說要清楚明顯？"
26002-1992 = "或者是要多放一點，效果才會好……？"
26002-1993 = "我在意到晚上也睡不著！"
26002-1994 = "那個，那是……"
26002-1995 = "我想找到那個答案，能幫我嗎？"
26002-1996 = "嗯，是可以……"
26002-1997 = "老師……我又挨罵了……"
26002-1998 = "茱莉被罵了嗎？為什麼？"
26002-1999 = "又……？"
26002-2000 = "在做料理的時候，不小心引起爆炸了……"
26002-2001 = "那確實可能被罵……"
26002-2002 = "發生了什麼事……？"
26002-2003 = "那個……"
26002-2004 = "我只不過是將醋、糖、鹽還有美乃滋混在一起就……碰！"
26002-2005 = "那個為什麼會爆炸！？"
26002-2006 = "那些材料有爆炸的要素！？"
26002-2007 = "耶，啊咧？"
26002-2008 = "爆炸是料理中很常見的吧？"
26002-2009 = "那個特製醬汁絕對會很好吃的，太可惜了……！"
26002-2010 = "用麵包沾那個醬汁吃很流行的唷！"
26002-2011 = "……在未來的話！"
26002-2012 = "那是很常見的嗎，我不知道耶……"
26002-2013 = "這樣啊……"
26002-2014 = "唔嗯，真令人困擾……"
26002-2015 = "哪裡做錯了呢……"
26002-2016 = "這種事，一個人怎麼也察覺不到吧……"
26002-2017 = "這樣的話，能讓我看看茱莉怎麼料理的嗎？"
26002-2018 = "啊，非常感謝。可以拜託您嗎？"
26002-2019 = "如果讓老師看的話，可能會知道原因……！"
26002-2020 = "那麼，拜託你了！"
26002-2021 = "老師，謝謝您今天的意見"
26002-2022 = "真的幫了大忙"
26002-2023 = "託您的福，我知道今天的方法很危險，"
26002-2024 = "所以下次想挑戰不同的方法！"
26002-2025 = "照著食譜做如何……？"
26002-2026 = "料理之路是無窮無盡的！"
26002-2027 = "我認為探索是料理的樂趣之一！"
26002-2028 = "這樣啊，開心很重要呢。嗯……"
26002-2029 = "又挨罵了……"
26002-2030 = "這次發生了什麼事？"
26002-2031 = "今天中午，我做的鹽烤秋刀魚逃跑了……"
26002-2032 = "等等，什麼東西逃跑了……？"
26002-2033 = "那個，鹽烤秋刀魚…"
26002-2034 = "鹽烤秋刀魚，物理上會逃跑嗎？"
26002-2035 = "那個，是的……"
26002-2036 = "說起來很羞恥……"
26002-2037 = "那個……"
26002-2038 = "大概一個禮拜會跑掉一次……"
26002-2039 = "不知道該羞恥的是哪件事……"
26002-2040 = "還會定期逃跑啊"
26002-2041 = "為什麼我做料理的時候，都會發生這種事呢"
26002-2042 = "老師，您覺得呢……？"
26002-2043 = "那我們來實驗看看吧？"
26002-2044 = "實驗……嗎？"
26002-2045 = "找出茱莉做的料理為什麼會那樣"
26002-2046 = "透過條件匹配或實驗來找出問題的原因"
26002-2047 = "原來如此……"
26002-2048 = "只要知道原因，問題就能解決了……"
26002-2049 = "確實如此！"
26002-2050 = "非常感謝，務必拜託了！"
26002-2051 = "那麼，今天能請您來學校食堂嗎？拜託了！"
26002-260020010 = "老師，那個"
26002-260020020 = "怎麼了嗎？"
26002-260020030 = "又挨罵了嗎……？"
26002-260020040 = "啊，那個，這次不是被罵！"
26002-260020050 = "反而是獲得了稱讚！"
26002-260020060 = "因為，今天鍋子還沒爆炸！"
26002-260020070 = "那真是，太好了呢……？"
26002-260020080 = "沒錯，我也有漸漸在成長的！"
26002-260020090 = "啊，有件事想拜託老師"
26002-260020100 = "可以的話，那個"
26002-260020110 = "這個週末能占用老師一點時間嗎？"
26002-260020120 = "正好那天因為供給部的事要去學校一趟"
26002-260020130 = "有個東西想給老師看"
26002-260020140 = "嗯，了解"
26002-260020150 = "謝謝老師！"
26002-260020160 = "那麼，我會在學生餐廳等著哦！"
26002-260020170 = "今天抱歉給你添麻煩了……"
26002-260020180 = "沒關係的，別在意。身體還好嗎？是不是因為天氣太熱了？"
26002-260020190 = "我的身體沒問題！"
26002-260020200 = "雖然只是一種可能，根據我聽到的消息，難道說……"
26002-260020210 = "？"
26002-260020220 = "沒，沒什麼！請別在意……！"
26002-260020230 = "老，老師之後如果也願意幫忙的話，我會很開心的！"
26002-260020240 = "到時候就，選陽光比較不強的日子……"
26002-260020250 = "總，總之今後也請多多指教！"

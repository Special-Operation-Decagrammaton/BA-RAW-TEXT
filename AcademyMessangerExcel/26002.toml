[translation]
26002-1972 = "คุณครูคิดว่าเครื่องปรุงกับเครื่องเทศที่\nสำคัญที่สุดที่ใช้ปรุงอาหารคืออะไรคะ?"
26002-1973 = "น้ำตาลเหรอ?"
26002-1974 = "เกลือ?"
26002-1975 = "แน่นอนว่าการใส่เครื่องปรุงพวกนั้นก็ไม่\nได้เสียหายอะไร"
26002-1976 = "หมายถึงพอใส่ลงไปแล้วรสชาติ\nไม่แย่งั้นเหรอ?!"
26002-1977 = "คะ? แต่ว่าถึงยังไง..."
26002-1978 = "ที่จริงแล้วมีเครื่องปรุงรสที่สำคัญอยู่อีก\nอย่างนึงนะคะ"
26002-1979 = "และนั่นก็คือ..."
26002-1980 = "ความรักยังไงล่ะคะ!"
26002-1981 = "ความรัก...?"
26002-1982 = "ก็นะ... มีคนพูดแบบนั้นอยู่ด้วยเหมือนกัน"
26002-1983 = "ใช่ไหมล่ะคะ?"
26002-1984 = "แต่ถึงจะเป็นแบบนั้นฉันน่ะ... มีคำถาม\nเรื่องนึงค่ะ"
26002-1985 = "คำถามเหรอ?"
26002-1986 = "สำหรับผู้หญิงแล้วเครื่องปรุงรสที่สำคัญที่\nสุดของอาหารก็คือความรักค่ะ"
26002-1987 = "แต่ว่าที่จริงแล้ว..."
26002-1988 = "ความรักที่เราเติมลงไปในอาหาร...\nต้องใส่ไปเท่าไหร่ถึงจะพอดีเหรอคะ?"
26002-1989 = "คะ...ความพอดีเหรอ....?"
26002-1990 = "ใส่ลงไปแค่นิดหน่อยเหมือนใส่พริกให้\nรู้สึกเผ็ดร้อน?"
26002-1991 = "หรือว่าจะต้องใส่ลงไปให้พอดีไม่มากเกิน\nไปเหมือนการใส่น้ำตาลกันล่ะคะ?"
26002-1992 = "หรือว่าจะต้องใส่ลงไปเยอะๆ จนล้นถึงจะ\nดีคะ?"
26002-1993 = "ฉัน...กังวลเรื่องนี้มากเลยค่ะ!"
26002-1994 = "อะ... อืม?"
26002-1995 = "คุณครูพอจะช่วยฉันหาคำตอบเรื่องนี้ให้\nหน่อยได้ไหมคะ?"
26002-1996 = "หืมมมมม?"
26002-1997 = "คุณครูคะ... ฉันโดนดุมาอีกแล้วค่ะ"
26002-1998 = "หืม? ถูกดุงั้นเหรอ? ทำไมล่ะ "
26002-1999 = "\"อีกแล้ว\" งั้นเหรอ?\nหมายถึงอะไรน่ะ?"
26002-2000 = "ตอนที่ฉันทำอาหาร ฉันเผลอทำผิด\nพลาดจนเกิดระเบิดขึ้น..."
26002-2001 = "เดี๋ยวนะ ผิดพลาดงั้นเหรอ...?"
26002-2002 = "เกิดอะไรขึ้นกันแน่...?"
26002-2003 = "คะ?"
26002-2004 = "พอฉันเอาน้ำตาลกับเกลือผสมลงในน้ำส้ม\nสายชู... แล้วก็ใส่มายองเนสลงไป...\nมันก็...กลายเป็นแบบนั้น"
26002-2005 = "ทำไมมันถึงระเบิดได้ล่ะ?!"
26002-2006 = "เอาน้ำตาลกับเกลือแล้วก็มายองเนส\nใส่ลงไปในน้ำส้มสายชูแล้วระเบิด?"
26002-2007 = "เอ๊ะ? แต่การทำอาหารมันก็เกิดเรื่องแบบ\nนี้ได้บ่อยๆ ไม่ใช่เหรอคะ?"
26002-2008 = "ระเบิดน่ะค่ะ"
26002-2009 = "ฉันทำเพื่อสร้างเครื่องปรุงแสนอร่อยนะคะ!"
26002-2010 = "ช่วงนี้ทุกคนฮิตการกินขนมปังจิ้มซอส\nกันนี่คะ! "
26002-2011 = "อาจจะนะคะ!"
26002-2012 = "เดี๋ยวสิ... ปกติมันไม่น่าจะระเบิดนะ..."
26002-2013 = "เอ่อ... มีเรื่องแบบนี้เกิดขึ้นบ่อยๆ\nงั้นเหรอ....?!  ระเบิด....?"
26002-2014 = "อืม... แบบนี้ก็แย่เลยนะคะ"
26002-2015 = "วิธีทำอาหารของฉันมันมีปัญหาตรงไหน\nกันน้า..."
26002-2016 = "ถ้าลำพังฉันทำอาหารคนเดียวคงดูไม่\nออกแน่..."
26002-2017 = "ถ้างั้นให้ครูช่วยดูให้ไหม?\nเรื่องทำอาหารน่ะ"
26002-2018 = "โอ๊ะ? จริงเหรอคะ"
26002-2019 = "ถ้าคุณครูคอยช่วยดูให้ล่ะก็จะต้องรู้ได้แน่ๆ\nค่ะ ว่าปัญหาอยู่ที่ตรงไหน..."
26002-2020 = "ฮุฮุ! ถ้างั้นก็ขอรบกวนด้วยนะคะ!"
26002-2021 = "ความเห็นของคุณครู ฉันทราบดีแล้วค่ะ"
26002-2022 = "สุดท้ายก็ให้คุณครูช่วยเยอะเลย"
26002-2023 = "วันนี้ฉันรู้แล้วค่ะว่าวิธีทำอาหารที่ฉันทำ\nมันอันตราย..."
26002-2024 = "คราวหน้าฉันจะลองใช้วิธีอื่นดูค่ะ!"
26002-2025 = "ถ้างั้นลองทำตามสูตรปกติดู...\nจะดีกว่าไหม...?"
26002-2026 = "เส้นทางการทำอาหารของฉันยังอีก\nยาวไกลค่ะ!"
26002-2027 = "ฉันคิดว่าการไล่ตามเส้นทางความฝัน\nการทำอาหาร มันก็เป็นความสุขในการ\nทำอาหารอย่างหนึ่งค่ะ!"
26002-2028 = "อื้อ แค่จูริสนุกไปกับมันก็พอแล้ว"
26002-2029 = "ฉันโดนดุอีกแล้วค่ะ..."
26002-2030 = "หืม? มีเรื่องอะไรอีกเหรอ?"
26002-2031 = "จู่ๆ ปลาดาบเงินย่างที่ฉันทำไว้เป็นมื้อ\nกลางวัน มันหนีไปน่ะสิคะ..."
26002-2032 = "เดี๋ยวนะ อะไรหนีไปนะ?"
26002-2033 = "คะ? ปลาดาบเงินย่าง...ค่ะ"
26002-2034 = "ปกติปลาดาบเงินที่ย่างแล้วมันหนี\nไปได้ด้วยเหรอ?"
26002-2035 = "ก็..."
26002-2036 = "น่าอายจัง... "
26002-2037 = "แต่บางครั้งฉัน..."
26002-2038 = "ประมาณอาทิตย์ละครั้ง..."
26002-2039 = "เรื่องนั้น...เป็นเรื่องนี่น่าอายงั้นเหรอ??"
26002-2040 = "หนีไปประจำสินะ!"
26002-2041 = "อืม... ไม่รู้ว่าทำไมเวลาฉันทำอาหารถึง\nมีเรื่องแบบนี้เกิดขึ้นอยู่เรื่อย"
26002-2042 = "ทำยังไงดีคะ คุณครู...!"
26002-2043 = "ถ้างั้น... เรามาทดลองกันดูดีกว่า"
26002-2044 = "ทดลองเหรอคะ?"
26002-2045 = "ว่าทำไมถึงเกิดเรื่องแบบนี้ขึ้นกับ\nอาหารที่จูริทำไงล่ะ "
26002-2046 = "ทำการทดลองเพื่อหาสาเหตุยังไงล่ะ"
26002-2047 = "สุดท้าย..."
26002-2048 = "ถึงจะรู้สาเหตุแต่ก็ไม่รู้ว่าจะแก้ไขปัญหา\nได้รึเปล่า"
26002-2049 = "แบบนี้นี่เองสินะคะ"
26002-2050 = "ค่ะ! ฉันเข้าใจแล้วค่ะ"
26002-2051 = "ถ้างั้นวันนี้ฉันจะรอที่โรงอาหารนะคะ!"
26002-260020010 = "คุณครูคะ คือว่า..."
26002-260020020 = "หืม? จูริ มีอะไรเหรอ?"
26002-260020030 = "หรือว่า... โดนดุมาอีกแล้วเหรอ?"
26002-260020040 = "ปะ...เปล่าค่ะ! ไม่ได้มีเรื่องอะไรหรอกค่ะ"
26002-260020050 = "ฉันแค่อยากได้รับคำชมน่ะค่ะ!"
26002-260020060 = "อ่ะแฮ่ม! วันนี้ฉันทำอาหารแล้วหม้อไม่\nระเบิดสักครั้งเลยนะคะ! "
26002-260020070 = "อะ... อ๋อ งั้นเหรอ... แบบนั้นก็ดีแล้วละ... "
26002-260020080 = "ฮุฮุ ก็ฉันค่อยๆ พัฒนาขึ้นยังไงล่ะคะ!"
26002-260020090 = "และที่ฉันติดต่อคุณครูวันนี้..."
26002-260020100 = "คือว่า..."
26002-260020110 = "คุณครูคะ สุดสัปดาห์นี้พอมีเวลาว่าง\nรึเปล่าคะ?"
26002-260020120 = "สุดสัปดาห์นี้เป็นวันทำกิจกรรมประจำ\nของชมรมโภชนาการของเกเฮนน่า..."
26002-260020130 = "เลยอยากขอให้คุณครูมาช่วยฉันหน่อย\nน่ะค่ะ"
26002-260020140 = "ถ้าเรื่องนั้นละก็ไม่มีปัญหาหรอก... "
26002-260020150 = "ฮุฮุ-! ค่ะ!"
26002-260020160 = "ถ้างั้นตอนสุดสัปดาห์ ฉันจะรออยู่ที่\nโรงอาหารนะคะ!"
26002-260020170 = "ขะ... ขอโทษที่ทำให้ลำบากนะคะ\nคุณครู..."
26002-260020180 = "แล้วร่างกายโอเคมั้ย? วันนี้อากาศ\nร้อนเกินไปรึไงนะ?"
26002-260020190 = "ฉันไม่เป็นไรค่ะ! "
26002-260020200 = "คือว่าคราวนี้ไม่ใช่แบบนั้นหรอกค่ะ..."
26002-260020210 = "...?"
26002-260020220 = "ปะ... เปล่าค่ะ! คะ... คือว่าคราวหน้า!"
26002-260020230 = "ค่ะ! คราวหน้ามาจัดสวนด้วยกันอีก\nนะคะ คุณครู!"
26002-260020240 = "ตอนนั้น... คือว่าขอเป็นวันที่แดดไม่ร้อน..."
26002-260020250 = "อะ... เอาเป็นว่าต่อไปก็ขอรบกวนด้วย\nนะคะ!"

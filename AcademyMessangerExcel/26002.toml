[translation]
26002-1972 = "Sensei, guess what the most important spice is when you're cooking."
26002-1973 = "Sugar?"
26002-1974 = "Salt?"
26002-1975 = "Well, that's important too."
26002-1976 = "What could be more important than that?"
26002-1977 = "Huh? But..."
26002-1978 = "There's something else that's extremely important."
26002-1979 = "The answer is..."
26002-1980 = "LOVE!"
26002-1981 = "Love...?"
26002-1982 = "Well, that's what some people say."
26002-1983 = "Right?"
26002-1984 = "But if that's the case, I have a question."
26002-1985 = "What's your question?"
26002-1986 = "Well, I do agree that love is the greatest spice when it comes to cooking."
26002-1987 = "But then..."
26002-1988 = "How much love do you need to put in?"
26002-1989 = "How much love?"
26002-1990 = "Maybe just a teensy bit, like a spice?"
26002-1991 = "Or just enough for you to be able to taste it?"
26002-1992 = "Or a whole pot-load of it?"
26002-1993 = "I can't figure it out!"
26002-1994 = "U-Um?"
26002-1995 = "Can you please help me figure this out?"
26002-1996 = "What?"
26002-1997 = "Sensei... I got in trouble again."
26002-1998 = "Huh? For what?"
26002-1999 = "What do you mean \"again\"?"
26002-2000 = "I accidentally caused another explosion while I was cooking..."
26002-2001 = "Accidentally?"
26002-2002 = "But how?"
26002-2003 = "Yeah?"
26002-2004 = "I mixed vinegar, sugar, salt, and mayonnaise. And then all of a sudden..."
26002-2005 = "It just exploded!"
26002-2006 = "Wait... You mixed vinegar, sugar, salt, and mayonnaise, and it exploded?"
26002-2007 = "What, doesn't that happen when you're cooking?"
26002-2008 = "Explosions."
26002-2009 = "I was trying to make a delicious sauce!"
26002-2010 = "Everyone's been dipping their breadsticks in this sauce! "
26002-2011 = "At least, I think!"
26002-2012 = "Um... No, I don't think explosions are that common..."
26002-2013 = "Really? Maybe explosions are more common than you think..."
26002-2014 = "Hm... But I'm in trouble now."
26002-2015 = "I wonder what's wrong with my cooking..."
26002-2016 = "It's hard for me to figure this out on my own..."
26002-2017 = "Why don't I watch you while you cook?"
26002-2018 = "Really?"
26002-2019 = "If you watch me, then I'm sure we can figure out what I'm doing wrong..."
26002-2020 = "Heehee! I'll see you soon!"
26002-2021 = "I learned a lot from you, Sensei."
26002-2022 = "Thank you very much."
26002-2023 = "I finally understand that what I was doing was quite dangerous."
26002-2024 = "I'm going to try using a different method next time!"
26002-2025 = "Why don't you just stick to the recipe...?"
26002-2026 = "But cooking is all about being creative! "
26002-2027 = "That's one of the greatest joys of cooking! Isn't it?"
26002-2028 = "Well... As long as you're having fun."
26002-2029 = "I got in trouble again..."
26002-2030 = "What happened this time?"
26002-2031 = "The grilled saury I made for lunch suddenly ran away..."
26002-2032 = "Wait, what? It ran away?"
26002-2033 = "But it's grilled saury..."
26002-2034 = "Does grilled saury typically run away?"
26002-2035 = "Um..."
26002-2036 = "I'm a little embarrassed... "
26002-2037 = "But yes..."
26002-2038 = "It happens about once a week..."
26002-2039 = "There's no need to be embarrassed... I think?"
26002-2040 = "Ah, so it happens regularly!"
26002-2041 = "I don't know why things like this happen to me so often!"
26002-2042 = "What should I do, Sensei?"
26002-2043 = "Why don't we do an experiment?"
26002-2044 = "An experiment?"
26002-2045 = "An experiment to uncover why these things happen when you cook."
26002-2046 = "We'll figure out the cause."
26002-2047 = "I wonder..."
26002-2048 = "If we can figure out the cause, then we may be able to find a solution."
26002-2049 = "That's what I'm talking about!"
26002-2050 = "Yes! Okay!"
26002-2051 = "I'll see you at the student dining hall!"
26002-260020010 = "Sensei, um..."
26002-260020020 = "Huh? Juri, what's going on?"
26002-260020030 = "...Did you get scolded again?"
26002-260020040 = "Oh, no! It's not that something happened."
26002-260020050 = "Actually, I think I deserve some compliments today!"
26002-260020060 = "Not a single pot exploded when I was cooking today. Heehee!"
26002-260020070 = "I-I see. That's great..."
26002-260020080 = "Heehee! I'm improving bit by bit!"
26002-260020090 = "But the real reason I contacted you is..."
26002-260020100 = "So, umm..."
26002-260020110 = "Sensei, are you free this weekend?"
26002-260020120 = "There's a regular Gehenna School Lunch Club activity this weekend..."
26002-260020130 = "I was hoping you could help me..."
26002-260020140 = "Of course. That's no problem at all. "
26002-260020150 = "Heehee! Okay!"
26002-260020160 = "I'll meet you at the student dining hall this weekend!"
26002-260020170 = "I-I'm sorry to inconvenience you today, Sensei."
26002-260020180 = "Are you okay? It was pretty hot today."
26002-260020190 = "I'm okay! "
26002-260020200 = "This isn't about that..."
26002-260020210 = "...?"
26002-260020220 = "I-It's nothing! I'll talk to you later!"
26002-260020230 = "Let's work on the vegetable garden together again, Sensei!"
26002-260020240 = "We'll make sure it's not too hot next time..."
26002-260020250 = "A-Anyway, I'm looking forward to it!"

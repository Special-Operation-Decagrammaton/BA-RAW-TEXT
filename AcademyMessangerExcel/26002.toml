[translation]
26002-1972 = "선생님, 요리에서 가장 중요한 향신료가 무엇이라고 생각하시나요?"
26002-1973 = "설탕?"
26002-1974 = "소금?"
26002-1975 = "물론 그것들도 있어서 나쁠 건 없지만."
26002-1976 = "있어서 나쁠 것 없는 수준의 이야기야?!"
26002-1977 = "네? 하지만 그래도……."
26002-1978 = "진짜로 중요한 향신료는 따로 있는걸요."
26002-1979 = "정답은 바로……."
26002-1980 = "사랑이에요!"
26002-1981 = "사랑……?"
26002-1982 = "뭐, 확실히 그런 의견도 있긴 하지."
26002-1983 = "그렇죠?"
26002-1984 = "하지만 그렇다면 저, 한 가지 의문이 생겼어요."
26002-1985 = "의문?"
26002-1986 = "요리에 있어, 사랑이 최고의 향신료라는 건 의문의 여지가 없지만."
26002-1987 = "그럼 과연……."
26002-1988 = "요리에 넣는 사랑은, 어느 정도가 적정량인 걸까요?"
26002-1989 = "저, 적정량……?"
26002-1990 = "아주 약간의 스파이스가 될 정도로만?"
26002-1991 = "아니면 확실히 어필할 수 있을 정도로?"
26002-1992 = "그것도 아니라면 잔뜩 마구 넣는 게 최고인 걸까요……?"
26002-1993 = "저, 신경 쓰여요!"
26002-1994 = "으, 으음?"
26002-1995 = "그 답을 알기 위해서라도, 절 도와주시겠어요?"
26002-1996 = "으, 으으으음……?"
26002-1997 = "선생님……. 또 야단을 맞고 말았어요."
26002-1998 = "응? 야단을 맞다니, 왜?"
26002-1999 = "또라니, 무슨 소리야……?"
26002-2000 = "저, 요리 도중에 실수로 폭발을 일으킨 바람에……."
26002-2001 = "잠깐, 실수라고……?"
26002-2002 = "대체 어쩌다……?"
26002-2003 = "네?"
26002-2004 = "식초에 설탕과 소금, 그리고 마요네즈를 섞다 보니 무심코……일까요?"
26002-2005 = "그게 어째서 폭발하는 거야?!"
26002-2006 = "식초랑 설탕이랑 소금이랑 마요네즈를 섞었는데 폭발했다고?"
26002-2007 = "어라, 요리하다 보면 자주 일어나지 않나요?"
26002-2008 = "폭발."
26002-2009 = "맛있는 양념을 만들기 위해서였어요!"
26002-2010 = "요즘 이 소스에 빵을 찍어 먹는 게 유행이에요!"
26002-2011 = "아마도!"
26002-2012 = "아니, 보통 폭발하진 않는 거 같은데……."
26002-2013 = "어……. 생각보다 흔한 일인가……?! 폭발……?"
26002-2014 = "흐음, 어쨌거나 곤란해요……."
26002-2015 = "제 요리 방법이 대체 무엇이 잘못되었는지……."
26002-2016 = "혼자만으로는 알기가 어려우니……."
26002-2017 = "그럼 직접 봐줄까? 요리하는 거."
26002-2018 = "어머, 정말이신가요?"
26002-2019 = "선생님께서 봐주신다면, 확실히, 무엇이 문제점인지 알 수 있을지도……."
26002-2020 = "후후! 그럼 부탁드릴게요!"
26002-2021 = "선생님의 고견. 잘 들었습니다."
26002-2022 = "과연 많은 도움이 되었어요."
26002-2023 = "오늘 제가 시도한 방법은 위험하다는 걸 알았으니."
26002-2024 = "다음번에는 조금 더 다른 방식으로 도전해볼게요!"
26002-2025 = "그냥 정규 레시피를 지키는 게, 낫지 않을까……?"
26002-2026 = "요리의 길은 무궁무진해서!"
26002-2027 = "그것을 추구하는 일이야말로 요리의 즐거움 중 하나라고 생각하니까요!"
26002-2028 = "응, 즐거우면 그걸로 된 거지. 응……."
26002-2029 = "또, 혼나버렸어요……."
26002-2030 = "으음, 또 무슨 일이야?"
26002-2031 = "오늘 점심시간에 제가 만들었던 꽁치구이가 갑자기 도망치는 바람에……."
26002-2032 = "잠깐, 뭐가 도망쳤다고?"
26002-2033 = "네? 꽁치구이……인데요?"
26002-2034 = "보통, 꽁치구이가 도망치고 그래?"
26002-2035 = "그……."
26002-2036 = "부끄럽게도……"
26002-2037 = "네, 가끔……."
26002-2038 = "일주일에 한 번 정도는……."
26002-2039 = "그게 부끄러워할…… 일인, 가?"
26002-2040 = "정기적으로 도망치는구나……!"
26002-2041 = "으음, 제가 요리를 할 때마다 어째서 이런 일이 벌어지는 건지."
26002-2042 = "어쩌면 좋을까요. 선생님……!"
26002-2043 = "그럼, 어디 한 번 실험해보자."
26002-2044 = "실험이요?"
26002-2045 = "주리가 만든 요리에서 왜 그런 일이 벌어지는지."
26002-2046 = "실험해서 이유를 확인해보는 거야."
26002-2047 = "과연……."
26002-2048 = "원인을 알면, 문제도 해결할 수 있을지도 모른다."
26002-2049 = "이 말씀이시군요!"
26002-2050 = "네! 알겠습니다!"
26002-2051 = "그럼 오늘 학생식당에서 뵐게요!"
26002-260020010 = "선생님, 저기……."
26002-260020020 = "응? 주리, 무슨 일이야?"
26002-260020030 = "……설마 또 혼났다거나?"
26002-260020040 = "앗, 아니요! 딱히 무슨 일이 있는 건 아니에요."
26002-260020050 = "오히려 칭찬을 받고 싶을 정도랍니다!"
26002-260020060 = "오늘은 아직 요리하면서 냄비가 한 번도 폭발하지 않았거든요! 엣-헴!"
26002-260020070 = "으, 응, 그렇구나……. 그건 잘됐네……."
26002-260020080 = "후후, 저도 점점 성장하고 있으니까요!"
26002-260020090 = "오늘 선생님께 연락을 드린 건 다름이 아니라."
26002-260020100 = "그게. 저……."
26002-260020110 = "선생님. 혹시 이번 주말에 시간, 괜찮으실까요?"
26002-260020120 = "마침 이번 주말은 게헨나 급양부의 정기 동아리 활동이 있는 날이니까……."
26002-260020130 = "주말에 저를 좀 도와주셨으면 해서요."
26002-260020140 = "그거라면 딱히 상관없지만……. "
26002-260020150 = "후훗-! 네에!"
26002-260020160 = "그럼 이번 주말, 학생식당에서 기다릴게요!"
26002-260020170 = "오, 오늘 민폐를 끼쳐서 죄송해요. 선생님."
26002-260020180 = "몸은 괜찮아? 역시 날이 너무 뜨거웠던 걸까."
26002-260020190 = "몸은 괜찮아요! "
26002-260020200 = "이번엔 그, 그런 게 아니라."
26002-260020210 = "……?"
26002-260020220 = "아, 아니요! 그, 그러니까 다음에!"
26002-260020230 = "네! 다음에 또 같이 텃밭을 가꾸도록 해요. 선생님!"
26002-260020240 = "그때는 그게, 햇볕이 강하지 않은 날……. 조건적으로……."
26002-260020250 = "아, 아무튼 앞으로도 잘 부탁드려요!"

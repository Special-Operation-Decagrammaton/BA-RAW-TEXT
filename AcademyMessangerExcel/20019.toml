[translation]
20019-200190010 = "안녕하세요. 주인님."
20019-200190020 = "메이드는 봉사하는 사람이라고 할 수 있겠죠."
20019-200190030 = "메이드복은 봉사하는 자의 의복일 거고요."
20019-200190040 = "응…… 그렇겠지?"
20019-200190050 = "그렇게 생각하고 있었습니다만"
20019-200190060 = "최근 새로운 깨달음을 얻었습니다."
20019-200190070 = "부디, 기대해 주세요."
20019-200190080 = "어…… 뭐가?"
20019-200190090 = "뭔지 모르겠지만 기대됩니다!"
20019-200190100 = "시간이 괜찮으시다면 제 방에 한번 들러 주시겠어요?"
20019-200190110 = "기다리고 있겠습니다."
20019-200190120 = "나의 주인님."
20019-200190130 = "예전에는 너무 실례가 많았어요."
20019-200190140 = "마음이 앞선 나머지 무례를 저질렀네요."
20019-200190150 = "죄송합니다."
20019-200190160 = "아냐…… 나야 말로 경우가 없었지."
20019-200190170 = "오히려 감사드리고 싶을 정도입니다!"
20019-200190180 = "다음에…… 다시 봉사를 허락해 주실 수 있으신가요?"
20019-200190190 = "찬찬히 시간을 들인…… 둘만의 봉사를요."
20019-200190200 = "정말로 다른 뜻 없는 거 맞지?!"
20019-200190210 = "오히려 이쪽에서 부탁드리고 싶은데요!"
20019-200190220 = "네? 무슨 의미세요?"
20019-200190230 = "안심했습니다…… 기다리고 있을게요."
20019-200190240 = "편히 주무셨나요, 주인님?"
20019-200190250 = "덕분에 푹 잘 수 있었어."
20019-200190260 = "다행이에요."
20019-200190270 = "사실 그때 드린 차에는,"
20019-200190280 = "수면의 질이 좋아지는 릴렉스 효과가 있다고 해요……"
20019-200190290 = "조금이라도 피로가 풀리셨다면, 차를 내린 보람이 있네요."
20019-200190300 = "그랬구나. 고마워."
20019-200190310 = "별말씀을요."
20019-200190320 = "주인님의 행복이, 저의 행복이랍니다."
20019-200190330 = "그런데 아카네는 샬레까지 와서, 무슨 볼일이 있었던 거야?"
20019-200190340 = "아니면 청소를 위해서 온 건가?"
20019-200190350 = "글쎄요?"
20019-200190360 = "잠든 주인님의 얼굴을 볼 수 있어서,"
20019-200190370 = "행운이었다고만 말씀드릴게요."
20019-200190380 = "뿅뿅."
20019-200190390 = "일은 어떠세요, 주인님?"
20019-200190400 = "저는 오늘 간만에 비번이랍니다."
20019-200190410 = "시간이 비는 것은 오랜만이에요."
20019-200190420 = "아카네는 쉬는 날에 주로 뭘 하는 편이야?"
20019-200190430 = "글쎄요."
20019-200190440 = "하고 싶은 것은 많이 있습니다만……"
20019-200190450 = "바라는 건 하나뿐이에요."
20019-200190460 = "그저…… 어쩌다 우연히……"
20019-200190470 = "주인님과 만날 수 있으면 좋겠다……"
20019-200190480 = "그런 생각을 하고 있었답니다."
20019-200190490 = "오늘도 야근이신가요?"
20019-200190500 = "주인님의 건강이 걱정이에요……"
20019-200190510 = "으헤헤…… 일 좋다…… 일 많다……"
20019-200190520 = "문서라는 걸 발명한 사람은 대체 누굴까……"
20019-200190530 = "주인님? 정신 차리세요, 주인님!"

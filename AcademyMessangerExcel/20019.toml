[translation]
20019-200190010 = "您好，主人"
20019-200190020 = "所謂女僕，是以服務為業的人"
20019-200190030 = "侍奉主人的人，就該穿著女僕裝……"
20019-200190040 = "嗯……應該，是吧？"
20019-200190050 = "雖然我一直是這麼認為"
20019-200190060 = "但最近我有了新的想法"
20019-200190070 = "敬請期待"
20019-200190080 = "嗯……嗯？"
20019-200190090 = "我很期待？"
20019-200190100 = "之後有時間的話，可以請您務必到我房裡一下嗎？"
20019-200190110 = "我會等著您的"
20019-200190120 = "我的主人"
20019-200190130 = "之前真是非常失禮"
20019-200190140 = "因為太過慌張而做出了無禮的舉動"
20019-200190150 = "非常對不起"
20019-200190160 = "不……該道歉的是我"
20019-200190170 = "不如該說非常感謝！"
20019-200190180 = "還能讓我再服務您嗎？"
20019-200190190 = "在彼此都冷靜的……只屬於我們兩個人的時間"
20019-200190200 = "沒，沒有其他意思吧？"
20019-200190210 = "請務必這麼做！"
20019-200190220 = "呃……那是什麼意思呢？"
20019-200190230 = "那我就放心了……我等著您哦"
20019-200190240 = "睡得好嗎，主人？"
20019-200190250 = "託你的福，我睡得很好"
20019-200190260 = "太好了"
20019-200190270 = "其實，那個茶葉……"
20019-200190280 = "似乎有能提高睡眠品質的放鬆效果……"
20019-200190290 = "多少能消除一些疲憊的話，我泡的茶也有意義了"
20019-200190300 = "原來是這樣啊，謝謝"
20019-200190310 = "您的話真令人開心"
20019-200190320 = "主人的幸福，就是我的幸福"
20019-200190330 = "話說回來，朱音來到夏萊有什麼事嗎？"
20019-200190340 = "還是是來打掃的呢？"
20019-200190350 = "是為什麼呢？"
20019-200190360 = "能看到主人的睡臉"
20019-200190370 = "真是幸運，僅此而已"
20019-200190380 = "蹦蹦"
20019-200190390 = "工作怎麼樣呢，主人？"
20019-200190400 = "我今天不用值班"
20019-200190410 = "這種空閒的時間真是久違了"
20019-200190420 = "朱音平常休息的時候都會做什麼呢？"
20019-200190430 = "這個嘛"
20019-200190440 = "雖然有很多想做的事……"
20019-200190450 = "但期望的只有一件事"
20019-200190460 = "偶然……真的是偶然就好"
20019-200190470 = "能遇到主人的話會很開心……"
20019-200190480 = "我一直是這麼想的"
20019-200190490 = "晚安。今天也會晚回去嗎？"
20019-200190500 = "真擔心主人的健康……"
20019-200190510 = "哇嗚，是工作……我最愛工作了……"
20019-200190520 = "到底是誰發明文件這種東西的呢……"
20019-200190530 = "主人！？振作一點！！"

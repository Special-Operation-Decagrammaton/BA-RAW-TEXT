[translation]
20019-200190010 = "สวัสดีค่ะ นายท่าน"
20019-200190020 = "เมดก็ถือว่าเป็นคนทำงานบริการ\nใช่มั้ยคะ"
20019-200190030 = "แล้วชุดเมดก็เป็นชุดของ\nผู้ที่ทำงานบริการค่ะ"
20019-200190040 = "อืม... ก็น่าจะใช่นะ?"
20019-200190050 = "ฉันเองก็คิดแบบนั้นอยู่"
20019-200190060 = "แต่ว่าไม่นานมานี้ ฉันเพิ่งรู้อะไรใหม่ๆ\nมาค่ะ"
20019-200190070 = "นายท่านตั้งตารอชมได้เลยค่ะ"
20019-200190080 = "หืม...? อะไรเหรอ?"
20019-200190090 = "ถึงจะไม่รู้ว่าอะไรแต่ครูจะตั้งตารอนะ!"
20019-200190100 = "ถ้านายท่านสะดวก รบกวนมาที่ห้อง\nของฉันหน่อยได้มั้ยคะ?"
20019-200190110 = "ฉันจะรอนะคะ "
20019-200190120 = "นายท่านของฉัน"
20019-200190130 = "ก่อนหน้านี้ฉันเสียมารยาทกับนายท่านไป"
20019-200190140 = "ฉันใจร้อนเกินไปหน่อย\nเลยทำเรื่องเสียมารยาทไป"
20019-200190150 = "ขอโทษด้วยนะคะ"
20019-200190160 = "ไม่หรอก... แทบไม่มีเรื่องแบบนั้นเลยนะ"
20019-200190170 = "มีแต่เรื่องที่ครูต้องขอบใจมากกว่า!"
20019-200190180 = "คราวหน้า... นายท่านจะอนุญาต\nให้ฉันไปบริการอีกได้มั้ยคะ?"
20019-200190190 = "งานบริการของเราสองคน... ที่ค่อยๆ\nใช้เวลาไปด้วยกันน่ะค่ะ"
20019-200190200 = "ไม่ได้หมายถึงเรื่องอื่นใช่มั้ย?!"
20019-200190210 = "ครูต่างหากที่อยากขอร้องน่ะ!"
20019-200190220 = "คะ...? หมายถึงอะไรเหรอคะ?"
20019-200190230 = "แล้วฉันจะรอนะคะ..."
20019-200190240 = "เมื่อคืนหลับสบายรึเปล่าคะ นายท่าน?"
20019-200190250 = "ครูหลับสบายมากๆ เพราะอาคาเนะเลยนะ"
20019-200190260 = "โล่งอกไปทีค่ะ..."
20019-200190270 = "ความจริงชาที่ฉันชงให้ตอนนั้น"
20019-200190280 = "เป็นชาที่มีสรรพคุณช่วยให้ผ่อนคลาย\nและทำให้หลับสบายค่ะ"
20019-200190290 = "ถ้านายท่านรู้สึกหายเหนื่อย\nก็ถือว่าได้ผลแล้วละค่ะ"
20019-200190300 = "แบบนี้นี่เอง ขอบใจนะ"
20019-200190310 = "ไม่เป็นไรเลยค่ะ"
20019-200190320 = "ความสุขของนายท่านก็คือความสุข\nของฉันค่ะ"
20019-200190330 = "ว่าแต่ว่าอาคาเนะมาที่ชาเล่ต์\nมีธุระอะไรงั้นเหรอ?"
20019-200190340 = "หรือว่ามาทำความสะอาด?"
20019-200190350 = "นั่นสิคะ..."
20019-200190360 = "เอาเป็นว่าฉันรู้สึกโชคดีมาก"
20019-200190370 = "ที่ได้เห็นใบหน้าของนายท่าน\nตอนที่นอนหลับค่ะ"
20019-200190380 = "ดึ๋ง ดึ๋ง"
20019-200190390 = "ทำงานเป็นยังไงบ้างคะนายท่าน?"
20019-200190400 = "วันนี้เป็นวันหยุดของฉัน หลังจากที่\nไม่ได้หยุดมานานน่ะค่ะ"
20019-200190410 = "ฉันไม่ได้มีเวลาว่างมานานแล้วค่ะ"
20019-200190420 = "ตอนวันหยุด ส่วนใหญ่อาคาเนะ\nทำอะไรเหรอ?"
20019-200190430 = "นั่นสิคะ... "
20019-200190440 = "ฉันมีสิ่งที่อยากทำอยู่เยอะมาก..."
20019-200190450 = "แต่สิ่งที่หวังมีอยู่อย่างเดียวค่ะ"
20019-200190460 = "ฉันแค่... หวังว่า..."
20019-200190470 = "ถ้าได้บังเอิญเจอกับนายท่าน\nก็คงดีค่ะ..."
20019-200190480 = "ฉันคิดแบบนั้นอยู่ค่ะ"
20019-200190490 = "วันนี้ก็ทำงานดึกเหรอคะ?"
20019-200190500 = "ฉันเป็นห่วงสุขภาพของนายท่านค่ะ..."
20019-200190510 = "แหะๆ คือว่า... งานมันเยอะน่ะ"
20019-200190520 = "ใครมันคิดค้นการทำงานเอกสาร\nขึ้นมากันนะ..."
20019-200190530 = "นายท่าน? ใจเย็นๆ ก่อนนะคะ นายท่าน!"

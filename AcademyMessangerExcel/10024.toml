[translation]
10024-100240010 = "I'll be away for a while."
10024-100240020 = "I've sent a message to everyone."
10024-100240030 = "I thought I should tell you as well."
10024-100240040 = "Shiroko?"
10024-100240050 = "Where's this coming from?"
10024-100240060 = "Um. Nowhere."
10024-100240070 = "Talk to you later."
10024-100240080 = "Sensei."
10024-100240090 = "I'm on a break, so here I am."
10024-100240100 = "That was quick."
10024-100240110 = "Are you already far away?"
10024-100240120 = "Hmm?"
10024-100240130 = "No, I'm just at the stoplight out front."
10024-100240140 = "Um..."
10024-100240150 = "I messaged you because you told me to do so whenever I stop."
10024-100240160 = "...I may have misunderstood your request."
10024-100240170 = "..."
10024-100240180 = "Then I'll message you when I'm on a break."
10024-100240190 = "How are you, Sensei?"
10024-100240200 = "I'm outside of Abydos now. I should reach the coastal road soon."
10024-100240210 = "That far already? That's amazing."
10024-100240220 = "Like a professional, I should say."
10024-100240230 = "Uhhh..."
10024-100240240 = "Um..."
10024-100240250 = "Shiroko?"
10024-100240260 = "No."
10024-100240270 = "Yes."
10024-100240280 = "Thanks."
10024-100240290 = "Then I'll head straight for the coastal road."
10024-100240300 = "I'll message you there, Sensei."
10024-100240310 = "I was able to stay on the move thanks to you."
10024-100240320 = "The stuff in my bag gets warm after a while."
10024-100240330 = "So the drink you just gave me is a lot cooler."
10024-100240340 = "And the towels"
10024-100240350 = "Oh."
10024-100240360 = "What happened to the towel I gave you earlier?"
10024-100240370 = "I washed it and put it away."
10024-100240380 = "Ah"
10024-100240390 = "Yes..."
10024-100240400 = "I see. Thanks."
10024-100240410 = "Anyway"
10024-100240420 = "I'll talk to you next time, Sensei."
10024-100240430 = "Until we meet again."
10024-100240440 = "Oh, right. Sensei."
10024-100240450 = "You asked me to share the riding schedule and map before."
10024-100240460 = "Why did you need that?"
10024-100240470 = "So I can meet you wherever you're taking a break."
10024-100240480 = "I wanted to be a good cheerleader."
10024-100240490 = "Oh..."
10024-100240500 = "Um..."
10024-100240510 = "Will that be okay? You must be busy with your work..."
10024-100240520 = "I mean,"
10024-100240530 = "it's not that I mind. Really."
10024-100240540 = "I'm fine with it as long as you're okay."
10024-100240550 = "Yes."
10024-100240560 = "Then see you at the next point."
10024-100240570 = "I'm here, Sensei."
10024-100240580 = "You can come out now."
10024-100240590 = "Come out? Where?"
10024-100240600 = "What do you mean you're here?"
10024-100240610 = "Hmm."
10024-100240620 = "You'll know when you come out."
10024-100240630 = "I'll be waiting."
10024-100240640 = "Now that I think of it"
10024-100240650 = "we've covered Kivotos from north to south."
10024-100240660 = "I plan on crossing Kivotos from east to west next time."
10024-100240670 = "Besides, it's more about the journey than the destination."
10024-100240680 = "I'd like you to come with me next time if it's okay, Sensei."
10024-100240690 = "I don't know if I can handle that..."
10024-100240700 = "Can't I go back to just being your cheerleader?"
10024-100240710 = "Hmm. Are you sure?"
10024-100240720 = "Oh, well."
10024-100240730 = "Then I suppose you can go back to supporting next time."
10024-100240740 = "I'm looking forward to it, Sensei."

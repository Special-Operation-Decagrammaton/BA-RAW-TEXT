[translation]
10024-100240010 = "我打算出遠門一段時間"
10024-100240020 = "雖然也有給大家發訊息通知"
10024-100240030 = "不過想說也通知一下老師"
10024-100240040 = "……出遠門？"
10024-100240050 = "突然怎麼了……？"
10024-100240060 = "沒事的，不是什麼大事"
10024-100240070 = "那麼，再見囉，老師"
10024-100240080 = "老師"
10024-100240090 = "正好是休息時間，所以聯絡一下"
10024-100240100 = "感覺好像只過了幾分鐘耶……？"
10024-100240110 = "難不成，已經到了很遠的地方……？"
10024-100240120 = "嗯？"
10024-100240130 = "不，還在剛才和老師碰面的地點附近"
10024-100240140 = "正好因為紅綠燈停下來，所以聯絡一下"
10024-100240150 = "……咦？"
10024-100240160 = "難道剛剛說的每次停下就要聯絡，不是這個意思？"
10024-100240170 = "……抱歉，我誤會了"
10024-100240180 = "那麼，那個……每次下自行車休息的時候再聯絡囉"
10024-100240190 = "老師"
10024-100240200 = "現在已經完全離開阿拜多斯，馬上就要到海岸道路了"
10024-100240210 = "真快呢……！？"
10024-100240220 = "像職業選手一樣的速度呢……目前為止還順利嗎？"
10024-100240230 = "嗯"
10024-100240240 = "啊，話說回來……"
10024-100240250 = "怎麼了？"
10024-100240260 = "啊，不"
10024-100240270 = "抱歉，還是算了"
10024-100240280 = "謝謝"
10024-100240290 = "接下來，我打算沿著海岸道路一直騎"
10024-100240300 = "那麼再聯絡吧，老師"
10024-100240310 = "謝謝老師幫我這麼多"
10024-100240320 = "飲料放在背包裡總是會變溫的"
10024-100240330 = "老師幫我帶來的飲料非常冰涼，我很開心"
10024-100240340 = "毛巾也是"
10024-100240350 = "啊"
10024-100240360 = "這麼說來，剛才給老師的毛巾，如果可以的話……"
10024-100240370 = "已經洗好收起來了。下次再還給你"
10024-100240380 = "那個"
10024-100240390 = "嗯，果然是這樣啊……"
10024-100240400 = "沒事，謝謝"
10024-100240410 = "然後"
10024-100240420 = "那就"
10024-100240430 = "下次再連絡，老師"
10024-100240440 = "話說回來"
10024-100240450 = "老師之前，說了要我告訴你預定的目的地"
10024-100240460 = "這個情報，對老師有什麼幫助嗎？"
10024-100240470 = "我想說再幫你帶點補給品什麼的過去"
10024-100240480 = "我想作為一名支持者幫上各種忙"
10024-100240490 = "啊……"
10024-100240500 = "嗯，這樣啊"
10024-100240510 = "但是，沒關係嗎？老師還要忙工作……"
10024-100240520 = "不，那個"
10024-100240530 = "當然，我不討厭這樣"
10024-100240540 = "應該說，我很開心……"
10024-100240550 = "那就麻煩老師了，但也請不要勉強"
10024-100240560 = "我會期待抵達下一個地點的哦"
10024-100240570 = "老師，快到了"
10024-100240580 = "你現在可以出來了"
10024-100240590 = "可以出來了……？"
10024-100240600 = "那個，你到哪裡了？"
10024-100240610 = "嗯……"
10024-100240620 = "總之，你出來就知道了"
10024-100240630 = "我等著唷"
10024-100240640 = "話說回來"
10024-100240650 = "因為這次是縱貫整個奇普托斯"
10024-100240660 = "所以下次想試試橫斷奇普托斯"
10024-100240670 = "這也不是真的要橫斷，大概只是那種感覺"
10024-100240680 = "老師可以的話，那個，一起之類的……"
10024-100240690 = "實際的參加，有點……我會支持你哦"
10024-100240700 = "我會作為支持者，全力支持你哦……"
10024-100240710 = "唔嗯……"
10024-100240720 = "這樣啊，真可惜"
10024-100240730 = "那麼……就麻煩老師今後"
10024-100240740 = "繼續當我的支持者了"

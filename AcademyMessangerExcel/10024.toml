[translation]
10024-100240010 = "ฉันจะไม่อยู่สักพักนึงนะ"
10024-100240020 = "ฉันส่งข้อความไปบอกทุกคนเอาไว้แล้ว"
10024-100240030 = "เลยบอกให้คุณครูรู้ไว้น่ะ"
10024-100240040 = "...ชิโรโกะ?"
10024-100240050 = "หา! จู่ๆ มีเรื่องอะไรน่ะ?"
10024-100240060 = "อือ... ไม่มีอะไรหรอก"
10024-100240070 = "ถ้างั้น...ขอตัวนะ"
10024-100240080 = "คุณครู"
10024-100240090 = "ฉันกำลังพักอยู่เลยแชทมาหาน่ะ"
10024-100240100 = "ไปเลยเหรอ?"
10024-100240110 = "นี่ออกไปไกลมากแล้วเหรอ?"
10024-100240120 = "หืม?"
10024-100240130 = "ยังไปไม่ไกลเลย เพิ่งอยู่ที่ไฟแดง\nข้างหน้านี่เอง"
10024-100240140 = "อืม..."
10024-100240150 = "ฉันส่งข้อความมาเพราะคุณครูบอกให้\nส่งทุกครั้งที่หยุด..."
10024-100240160 = "น่าจะเข้าใจอะไรผิดอยู่นิดหน่อยนะ"
10024-100240170 = "..."
10024-100240180 = "ถ้างั้นจะติดต่อไปใหม่ตอนที่แวะพักนะ"
10024-100240190 = "คุณครู ติดต่อมาแล้วนะ"
10024-100240200 = "ตอนนี้ออกมานอกอะบิดอสแล้วล่ะ\nอีกไม่ไกลก็จะถึงถนนเลียบชายทะเลแล้ว"
10024-100240210 = "ไปถึงที่นั่นแล้วเหรอ? สุดยอดเลย"
10024-100240220 = "เหมือนนักปั่นมือโปรเลย"
10024-100240230 = "เอ่อ..."
10024-100240240 = "อืม..."
10024-100240250 = "ชิโรโกะ?"
10024-100240260 = "เปล่าหรอก"
10024-100240270 = "อื้อ"
10024-100240280 = "ขอบคุณนะ"
10024-100240290 = "ต่อไปฉันจะปั่นไปจนถึงกลางถนน\nเลียบชายทะเลเลย"
10024-100240300 = "เดี๋ยวจะติดต่อไปใหม่นะ คุณครู"
10024-100240310 = "มีคุณครูคอยช่วย ฉันเลยปั่นต่อไปได้\nเรื่อยๆ แบบนี้"
10024-100240320 = "คิดแล้วว่าพวกของที่อยู่ในกระเป๋า\nพอผ่านไปมันก็จะค่อยๆ เย็นน้อยลง"
10024-100240330 = "เครื่องดื่มชูกำลังที่คุณครูเตรียมมาให้\nเย็นชื่นใจมากๆ เลยล่ะ"
10024-100240340 = "ผ้าขนหนูก็ด้วย"
10024-100240350 = "อ่า..."
10024-100240360 = "นึกขึ้นมาได้พอดี ผ้าขนหนูที่ฉันให้\nคุณครูไป เป็นยังไงบ้าง?"
10024-100240370 = "ซักเก็บไว้อย่างดีแล้วล่ะ"
10024-100240380 = "อ่า..."
10024-100240390 = "อื้ม...... "
10024-100240400 = "คิดไว้แล้วเชียว ขอบคุณนะ"
10024-100240410 = "เอาเป็นว่า..."
10024-100240420 = "แล้วฉันจะติดต่อไปใหม่นะ คุณครู"
10024-100240430 = "ไปนะ"
10024-100240440 = "จะว่าไปคุณครู..."
10024-100240450 = "เมื่อวันก่อน คุณครูขอให้ฉันส่งแผนที่\nของกำหนดการปั่นจักรยานไปให้นี่นา"
10024-100240460 = "ขอไปทำไมเหรอ?"
10024-100240470 = "ครูจะไปรอเธอที่จุดแวะพักนะ"
10024-100240480 = "ครูจะไปทำหน้าที่สนับสนุนเธอไงล่ะ"
10024-100240490 = "อ่า..."
10024-100240500 = "อืม..."
10024-100240510 = "เป็นอะไรรึเปล่า? คุณครูงานยุ่งแท้ๆ..."
10024-100240520 = "เปล่าหรอก"
10024-100240530 = "ไม่ใช่ว่าฉันไม่ชอบหรอกนะ ไม่ใช่แบบ\nนั้นเลย"
10024-100240540 = "ถ้าคุณครูโอเค ฉันก็ยินดี..."
10024-100240550 = "อื้อ"
10024-100240560 = "ถ้างั้นไว้เจอกันที่จุดต่อไปนะ"
10024-100240570 = "คุณครู มาถึงแล้วล่ะ"
10024-100240580 = "คุณครูออกมาได้แล้วล่ะ"
10024-100240590 = "ออกไปเหรอ? ไปไหนล่ะ?"
10024-100240600 = "\"มาถึง\" แล้วงั้นเหรอ?"
10024-100240610 = "อืม..."
10024-100240620 = "ถ้าออกมาเดี๋ยวก็รู้เองแหละ"
10024-100240630 = "ฉันจะรอนะ"
10024-100240640 = "พอมาคิดดูแล้ว"
10024-100240650 = "คราวนี้ปั่นข้ามคิโวทอสจากเหนือจรด\nใต้สำเร็จแล้ว"
10024-100240660 = "คราวหน้าฉันจะลองปั่นข้ามคิโวทอส\nจากตะวันออกไปตะวันตกบ้างนะ"
10024-100240670 = "อื้อ ถึงจะไม่ได้ปั่นข้ามจริงๆ ก็เถอะ\nแค่ให้ฟีลใกล้เคียง..."
10024-100240680 = "ถ้าคุณครูโอเคล่ะก็ คราวหน้าไปปั่น\nจักรยานด้วยกันมั้ย..."
10024-100240690 = "ให้ลงปั่นจริงแบบนั้นมันคง..."
10024-100240700 = "ขอสนับสนุนเธอแบบนี้ดีกว่า..."
10024-100240710 = "อืม... อย่างนั้นเองเหรอ"
10024-100240720 = "น่าเสียดายจัง"
10024-100240730 = "ถ้างั้นคราวหน้าก็รบกวน..."
10024-100240740 = "มาช่วยสนับสนุนฉันด้วยนะ คุณครู"

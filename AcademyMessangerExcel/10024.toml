[translation]
10024-100240010 = "한동안은 자리를 비울 예정이야."
10024-100240020 = "모두에게도 메시지는 보내 두었으니까."
10024-100240030 = "선생님도 알고 있었으면 해서."
10024-100240040 = "……시로코?"
10024-100240050 = "뭐야? 갑자기 무슨 일?"
10024-100240060 = "으으응. 아무것도."
10024-100240070 = "그럼 이만."
10024-100240080 = "선생님."
10024-100240090 = "쉬는 타이밍이라 연락했어."
10024-100240100 = "이렇게 곧바로?"
10024-100240110 = "벌써 멀리 간 거야?"
10024-100240120 = "응?"
10024-100240130 = "아니. 아직 요 앞 신호등."
10024-100240140 = "음"
10024-100240150 = "멈출 때마다 연락하라고 해서 한 건데……."
10024-100240160 = "아무래도 뜻을 오해했나 봐."
10024-100240170 = "……"
10024-100240180 = "그럼 쉴 때 연락할게."
10024-100240190 = "선생님. 연락이야."
10024-100240200 = "아비도스를 완전히 빠져나왔어. 곧 있으면 해안 도로에 도착할 거야."
10024-100240210 = "벌써 거기까지? 대단한걸."
10024-100240220 = "전문가 같아."
10024-100240230 = "어……"
10024-100240240 = "음……"
10024-100240250 = "시로코?"
10024-100240260 = "아니."
10024-100240270 = "응."
10024-100240280 = "고마워."
10024-100240290 = "다음엔 해안도로 중간까지 쭉 달릴 거야."
10024-100240300 = "그럼 그때 다시 연락할게. 선생님."
10024-100240310 = "덕분에 계속해서 달릴 수 있었어."
10024-100240320 = "역시 가방 안에 든 것들은 시간이 지나면서 조금씩 식으니까."
10024-100240330 = "막 챙겨 온 드링크가 훨씬 시원한 것 같아."
10024-100240340 = "타올도"
10024-100240350 = "……아."
10024-100240360 = "그러고 보니 나에게서 받아 간 타올은 어떻게 됐어?"
10024-100240370 = "세탁해서 잘 보관해뒀어."
10024-100240380 = "……아,"
10024-100240390 = "응……."
10024-100240400 = "역시 그렇겠지. 고마워."
10024-100240410 = "아무튼"
10024-100240420 = "다음에 또 연락할게. 선생님."
10024-100240430 = "그럼."
10024-100240440 = "그러고 보니 선생님."
10024-100240450 = "일전에 한번, 라이딩 일정 지도를 공유해달라고 했었잖아."
10024-100240460 = "무슨 이유로 달라고 한 거야?"
10024-100240470 = "미리 쉬는 위치마다 가서 기다리게."
10024-100240480 = "서포터 일을 제대로 하려고."
10024-100240490 = "아"
10024-100240500 = "으음……"
10024-100240510 = "괜찮아? 일도 바쁠 텐데……."
10024-100240520 = "아니"
10024-100240530 = "싫다는 건 아니야. 절대로."
10024-100240540 = "선생님만 괜찮다면야 나도 좋지만……."
10024-100240550 = "응."
10024-100240560 = "그럼 다음 포인트에서도 만나."
10024-100240570 = "선생님. 도착했어."
10024-100240580 = "이제 나오면 될 것 같아."
10024-100240590 = "나오다니, 어디로?"
10024-100240600 = "'도착했다'니?"
10024-100240610 = "음……."
10024-100240620 = "일단 나오면 알 수 있을 거야."
10024-100240630 = "그럼 기다리고 있을게."
10024-100240640 = "생각해 보니"
10024-100240650 = "이번에 키보토스 종단을 성공적으로 마쳤으니까"
10024-100240660 = "다음번에는 키보토스 횡단을 해볼까 해."
10024-100240670 = "응. 진짜 횡단은 아니고 기분만 내는 거지만."
10024-100240680 = "선생님만 괜찮다면, 다음번에는 같이 달릴까 하는데……."
10024-100240690 = "직접 참여는 조금……."
10024-100240700 = "서포터로 충분합니다……."
10024-100240710 = "으음……. 역시 그런가."
10024-100240720 = "아쉽네."
10024-100240730 = "그럼 다음번에도 서포터로……."
10024-100240740 = "잘 부탁해. 선생님."

[translation]
10003-476 = "Sensei, Sensei!"
10003-477 = "I have good news!"
10003-478 = "I got some rare Momo Friends merch from the auction!"
10003-479 = "From the auction? What did you get?"
10003-480 = "Heehee, that's still a secret."
10003-481 = "I'll show you the next time we meet!"
10003-482 = "Sensei, Momo Friends is releasing a new Big Brother bag!"
10003-483 = "Um... This one is cute, but..."
10003-484 = "The Peroro bag is my favorite!"
10003-485 = "Come to think of it, you're always carrying the same bag."
10003-486 = "You mean my Peroro bag?"
10003-487 = "Heehee, isn't it cute?"
10003-488 = "This bag is a precious limited-edition item that was released during the initial Momo Friends launch."
10003-489 = "It's plenty roomy, so I can carry all kinds of things."
10003-490 = "It's my treasure!"
10003-491 = "Sensei, I heard that the arcade next to the station"
10003-492 = "has a new Momo Friends plush in the claw machine!"
10003-493 = "I wonder what kind of a plush it is..."
10003-494 = "Ooh, I can't wait until school is over!"
10003-495 = "If you're that curious, why don't we drop by the arcade during lunch?"
10003-496 = "Really? Are you sure that's okay?"
10003-497 = "Then I'll get there first and wait for you, Sensei!\n(o^－^o)"
10003-498 = "Why are there so many people suffering in the world?"
10003-499 = "I wish I knew a way to make everyone happy..."
10003-500 = "It always pains me that I can't do anything to help them."
10003-501 = "Are you worried about something, Hifumi?"
10003-502 = "No, it's nothing..."
10003-503 = "Thanks for listening to my concerns, Sensei."
10003-504 = "Now that I've gotten that off my chest, I feel a lot better."
10003-505 = "Um... If it's okay with you, can I come again the next time I have a problem?"
10003-506 = "Anytime."
10003-507 = "Thank you, Sensei."
10003-508 = "You have no idea how lucky I feel to have you."
10003-509 = "Sensei, can I change the Schale duty scheduled"
10003-510 = "for tomorrow afternoon to the morning?"
10003-511 = "My friends suddenly made plans for the afternoon."
10003-512 = "That's fine. What are you gonna do with your friends?"
10003-513 = "After school, my friends and I are heading into the city!"
10003-514 = "I'm already looking forward to it! Heehee..."
10003-515 = "Sensei, are you free this weekend?"
10003-516 = "I have to go by the arena to buy supplies for the Make-Up Work Club."
10003-517 = "Would you like to come shopping with me, if you don't mind?"
10003-518 = "Sounds good. I also have something to do in that area."
10003-519 = "Great. I'll meet you in front of the Kivotos Arena next weekend!"

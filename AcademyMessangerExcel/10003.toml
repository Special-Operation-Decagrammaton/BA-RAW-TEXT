[translation]
10003-476 = "老師，老師！"
10003-477 = "我辦到了！"
10003-478 = "昨天，入手了珍貴的Momo好友商品！"
10003-479 = "那真是太好了，是什麼樣的商品？"
10003-480 = "嘿嘿嘿，這還是祕密"
10003-481 = "下次見面時直接拿給你看！"
10003-482 = "聽說這次Momo好友要推出新的老大哥款式背包！"
10003-483 = "唔嗯……這個也好可愛，有點猶豫呢……"
10003-484 = "但對我來說，佩洛洛大人的背包果然還最棒的……！"
10003-485 = "這麼說來，日步美總是揹著同一個背包呢"
10003-486 = "啊，你說那個佩洛洛大人背包嗎？"
10003-487 = "嘿嘿嘿，很可愛吧？"
10003-488 = "那是Momo好友上市初期販售的限量品"
10003-489 = "收納空間也很足夠，能裝很多東西呢"
10003-490 = "是我的寶物1號！"
10003-491 = "老師，車站前遊戲中心的抓娃娃機！"
10003-492 = "那裡好像放了新款的Momo好友娃娃！"
10003-493 = "到底放了什麼娃娃呢？"
10003-494 = "我已經開始期待放學後了！"
10003-495 = "這麼在意的話，中午的時候一起去遊戲中心吧？"
10003-496 = "真的嗎！？真的可以嗎！？"
10003-497 = "謝謝您！那我等著唷，老師！\n(o^－^o)"
10003-498 = "世界上為什麼會有這麼多人在受苦呢？"
10003-499 = "為了讓大家幸福，如果我能做點什麼……"
10003-500 = "我什麼都做不了……真傷心"
10003-501 = "沒事吧？有什麼擔心的事嗎？"
10003-502 = "不，我沒事……"
10003-503 = "非常感謝您聽我說，老師"
10003-504 = "能將一直埋藏在心裡的事說出來，感覺暢快多了"
10003-505 = "那個……如果又有煩惱的話，還能聽我訴說嗎？"
10003-506 = "隨時都可以"
10003-507 = "非常謝謝您，老師"
10003-508 = "有老師在身邊，真是太好了"
10003-509 = "老師，明天下午原本預定的夏萊值班工作"
10003-510 = "可以改到上午嗎？"
10003-511 = "下午想安排些別的計畫……"
10003-512 = "嗯，沒問題唷。順便問問，是什麼計劃？"
10003-513 = "和學校的朋友一起去哪裡玩"
10003-514 = "到底會玩什麼呢，已經開始期待了！嘿嘿嘿……！"
10003-515 = "老師，這個週末有空嗎？"
10003-516 = "我要去公共圓形劇場附近購買補課部用的備品"
10003-517 = "可以的話，要一起去購物嗎？"
10003-518 = "我正好有事要去附近，務必讓我去"
10003-519 = "那太好了！那就下個週末，在奇普托斯公共圓形劇場前見！"

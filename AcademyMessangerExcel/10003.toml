[translation]
10003-476 = "คุณครู... คุณครูคะ!"
10003-477 = "ฉันมีข่าวดีมาบอกค่ะ"
10003-478 = "คราวนี้ฉันประมูลกู้ดของ MOMO\nFRIENDS ที่หายากมากๆ มาจากตลาด\nประมูลได้แล้วค่ะ!"
10003-479 = "ตลาดประมูลเหรอ? กู้ดอะไรเหรอ?"
10003-480 = "ฮิฮิ ขอเก็บเป็นความลับไว้ก่อนนะคะ"
10003-481 = "ถ้าเจอคุณครูเมื่อไหร่ ฉันจะเอาให้ดูนะคะ!"
10003-482 = "คุณครูคะ คุณบิ๊กบราเธอร์ MOMO\nFRIENDS มีกระเป๋าแบบใหม่ออกมาค่ะ!"
10003-483 = "อืม... อันนี้ก็น่ารักดีนะแต่ว่า..."
10003-484 = "ฉันชอบกระเป๋าท่านเพโรโร่\nมากกว่าค่ะ!"
10003-485 = "พอดูดีๆ แล้ว ฮิฟุมิมักจะสะพายกระเป๋า\nแบบเดิมตลอดเลยนี่นะ"
10003-486 = "กระเป๋าท่านเพโรโร่ที่ฉันสะพายอยู่\nน่ะเหรอคะ?"
10003-487 = "ฮิฮิ น่ารักใช่มั้ยคะ?"
10003-488 = "กระเป๋าใบนี้วางขายรุ่นแรกๆ ตอนที่ MO\nMO FRIENDS เปิดตัว เป็นของลิมิเต็ด\nหายากมากเลยนะคะ"
10003-489 = "กระเป๋าใบนี้มีช่องเก็บของอยู่เยอะ ทำให้\nใส่ของได้เยอะมาก"
10003-490 = "เป็นสมบัตินัมเบอร์วันของฉันเลยค่ะ!"
10003-491 = "คุณครูคะ ตู้เกมคีบตุ๊กตาที่ร้านเกมข้างๆ\nสถานีรถไฟ"
10003-492 = "มีตุ๊กตา MOMO FRIENDS รุ่นใหม่เข้ามา\nแล้วค่ะ!"
10003-493 = "จะเป็นตุ๊กตาแบบไหนกันน้า?"
10003-494 = "ฉันอยากให้ถึงเวลาเลิกเรียนใจจะขาด\nแล้วค่ะ!"
10003-495 = "ถ้าอยากไปขนาดนั้นล่ะก็ เราออกไปร้าน\nเกมกันตอนกลางวันมั้ย?"
10003-496 = "จริงเหรอคะ? ไปได้จริงๆ เหรอคะ?"
10003-497 = "ถ้างั้นฉันจะไปรอคุณครูที่นั่นแล้วกัน\nนะคะ! (o^－^o)"
10003-498 = "ทำไมในโลกนี้ถึงมีคนที่เจ็บปวดทรมาน\nมากมายแบบนี้กันนะ?"
10003-499 = "ถ้าจะช่วยให้ทุกคนมีความสุขได้ ฉันก็ยิน\nดีทำทุกอย่าง..."
10003-500 = "แต่ว่าฉันทำอะไรไม่ได้ ก็เลยรู้สึกเสียใจ\nอยู่ตลอดเลย"
10003-501 = "กังวลอะไรอยู่เหรอ ฮิฟุมิ?"
10003-502 = "เปล่าค่ะ ไม่มีอะไรหรอกค่ะ"
10003-503 = "ขอบคุณที่รับฟังเรื่องกังวลใจของฉัน\nนะคะ คุณครู"
10003-504 = "พอได้พูดสิ่งที่กังวลอยู่ในใจออกมา รู้สึก\nโล่งขึ้นเยอะเลยค่ะ"
10003-505 = "คือ... ถ้าคุณครูไม่ว่าอะไร ถ้าเกิดฉันมีเรื่อง\nกังวลใจอีก ฉันขอมาเล่าให้คุณครูฟังอีก\nได้มั้ยคะ?"
10003-506 = "ฮิฟุมิมาหาครูได้ตลอดเลยนะ"
10003-507 = "ขอบคุณค่ะ คุณครู"
10003-508 = "ฉันโชคดีมากจริงๆ ค่ะที่มีคุณครูอยู่\nข้างๆ แบบนี้"
10003-509 = "คุณครูคะ งานของชาเล่ต์ที่กำหนดเอาไว้\nวันพรุ่งนี้ตอนบ่าย"
10003-510 = "ฉันขอเปลี่ยนเป็นตอนเช้าแทนได้มั้ยคะ?"
10003-511 = "พอดีตอนบ่ายฉันมีนัดกับเพื่อนๆ น่ะค่ะ"
10003-512 = "ได้อยู่แล้ว แล้วมีนัดอะไรกับเพื่อนๆ เหรอ?"
10003-513 = "หลังเลิกเรียน ฉันจะเข้าไปในเมืองกับ\nเพื่อนๆ ในห้องหน่อยน่ะค่ะ!"
10003-514 = "ตื่นเต้นจังเลยว่าจะได้ไปเที่ยวเล่นอะไร\nบ้าง ฮิฮิ"
10003-515 = "สุดสัปดาห์นี้มีเวลาว่างมั้ยคะคุณครู?"
10003-516 = "พอดีฉันต้องเข้าไปในเมืองเพื่อไปซื้อ\nอุปกรณ์ที่ใช้ในชมรมชั้นเรียนเสริมค่ะ"
10003-517 = "ถ้าคุณครูไม่ติดธุระที่ไหน อยากไปช็อป\nปิ้งด้วยกันมั้ยคะ?"
10003-518 = "ก็ได้ ครูมีธุระที่ต้องไปแถวนั้นอยู่\nเหมือนกัน"
10003-519 = "ดีจังเลย ถ้างั้นสุดสัปดาห์นี้เจอกันที่\nลานสาธารณะคิโวทอสนะคะ!"

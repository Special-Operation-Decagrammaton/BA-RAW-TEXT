[translation]
10003-476 = "선생님, 선생님!"
10003-477 = "좋은 소식이 있어요!"
10003-478 = "이번에 경매 마켓에서 구하기 힘든 모모프렌즈 굿즈를 손에 넣었어요!"
10003-479 = "경매 마켓에서? 어떤 물건인데?"
10003-480 = "헤헤, 아직은 비밀이에요."
10003-481 = "만나면 직접 보여 드릴게요!"
10003-482 = "선생님, 모모프렌즈에서 빅 브라더님 모양의 가방이 새롭게 출시된대요!"
10003-483 = "음…… 이것도 귀엽긴 하지만,"
10003-484 = "역시 제게는 페로로 님 가방이 제일이에요!"
10003-485 = "그러고 보니 히후미는 언제나 같은 모양의 가방을 메고 다니네."
10003-486 = "제가 메고 다니는 페로로 님 가방이요?"
10003-487 = "헤헤, 귀엽죠?"
10003-488 = "이 가방은 모모프렌즈 런칭 초기에 발매한 귀중한 한정품이에요."
10003-489 = "수납공간도 넉넉해서 여러 가지 물건도 잔뜩 넣어둘 수 있답니다."
10003-490 = "제 보물 1호예요!"
10003-491 = "선생님, 역 앞 오락실의 뽑기 기계에"
10003-492 = "모모프렌즈의 신상 인형이 들어왔대요!"
10003-493 = "어떤 인형이 들어와 있을까요?"
10003-494 = "벌써부터 방과 후가 기대돼서 참을 수가 없네요!"
10003-495 = "그렇게 신경 쓰이면 점심시간에 같이 오락실에 가볼까?"
10003-496 = "정말요? 정말 그래도 괜찮은가요?"
10003-497 = "그럼 먼저 가서 기다리고 있을게요, 선생님!\n(o^－^o)"
10003-498 = "세상에는 어째서 이렇게 고통받는 사람들이 많은 걸까요?"
10003-499 = "모두가 행복할 수 있다면 무엇이든 할 텐데……."
10003-500 = "저는 아무것도 할 수 없어서, 늘 속상해요."
10003-501 = "무슨 걱정거리라도 있는 거니, 히후미?"
10003-502 = "아니요. 아무것도 아니에요……."
10003-503 = "제 고민을 들어 주셔서 감사합니다, 선생님."
10003-504 = "가슴에 담고 있던 고민을 털어놓았더니 한결 개운해진 느낌이에요."
10003-505 = "저…… 선생님께서 괜찮으시다면, 다음에 고민이 생겼을 때 또 이야기를 하러 와도 괜찮을까요?"
10003-506 = "언제든지 괜찮아."
10003-507 = "감사합니다, 선생님."
10003-508 = "선생님이 곁에 계셔주셔서 얼마나 다행인지 몰라요."
10003-509 = "선생님, 내일 오후에 예정된 샬레의 당번 활동을"
10003-510 = "오전으로 바꿀 수 있을까요?"
10003-511 = "오후에 갑자기 친구들과 약속이 잡혀버려서요."
10003-512 = "괜찮아. 친구들과 무슨 약속을 했는데?"
10003-513 = "방과 후에 학교 친구들과 함께 시내로 외출을 나가기로 했어요!"
10003-514 = "무얼 하고 놀지 벌써부터 기대가 되네요! 헤헤……."
10003-515 = "선생님, 이번 주말에 시간 괜찮으신가요?"
10003-516 = "보충수업부에서 쓸 비품을 구매하러 공용 아레나 근처에 갈 일이 있어서요."
10003-517 = "괜찮으시다면 같이 쇼핑하러 가지 않으시겠어요?"
10003-518 = "좋아. 나도 마침 근처에 볼일이 있었거든."
10003-519 = "다행이네요. 그럼 돌아오는 주말에 키보토스 공용 아레나 앞에서 뵈어요!"

[translation]
10071-100710010 = "คุณครูคะ วันนี้คุณครูพอมีเวลา\nว่างรึเปล่าคะ"
10071-100710020 = "ใกล้ถึงหน้าร้อนแล้ว อากาศก็ยิ่งร้อน\nขึ้นเรื่อยๆ เลย"
10071-100710030 = "ฉันว่าจะซ่อมบำรุงอุปกรณ์เตรียมเอาไว้\nให้เหมาะตามการปฏิบัติการในฤดูกาล\nที่เปลี่ยนไปค่ะ..."
10071-100710040 = "แต่เจอปัญหานิดหน่อย ก็เลยอยากจะ\nขอคำปรึกษาจากคุณครูค่ะ"
10071-100710050 = "ปรึกษาครูได้ตลอดเลยนะ"
10071-100710060 = "ขอบคุณที่ตอบรับด้วยความยินดีนะคะ"
10071-100710070 = "ถ้างั้นฉันจะส่งพิกัดไปให้นะคะ"
10071-100710080 = "ฉันจะรอคุณครูที่จุดนัดพบค่ะ"
10071-100710090 = "ระหว่างที่ออกปฏิบัติการ ฉันรู้สึกได้เลยค่ะ..."
10071-100710100 = "ว่าการฝึกของ SRT พอเน้นแต่การฝึกฝน\nพื้นที่บนบกแล้ว..."
10071-100710110 = "ทำให้เวลาที่เกิดอุบัติเหตุในทะเล\nเราจะไม่สามารถรับมือได้อย่าง\nมีประสิทธิภาพค่ะ"
10071-100710120 = "มิยาโกะทำได้ดีแล้วละ"
10071-100710130 = "...ขอบคุณนะคะ"
10071-100710140 = "แต่ว่าฉันรู้ดีว่าตัวเองยังขาด\nประสบการณ์อยู่ค่ะ"
10071-100710150 = "เพราะงั้น สิ่งที่ฉันอยากบอกก็คือ..."
10071-100710160 = "ครั้งนี้ฉันเลยวางแผนว่าจะฝึก\nการช่วยเหลือตัวประกันในทะเลค่ะ"
10071-100710170 = "คุณครูจะช่วยฉันหน่อยได้หรือเปล่าคะ?"
10071-100710180 = "อื้อ ได้เลย"
10071-100710190 = "ขอบคุณค่ะ คุณครู"
10071-100710200 = "ถ้างั้นฉันจะรออยู่ที่ท่าเรือฝั่งตะวันออก\nของหมู่บ้านนะคะ"
10071-100710210 = "คุณครู... ทราบหรือเปล่าคะ?"
10071-100710220 = "ที่ชายหาดฝั่งตะวันตกของหมู่บ้าน\nมีเกาะที่สามารถเดินไปได้ด้วยละค่ะ"
10071-100710230 = "เกาะที่เดินไปได้งั้นเหรอ?"
10071-100710240 = "ค่ะ ชายฝั่งตะวันตกเป็นบริเวณน้ำตื้น\nตอนน้ำลงจะมองเห็นพื้นทะเลได้ค่ะ"
10071-100710250 = "เวลาน้ำลงก็จะใช้เป็นเส้นทางเดิน\nไปยังเกาะได้ค่ะ"
10071-100710260 = "น่าสนใจดีนะ"
10071-100710270 = "ค่ะ นอกจากนี้ ได้ยินว่าทิวทัศน์สวยมาก\nพวกชาวเมืองเองก็มักจะแวะไปพักผ่อน\nที่นั่นบ่อยๆ ค่ะ"
10071-100710280 = "คือว่าถ้าคุณครูสะดวกละก็..."
10071-100710290 = "อยากลองไปที่เกาะนั้นด้วยกันมั้ยคะ?"
10071-100710300 = "ไปสิ"
10071-100710310 = "ขอบคุณค่ะ คุณครู"
10071-100710320 = "ถ้างั้นพรุ่งนี้ฉันจะไปรอคุณครูที่ท่าเรือ\nตอนช่วงน้ำลงนะคะ"
10071-100710330 = "นี่คือ RABBIT 1 รายงานสถานการณ์\nของกองทหาร RABBIT"
10071-100710340 = "เวลาปัจจุบัน 06.00 น. ไม่มีสมาชิก\nบาดเจ็บ หรือสูญหายจากปฏิบัติการ\nหรืออุบัติเหตุใดๆ"
10071-100710350 = "อ๊ะ"
10071-100710360 = "ขอโทษที่รบกวนตั้งแต่เช้าค่ะ คุณครู"
10071-100710370 = "ฉันส่งข้อความผิดแชต เลยกลายเป็น\nว่าส่งข้อความรายงานสถานการณ์มา\nให้คุณครูแทนซะแล้ว..."
10071-100710380 = "ไม่เป็นไร ไม่ต้องคิดมากหรอก"
10071-100710390 = "ว่าแต่ว่า มิยาโกะตื่นเช้าจัง"
10071-100710400 = "ค่ะ เพราะการทำกิจวัตรประจำวัน\nตามแบบแผน ถือเป็นเรื่องพื้นฐาน\nของหน่วยรบพิเศษค่ะ"
10071-100710410 = "ถ้าไม่ใช่ตอนที่มีภารกิจพิเศษตอนกลาง\nคืน หรือตอนที่สภาพร่างกายไม่พร้อม\nฉันจะตื่นมาเขียนรายงานในเวลานี้เสมอค่ะ"
10071-100710420 = "หลังจากนั้นก็จะออกซ้อมวิ่งในตอนเช้า\nแล้วก็ทำกายบริหารเพื่อวอร์มอัปร่างกายค่ะ"
10071-100710430 = "ขยันสุดๆ เลย"
10071-100710440 = "ฮิฮิ ในช่วงแรกๆ อาจมีขี้เกียจอยู่บ้าง\nแต่พอทำบ่อยๆ มันก็จะชินไปเองค่ะ"
10071-100710450 = "กลายเป็นว่าตอนนี้ ถ้าไม่ออกกำลังกาย\nตอนเช้า จะรู้สึกว่าร่างกายหนักๆ น่ะค่ะ"

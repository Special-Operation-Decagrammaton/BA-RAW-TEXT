[translation]
10071-100710010 = "Sensei, are you free today?"
10071-100710020 = "The weather is getting warmer, and it'll be summer soon."
10071-100710030 = "I need to update our armory and gear stocks so the change of weather doesn't interrupt our operations..."
10071-100710040 = "But there's something I'm not too sure of, so I was hoping you could advise me."
10071-100710050 = "I always have time to talk to you."
10071-100710060 = "Thank you for understanding."
10071-100710070 = "I'll send you the coordinates soon."
10071-100710080 = "Meet me at the rendezvous point."
10071-100710090 = "So during this mission, I felt..."
10071-100710100 = "Since SRT's training is focused on land-based operations,"
10071-100710110 = "we aren't able to handle actions at sea very well."
10071-100710120 = "Miyako, you're doing fine."
10071-100710130 = "Thank you..."
10071-100710140 = "But I'm fully aware of my shortcomings."
10071-100710150 = "Which brings me back to my point."
10071-100710160 = "I am planning to run some hostage rescue drills at sea."
10071-100710170 = "Would you be able to help us with that?"
10071-100710180 = "Um, sure."
10071-100710190 = "Thank you, Sensei."
10071-100710200 = "I'll be waiting for you at the docks on the east side of town."
10071-100710210 = "Sensei, have you heard?"
10071-100710220 = "There's an island off the west coast of town that you can walk to."
10071-100710230 = "An island you can walk to?"
10071-100710240 = "Yes. During low tide, the water pulls away and reveals a path."
10071-100710250 = "And during that window, you can walk to the island."
10071-100710260 = "That's amazing."
10071-100710270 = "Yes. And the scenery there is beautiful, so the locals go there on their days off."
10071-100710280 = "If it's all right with you..."
10071-100710290 = "would you like to go the island with me?"
10071-100710300 = "Okay."
10071-100710310 = "Thank you, Sensei."
10071-100710320 = "I'll meet you tomorrow at the dock when the water has receded."
10071-100710330 = "This is RABBIT 1. RABBIT Squad status report."
10071-100710340 = "Current time is 0600 hours. All squad members are accounted for."
10071-100710350 = "Ah"
10071-100710360 = "I hope I didn't wake you, Sensei."
10071-100710370 = "I must've sent the RABBIT Squad status report to you by accident..."
10071-100710380 = "It's okay. Don't worry about it."
10071-100710390 = "You're awake so early."
10071-100710400 = "Keeping a strict routine is critical to the special forces."
10071-100710410 = "Unless I'm sick or stayed up on a night mission, I always wake up at this time to organize my logs."
10071-100710420 = "And then I go for a morning walk, or do some exercises to warm up."
10071-100710430 = "That's very impressive."
10071-100710440 = "Heehee. It takes some getting used to, but once you get into the habit, it's not a big deal."
10071-100710450 = "These days, I feel sluggish if I skip my morning exercises."

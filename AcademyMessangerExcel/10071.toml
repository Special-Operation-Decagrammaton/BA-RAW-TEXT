[translation]
10071-100710010 = "老師，能占用你一些時間嗎？"
10071-100710020 = "夏天就快到了，天氣越來越熱"
10071-100710030 = "為了不影響SRT的作戰，我準備了一些與季節相符的裝備……"
10071-100710040 = "不過有些部分我難以判斷，所以希望能跟老師商量"
10071-100710050 = "如果是都子找我商量，我隨時都會聽哦"
10071-100710060 = "謝謝老師爽快的答應"
10071-100710070 = "我會將座標傳送給你，麻煩你走一趟了"
10071-100710080 = "那麼，我會在會面地點待命"
10071-100710090 = "在執行這次作戰時，我感覺到……"
10071-100710100 = "由於SRT的訓練多以陸上作戰為前提"
10071-100710110 = "因此應對海上作戰的能力似乎不夠充分"
10071-100710120 = "都子已經非常努力了唷"
10071-100710130 = "……謝謝你"
10071-100710140 = "不過，我也有自己能力不足的自覺"
10071-100710150 = "所以雖然有點突然……"
10071-100710160 = "我想進行模擬在海上營救人質的訓練"
10071-100710170 = "可以請老師協助嗎？"
10071-100710180 = "嗯，當然可以"
10071-100710190 = "非常感謝"
10071-100710200 = "那麼，我在村子東邊的碼頭等你"
10071-100710210 = "老師，你聽說了嗎？"
10071-100710220 = "似乎有個可以從村子的西海岸徒步抵達的離島"
10071-100710230 = "從海上……？"
10071-100710240 = "是的。因為西側海岸的水深較淺"
10071-100710250 = "所以聽說在退潮的時候，與離島連接的道路就會出現"
10071-100710260 = "好像很有趣呢"
10071-100710270 = "我也這麼覺得。而且由於那座島的風景非常棒，居民們似乎也時常會在假日去島上玩"
10071-100710280 = "如果老師願意的話"
10071-100710290 = "能請老師陪我一起去嗎？"
10071-100710300 = "當然，我很樂意"
10071-100710310 = "謝謝你，老師"
10071-100710320 = "那麼明天，我們就在退潮時在碼頭碰面吧"
10071-100710330 = "這裡是RABBIT1。報告目前狀況"
10071-100710340 = "現在時間0600。\n負傷人數為0，請繼續──"
10071-100710350 = "啊……"
10071-100710360 = "不好意思，在這種時間打擾老師"
10071-100710370 = "我弄錯了傳送的對象……"
10071-100710380 = "沒關係的，別在意"
10071-100710390 = "話說回來，你這麼早就起床了啊"
10071-100710400 = "是的。畢竟保持規律的生活是特殊部隊的基本"
10071-100710410 = "除了執行夜間作戰或身體狀態特別差的時候之外，我每天都會在這個時間整理日誌……"
10071-100710420 = "接著再去進行晨跑或是做些輕鬆的體操伸展身體"
10071-100710430 = "都子真厲害……"
10071-100710440 = "呵呵。一開始可能會覺得麻煩，不過養成習慣之後就不算什麼了"
10071-100710450 = "現在如果早上沒運動的話，我反而還會覺得身體僵硬呢"

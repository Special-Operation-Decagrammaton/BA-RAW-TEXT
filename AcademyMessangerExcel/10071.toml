[translation]
10071-100710010 = "선생님. 혹시 오늘 시간 괜찮으신지요."
10071-100710020 = "점차 날씨도 더워지고, 곧 여름인지라."
10071-100710030 = "바뀐 계절에 맞추어 SRT의 작전에 지장이 없도록 장비를 점검하려 했습니다만……"
10071-100710040 = "확신하기 어려운 부분이 있어 상담을 부탁드리고 싶습니다."
10071-100710050 = "상담이라면 언제든지 괜찮아."
10071-100710060 = "흔쾌히 허락해 주셔서 감사합니다."
10071-100710070 = "그럼 곧 좌표를 보내 드리겠습니다."
10071-100710080 = "해당 랑데부 포인트에서 기다리고 있겠습니다."
10071-100710090 = "이번 작전을 수행하며 느낀 점인데……"
10071-100710100 = "역시 SRT의 훈련은 육상 훈련에 집중되어 있다 보니"
10071-100710110 = "해상에서는 사고가 일어났을 때 제대로 대처하지 못하는 것 같아요."
10071-100710120 = "미야코는 충분히 잘하고 있어"
10071-100710130 = "……감사합니다."
10071-100710140 = "하지만 제 미숙함은 스스로도 충분히 인지하고 있으니까요."
10071-100710150 = "그래서 드리는 말씀입니다만……"
10071-100710160 = "이번에 해상에서의 인질 구출 상황을 대비한 훈련을 하려 하는데"
10071-100710170 = "선생님께서 협력해 주실 수 없을까요?"
10071-100710180 = "응, 괜찮아."
10071-100710190 = "감사합니다, 선생님."
10071-100710200 = "그럼 마을 동편의 부둣가에서 기다리고 있겠습니다."
10071-100710210 = "선생님, 그거 들으셨나요?"
10071-100710220 = "마을의 서쪽 해안에 걸어서 이동할 수 있는 섬이 있다고 하네요."
10071-100710230 = "걸어서 이동할 수 있는 섬?"
10071-100710240 = "네. 서쪽 해안은 수심이 얕아서 썰물 때마다 바닥이 드러나는데"
10071-100710250 = "그때 도보로 이동할 수 있는 거리에 섬이 하나 있다고 해요"
10071-100710260 = "그거 신기하네"
10071-100710270 = "네. 게다가 섬의 경관도 좋아서 주민들도 휴일에는 종종 놀러 간다고 하네요"
10071-100710280 = "혹시 선생님께서도 괜찮으시다면"
10071-100710290 = "함께 그 섬에 가보지 않으시겠어요?"
10071-100710300 = "좋아"
10071-100710310 = "감사합니다, 선생님."
10071-100710320 = "그럼 내일 물 빠지는 때에 맞춰서 부둣가 앞에서 뵙겠습니다."
10071-100710330 = "여기는 RABBIT 1. RABBIT 소대 정기 현황 보고."
10071-100710340 = "현재 시각 0600시. 사고 및 작전으로 인한 결원 없음—"
10071-100710350 = "아"
10071-100710360 = "이른 아침부터 죄송합니다, 선생님."
10071-100710370 = "주소를 잘못 기입해서 RABBIT 소대의 정기 현황 보고가 선생님께 가고 말았네요……"
10071-100710380 = "괜찮아, 신경 쓰지 마."
10071-100710390 = "그보다 꽤 이른 시간에 일어났네."
10071-100710400 = "네, 규칙적인 생활은 특수부대의 기본 소양이니까요"
10071-100710410 = "특별히 야간 작전이 있거나 몸 상태가 나쁜 게 아니라면 매일 이 시간에 일어나 일지를 정리한답니다."
10071-100710420 = "그리고 그 이후에는 아침 구보를 하거나, 체조를 하며 몸을 가볍게 풀어 두지요"
10071-100710430 = "그렇게 부지런하다니, 대단하네"
10071-100710440 = "후후, 처음에는 조금 귀찮을 수도 있지만 습관이 되면 아무렇지도 않답니다."
10071-100710450 = "오히려 이제는 아침 운동을 하지 않으면 몸이 무겁게 느껴질 정도니까요"

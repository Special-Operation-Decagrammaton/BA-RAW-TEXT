13008-244 = "This time it's something kind of special!"
13008-245 = "Huh? Something special..."
13008-246 = "Another part-time job confirmed! Are you coming, Sensei?"
13008-247 = "I'll see you at the park on the next morning you have off!"
13008-248 = "Ugh. All right."
13008-249 = "I've been bending over all day. I feel like my back is about to break..."
13008-250 = "How's your back, Sensei? "
13008-251 = "I thought soaking in the bathtub might help."
13008-252 = "So, ewiks.xc,z"
13008-253 = "AAAAAAA"
13008-255 = "I almost dropped my phone in the tub!"
13008-256 = "Bringing my phone to the bath was probably a bad idea... "
13008-257 = "See you later, Sensei."
13008-258 = "Oh. Um..."
13008-259 = "Serika. I, uh..."
13008-260 = "Huh?"
13008-261 = "Ahhhhh! How did you get that photo? "
13008-262 = "D-Don't look! Don't look!"
13008-263 = "I'll kill you! I'm going to check your phone later!"
13008-264 = "Delete it! All right? "
13008-265 = "I'm gonna check it later!"
13008-266 = "I didn't see anything."
13008-267 = "I didn't see it. I deleted it. It's fine."
13008-268 = "Ayane said the Foreclosure Task Force has been receiving anonymous donations lately. "
13008-269 = "It's not a lot, but it's about the amount you'd expect from a day of part-time work."
13008-270 = "Maybe it's from a citizen who recognizes our accomplishments. Heeheehee."
13008-271 = "I'll see you at the usual place, Sensei!"
13008-272 = "This afternoon, downtown!"
13008-273 = "This time, Sensei, it's an assistant position for the night market! "
13008-274 = "Make sure you're prepared!"
13008-275 = "You got it."
13008-276 = "I'll expect to work all night."
13008-277 = "I'm so full. I ate so much today."
13008-278 = "It was a small town, but it was full of fun stuff."
13008-279 = "Well, I guess it was bigger than our town..."
13008-280 = "I spent half of my pay on food today... Well, I think it's okay to do that every once in a while. Heehee. "
13008-281 = "See you tomorrow, Sensei."
13008-282 = "I hope you don't get a stomachache."
13008-283 = "Sleep tight."
13008-284 = "Sensei, I got us a part-time job on the weekend. Be prepared."
13008-285 = "It's gonna be hard labor..."
13008-286 = "I can't stop shaking!"
13008-287 = "But I'm ready!"
13008-130080300 = "I've heard you're going to visit Abydos, Sensei."
13008-130080310 = "That's the plan."
13008-130080320 = "I'd better meet you when you get here. For your safety."
13008-130080330 = "You don't mind, right?"
13008-130080340 = "Even if you do mind, I'm doing it."
13008-130080350 = "I've got no choice in the matter, huh?"
13008-130080360 = "Well, I appreciate it. Thanks."
13008-130080370 = "This is really just a matter of your safety."
13008-130080380 = "We've had...troublemakers in our district lately...  "
13008-130080390 = "You've got to be careful."
13008-130080400 = "If anything happens, just hide behind me."

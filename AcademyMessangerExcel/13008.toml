[translation]
13008-234 = "老師！"
13008-235 = "老師！！！！"
13008-236 = "有時間嗎？有吧？？好！"
13008-237 = "咦，咦？"
13008-238 = "反正你也不忙吧？那就和我一起打工吧！"
13008-239 = "只要幫忙我就行了，OK？"
13008-240 = "那麼待會兒見！"
13008-241 = "那個……咦咦……？"
13008-242 = "茜香同學……？"
13008-243 = "老師，又有一份新的打工，所以在上次的地方碰面哦！"
13008-244 = "這次是稍微特殊的打工唷！"
13008-245 = "特殊的……？"
13008-246 = "下次的打工決定了唷！老師也會來吧？"
13008-247 = "下個休息日的上午，來公園吧！"
13008-248 = "了解～"
13008-249 = "嗚嗚，腰痛……"
13008-250 = "老師還好嗎？"
13008-251 = "我想泡個澡會好一點，現在"
13008-252 = "！＠＃％％＃＾＊"
13008-253 = "＠＃＃"
13008-255 = "好險，手機差點掉進浴缸裡……！！"
13008-256 = "洗澡的時候果然不能帶著手機……"
13008-257 = "我先把它放在外頭並洗個澡，回頭見唷"
13008-258 = "那個……"
13008-259 = "茜香，照片……"
13008-260 = "照片？"
13008-261 = "哇啊啊啊啊啊啊！？為什麼會拍到這個！？"
13008-262 = "別，別看！不准看！"
13008-263 = "看了就殺了你！！！！！！！！！！"
13008-264 = "沒有儲存對吧！？刪除！！明白了嗎！？"
13008-265 = "我之後會檢查有沒有刪掉哦！！！"
13008-266 = "沒有看……"
13008-267 = "是，刪除了"
13008-268 = "我聽綾音說，對策委員會收到了匿名捐款"
13008-269 = "雖然金額不多，但好像有到打工一天的金額"
13008-270 = "是不是來自於關心我們的市民呢，嘿嘿"
13008-271 = "啊，這次也在老地方見吧，老師！"
13008-272 = "下午見！"
13008-273 = "老師，這次是在夜市打工唷！"
13008-274 = "也許會一路做到深夜，做好覺悟吧！"
13008-275 = "知道了，茜香！"
13008-276 = "可能要通宵嗎，了解"
13008-277 = "肚子好飽啊，可能吃得有點多"
13008-278 = "雖然是個小街區，但有很多有趣的東西呢"
13008-279 = "嘛，雖然說它小，但還是比我們的大……"
13008-280 = "結果花了幾乎一半的打工薪水，但偶爾這樣也不錯吧？"
13008-281 = "那就明天見囉，老師。辛苦了"
13008-282 = "最好不要馬上躺下，好好休息吧"
13008-283 = "嗯，辛苦了。回頭見"
13008-284 = "老師。這次休息日的打工，做好覺悟吧"
13008-285 = "好像是非常辛苦的體力勞動……"
13008-286 = "渾身顫抖……"
13008-287 = "OK，我會做好覺悟的"
13008-130080300 = "聽說你今天要來阿拜多斯自治區是嗎，老師"
13008-130080310 = "嗯，沒錯哦"
13008-130080320 = "為了保護老師的安全，我打算去接你"
13008-130080330 = "可以吧？"
13008-130080340 = "啊，如果你說「沒關係」我會當成「來也沒關係」的哦"
13008-130080350 = "我沒有拒絕的權利嗎……"
13008-130080360 = "不過你能這麼說我很高興。謝謝你"
13008-130080370 = "不，這也是安全上的問題"
13008-130080380 = "最近我們自治區……來了一些煩人的傢伙  "
13008-130080390 = "總之這次還是小心為妙"
13008-130080400 = "覺得不對勁就躲到我身後吧"

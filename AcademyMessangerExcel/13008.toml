[translation]
13008-234 = "Sensei! "
13008-235 = "Senseeeiii!"
13008-236 = "Do you have time? You do, right?"
13008-237 = "Um... Huh?"
13008-238 = "You don't have a lot going on, right? So do some part-time work with me! "
13008-239 = "I just need someone to assist me. Is that cool with you?"
13008-240 = "Then I'll see you soon!"
13008-241 = "Huh? Excuse me?"
13008-242 = "Serika?"

[translation]
13008-234 = "คุณครู! "
13008-235 = "คุณณณครู!!"
13008-236 = "พอมีเวลาไหม???  มีใช่ไหม?"
13008-237 = "อืม... เอ๊ะ?"
13008-238 = "ไหนๆ  ก็ไม่อะไรทำอยู่แล้ว ไปทำงาน\nพิเศษกับฉันดีกว่า! "
13008-239 = "แค่ไปช่วยฉันนิดหน่อยก็พอ เอาเป็นว่า\nตกลงนะ?"
13008-240 = "งั้นเดี๋ยวเจอกัน!"
13008-241 = "...หือ? ว่ายังไงนะ?"
13008-242 = "เซริกะ? "
13008-243 = "คุณครู ฉันมีงานเข้ามาล่ะ ไปเจอกันที่นั่น\nไหม? "
13008-244 = "งานครั้งนี้ค่อนข้างพิเศษเลย!"
13008-245 = "หืม? งานที่พิเศษเหรอ...?"
13008-246 = "ฉันเลือกงานพิเศษไว้แล้ว! คุณครูก็จะ\nมาด้วยใช่ไหม?"
13008-247 = "เจอกันตอนเช้าของวันหยุดที่สวนสาธา\nรณะนะ!"
13008-248 = "กะ.. ก็ได้"
13008-249 = "ก้มๆ เงยๆ ทั้งวันจนปวดเอวไปหมด..."
13008-250 = "คุณครูไม่ปวดเอวเหรอ? "
13008-251 = "อยากไปแช่ตัวในอ่างอาบน้ำให้หายปวด\nจัง"
13008-252 = "ไม่นะะะะ"
13008-253 = "เฮ่อออ!"
13008-255 = "เกือบทำโทรศัพท์ตกไปในอ่างอาบน้ำ\nแล้ว!!"
13008-256 = "ไม่ควรเอาโทรศัพท์มาเล่นตอนอาบน้ำ\nจริงๆ ด้วย... "
13008-257 = "คุณครู ไว้เจอกันนะ"
13008-258 = "เอ่อ... คือ..."
13008-259 = "เซริกะ... แบบว่า..."
13008-260 = "หืม?"
13008-261 = "อ๊าาาา?!\nทำไมรูปนั้นถึงถูกส่งไปได้ล่ะ?"
13008-262 = "ยะ...อย่ามองนะ! ห้ามดูนะ!"
13008-263 = "ถ้าเจอกันละก็.. โดนแน่!!!!!!!"
13008-264 = "ลบไปเลย!! เข้าใจไหม? "
13008-265 = "แล้วฉันจะไปเช็กดู!"
13008-266 = "ครูไม่เห็นอะไรเลย..."
13008-267 = "ยังไม่ได้ดูเลย ครูลบไปแล้ว ลบแล้ว"
13008-268 = "อายาเนะจังบอกว่ามีคนนิรนามมาบริจาค\nเงินให้คณะกรรมการแผนงานด้วย "
13008-269 = "จำนวนเงินเท่าๆ กับค่าทำงานพิเศษวัน\nหนึ่ง แต่บริจาคเข้ามาเรื่อยๆ เลย"
13008-270 = "นี่ต้องมาจากประชาชนที่เห็นผลงานการ\nทำงานของพวกเราแน่ ฮิฮิฮิ"
13008-271 = "ครั้งนี้ก็ไปเจอกันที่เดิมนะคุณครู!"
13008-272 = "ในเมืองตอนเย็น!"
13008-273 = "คุณครู ครั้งนี้เราต้องทำงานในตลาดโต้รุ่ง\nและต้องทำยาวถึงดึกเลยด้วย! "
13008-274 = "เตรียมตัวให้ดีล่ะ!"
13008-275 = "รับทราบขอรับบอส"
13008-276 = "ต้องเตรียมตัวโต้รุ่งแล้วสิ"
13008-277 = "ท้องจะแตกแล้ว วันนี้ฉันกินไปเยอะมาก\nเลยล่ะ"
13008-278 = "นี่เป็นเมืองเล็กๆ แต่มีอะไรสนุกๆ อยู่\nเพียบเลย"
13008-279 = "แต่ยังไงก็ใหญ่กว่าเมืองของเราอยู่ดี..."
13008-280 = "เงินค่าจ้างวันนี้ครึ่งหนึ่งหมดไปกับของกิน\nแล้ว... แต่นานๆ ทีได้สนุกแบบนี้ก็ไม่เป็น\nไรหรอกเนอะ? ฮุฮุ"
13008-281 = "แล้วเจอกันพรุ่งนี้นะคุณครู"
13008-282 = "ระวังท้องเสียด้วยล่ะ"
13008-283 = "กลับไปพักผ่อนด้วยนะ"
13008-284 = "คุณครู เตรียมตัวให้พร้อมสำหรับงานพิ\nเศษวันหยุดนี้ด้วยล่ะ"
13008-285 = "ครั้งนี้เป็นงานใช้แรงงานซะด้วย..."
13008-286 = "ว่าไงนะ?"
13008-287 = "จะเตรียมตัวเป็นอย่างดีเลย!"
13008-130080300 = "คุณครู วันนี้จะมาที่เขตปกครอง\nอะบิดอสเหรอ?"
13008-130080310 = "อื้อ ใช่แล้วละ"
13008-130080320 = "ถ้างั้น... เดี๋ยวฉันออกไปรับคุณครูดีกว่า\nจะได้แน่ใจว่าปลอดภัย"
13008-130080330 = "แบบนี้โอเคไหม?"
13008-130080340 = "เอาเป็นว่าโอเคก็แล้วกันนะ"
13008-130080350 = "ถามเองตอบเองก็เป็นนะ..."
13008-130080360 = "แต่ยังไงก็ขอบคุณนะ"
13008-130080370 = "ก็นะ เพราะมันมีปัญหาเรื่องความ\nปลอดภัยด้วยแหละนะ"
13008-130080380 = "ช่วงนี้... มันมีพวกที่ชอบก่อความวุ่นวาย\nเข้ามาป้วนเปี้ยนในเขตของเราน่ะ...   "
13008-130080390 = "ยังไงก็เถอะ คราวนี้ก็ระวังตัวด้วยล่ะ"
13008-130080400 = "ถ้าเกิดอะไรขึ้นก็หลบอยู่ข้างหลังฉัน\nก็แล้วกัน"

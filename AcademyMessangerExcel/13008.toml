[translation]
13008-234 = "선생님!"
13008-235 = "선새애애앵님!!"
13008-236 = "시간 있어??? 있지?"
13008-237 = "어…… 어?"
13008-238 = "어차피? 한가하잖아? 그럼 나랑 알바 같이 하자!"
13008-239 = "내가 하는 거 보조만 하면 돼. 하는 거다?"
13008-240 = "그럼 조금 이따가 봐!"
13008-241 = "……네? 저기요?"
13008-242 = "세리카 씨?"
13008-243 = "선생님. 이번에도 알바가 들어왔어. 거기서 볼까?"
13008-244 = "이번엔 좀 특별한 일이야!"
13008-245 = "응? 특별한 일……?"
13008-246 = "이번 알바가 정해졌어! 선생님도 올 거지?"
13008-247 = "휴일 오전에 공원에서 봐!"
13008-248 = "으…… 알았어."
13008-249 = "하루종일 고개를 숙이고 있었더니 허리가 부러질 거 같아……."
13008-250 = "선생님은 허리 안 아파?"
13008-251 = "욕조에 좀 담구고 있으면 괜찮을까 해서 지금"
13008-252 = "ㅇㅁㄴㅓㅎㅎㅎㅣㅏ"
13008-253 = "ㅏㅏㅏ"
13008-255 = "우, 우아아 폰을 욕조에 떨어트릴 뻔했어!!"
13008-256 = "역시 목욕할 때 폰을 가지고 오면 안 돼……."
13008-257 = "선생님. 그럼 다음에 봐."
13008-258 = "어…… 저기……."
13008-259 = "세리카…… 그러니까……."
13008-260 = "응?"
13008-261 = "으아아아아아아?! 저게 왜 찍혔어?"
13008-262 = "보, 보지 마! 보지마!"
13008-263 = "나중에 검사할 거야? 죽인다??????"
13008-264 = "지워!! 알았지?"
13008-265 = "나중에 검사할 거야??"
13008-266 = "저는 아무 것도 보지 않았습니다……."
13008-267 = "못 봤어요. 지웠습니다. 네."
13008-268 = "아야네 쨩이 그러는데 요즘 대책위원회 앞으로 익명 기부가 들어온대."
13008-269 = "금액이 많은 건 아닌데 하루 알바 일당 정도의 돈이 가끔씩 들어오나 봐."
13008-270 = "역시 우리의 활약을 좋게 봐준 시민들의 기부금인가. 헤헤헤."
13008-271 = "이번에도 거기서 봐, 선생님!"
13008-272 = "오후에 시내에서!"
13008-273 = "선생님. 이번엔 밤늦게까지 이어지는 야시장 보조야!"
13008-274 = "각오 단단히 해두라고!"
13008-275 = "알겠습니다. 보스."
13008-276 = "밤샘을 각오해야겠네."
13008-277 = "엄청 배불러. 오늘 장난 아니게 먹었어."
13008-278 = "작은 마을인데도 재미있는 게 꽤 많더라."
13008-279 = "뭐, 그래도 우리 마을보단 크지만……."
13008-280 = "오늘 알바비 절반을 먹는데 써버렸지만……. 뭐, 가끔은 이런 것도 괜찮지 않겠어? 후후."
13008-281 = "그럼 내일 봐, 선생님."
13008-282 = "배탈 나지 않게 조심해."
13008-283 = "푹 쉬어."
13008-284 = "선생님. 이번엔 모처럼의 휴일 알바, 각오해야 해."
13008-285 = "엄청 하드한 육체노동이니까……."
13008-286 = "덜덜덜?"
13008-287 = "각오하고 있습니다!"
13008-130080300 = "오늘 아비도스 자치구에 온다고 들었어. 선생님."
13008-130080310 = "응. 그렇게 됐지."
13008-130080320 = "그래서, 선생님의 안전을 위해 내가 마중 나갈 생각인데."
13008-130080330 = "괜찮지?"
13008-130080340 = "괜찮지 않다고 해도 괜찮다는 뜻으로 받아들이겠어."
13008-130080350 = "결과는 이미 정해져 있는 것인가……"
13008-130080360 = "그래도 반가운 말이네. 고마워."
13008-130080370 = "아니, 이건 안전상의 문제이기도 해서 말이야."
13008-130080380 = "최근 우리 자치구에…… 조금, 시끄러운 녀석들이 돌아다니고 있거든.  "
13008-130080390 = "아무튼 이번만은 조심해."
13008-130080400 = "여차하면 내 뒤로 숨고."

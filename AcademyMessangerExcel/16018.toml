[translation]
16018-160180010 = "不好意思"
16018-160180020 = "請問您是夏萊的老師嗎？"
16018-160180030 = "咦？是我沒錯……"
16018-160180040 = "良舞？"
16018-160180050 = "什麼嘛，果然沒錯啊。我還以為是存錯聯絡人了呢"
16018-160180060 = "有禮貌的良舞……真新鮮！"
16018-160180070 = "我要截圖保存下來！"
16018-160180080 = "什麼？？"
16018-160180090 = "我看起來有那麼沒禮貌嗎？"
16018-160180100 = "至少還有基本的禮儀吧！！"
16018-160180110 = "算了"
16018-160180120 = "我剛好路過夏萊，突然想到之前在MomoTalk存的聯絡人"
16018-160180130 = "所以才想說要做個確認，隨便聯絡看看"
16018-160180140 = "雖然老師可能很忙或正好不在，不過我還是想試試看"
16018-160180150 = "那麼下次──"
16018-160180160 = "現在從玄關跑過來的人是老師嗎？"
16018-160180170 = "喂不是先等"
16018-160180180 = "第一次進到夏萊，感覺還真神奇"
16018-160180190 = "託你的福，見識到了不少好東西"
16018-160180200 = "這不算什麼！"
16018-160180210 = "真是不可思議，沒想到會跟老師變熟啊"
16018-160180220 = "……"
16018-160180230 = "不，說熟好像有點太誇張了吧"
16018-160180240 = "總之，我今天玩得很開心"
16018-160180250 = "希望良舞每天都能來玩！"
16018-160180260 = "隨時都可以來找我哦！"
16018-160180270 = "你還真會說好聽話"
16018-160180280 = "嗯……？"
16018-160180290 = "是真的嗎？"
16018-160180300 = "老師，現在有空嗎？"
16018-160180310 = "啊，如果在忙的話就算了"
16018-160180320 = "嗨，良舞"
16018-160180330 = "怎麼了嗎？"
16018-160180340 = "哦，今天還挺冷靜的嘛"
16018-160180350 = "其實也沒什麼，只是剛才路過的時候看到老師"
16018-160180360 = "看起來有點累的樣子，最近有好好睡──"
16018-160180370 = "又跑過來了嗎！？！？"
16018-160180380 = "老師"
16018-160180390 = "你每次都這樣嗎？"
16018-160180400 = "不是在開玩笑？"
16018-160180410 = "不是！"
16018-160180420 = "我一直都是這麼想的！"
16018-160180430 = "算了，不說這些了"
16018-160180440 = "在我家的孩子們面前可別說這種話哦！"
16018-160180450 = "啊"
16018-160180460 = "當然在其他人面前也別說！"
16018-160180470 = "等等，剛才那句話"
16018-160180480 = "不是要你不能對其他孩子說這種話的意思！"
16018-160180490 = "算了！不說了啦！！！"
16018-160180500 = "老師，我是良舞"
16018-160180510 = "不管你現在在哪，應該不會又朝我跑過來吧？"
16018-160180520 = "我已經開跑了……"
16018-160180530 = "你真的是笨蛋嗎？"
16018-160180540 = "先不說這個，其實我在黑市找到了好東西"
16018-160180550 = "不是危險的東西，真的很有幫助"
16018-160180560 = "想說也許能幫到老師，所以才跟你說一聲"
16018-160180570 = "？"
16018-160180580 = "又要跑過來嗎？"
16018-160180590 = "不是吧？"
16018-160180600 = "老師？？"
16018-160180610 = "老師"
16018-160180620 = "那台販賣機好像怪怪的"
16018-160180630 = "我買的明明是蘋果汁"
16018-160180640 = "結果喝起來卻有鳳梨的味道……"
16018-160180650 = "是不是壞掉了啊？老師沒事吧？"
16018-160180660 = "有沒有喝壞肚子？"
16018-160180670 = "我的鳳梨汁喝起來是蘋果的味道耶"
16018-160180680 = "是嗎？真奇怪"
16018-160180690 = "啊"
16018-160180700 = "老師，現在有空嗎？"
16018-160180710 = "沒空也出來一下吧！"
16018-160180720 = "咦？怎麼了嗎？"
16018-160180730 = "沒怎麼不怎麼的，只是邀你一起散步"
16018-160180740 = "我剛好路過附近就突然想到"
16018-160180750 = "啊，你該不會很忙吧？"
16018-160180760 = "如果真的在忙就不用勉強，剛才那句只是開開玩笑而已"
16018-160180770 = "剛才的工作全都消失了"
16018-160180780 = "我把今天要處理的文件全部吃掉了"
16018-160180790 = "老師，你真的是大人嗎！？"
16018-160180800 = "所以現在真的能出來嗎？"
16018-160180810 = "那……我在樓下等你？"
16018-160180820 = "別用跑的！！慢慢走過來！！"
16018-160180830 = "不是吧，又跑過來了"
16018-160180840 = "我查過了哦！？"
16018-160180850 = "那不是下水道，是雨水管！！"
16018-160180860 = "雨水！是雨水聚集的地方！！"
16018-160180870 = "不是髒水！！"
16018-160180880 = "我又沒說什麼……"
16018-160180890 = "難得做了件好事，不要掃興啦！！"
16018-160180900 = "做好事的良舞超帥的哦！"
16018-160180910 = "要是你真的介意的話，我也可以跳進下水道嘩啦嘩啦哦！"
16018-160180920 = "別把神聖的嘩啦嘩啦用在這種地方啦！！"
16018-160180930 = "而且就跟你說那不是下水道了！"
16018-160180940 = "不過謝謝你說我帥氣！"
16018-160180950 = "……"
16018-160180960 = "啊，今天看到的事不能跟其他孩子們說哦？"
16018-160180970 = "知道了嗎！？"

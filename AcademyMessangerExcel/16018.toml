[translation]
16018-160180010 = "실례합니다."
16018-160180020 = "혹시, 샬레의 선생님 맞으실까요?"
16018-160180030 = "네? 맞는데요……."
16018-160180040 = "라브니?"
16018-160180050 = "뭐야, 맞았네. 혹시나 다른 사람 연락처인가 해서."
16018-160180060 = "공손한 라브……. 신선해!"
16018-160180070 = "스크린샷 찍어서 보관할래!"
16018-160180080 = "뭐야??"
16018-160180090 = "내가 그렇게 버릇없어 보여?"
16018-160180100 = "최소한의 예의는 있다고!!"
16018-160180110 = "아무튼."
16018-160180120 = "마침 샬레 앞을 지나가는데, 모모톡 저장해둔 게 생각났어."
16018-160180130 = "그래서 그냥 한번 확인차 연락해 봤어."
16018-160180140 = "선생은 바빠서 없을 수도 있겠지만, 생각이 나더라구."
16018-160180150 = "그럼 나중"
16018-160180160 = "지금 현관에서 달려오는 거, 선생이야?"
16018-160180170 = "아니 잠ㄲ"
16018-160180180 = "샬레, 처음 들어가 봤는데 신기했어."
16018-160180190 = "덕분에 좋은 구경했어."
16018-160180200 = "뭘 그런 거 가지고!"
16018-160180210 = "신기하네, 선생하고 친해질 거라곤 생각 못 했는데."
16018-160180220 = "……."
16018-160180230 = "아니, 친하단 말은 좀 호들갑인가."
16018-160180240 = "어쨌건, 오늘 즐거웠어."
16018-160180250 = "라브가 매일 놀러 오면 좋겠어!"
16018-160180260 = "언제든지 찾아와!"
16018-160180270 = "그런 속 좋은 말을 잘도 하네."
16018-160180280 = "음,"
16018-160180290 = "진짜지?"
16018-160180300 = "선생, 시간 괜찮아?"
16018-160180310 = "아, 바쁘면 어쩔 수 없구."
16018-160180320 = "라브, 안녕."
16018-160180330 = "무슨 일이니?"
16018-160180340 = "뭐야, 오늘은 좀 차분하네."
16018-160180350 = "별건 아니고, 지금 지나가는데 선생님이 보였어서."
16018-160180360 = "좀 피곤해 보이던데, 요새 잠은 잘ㄹ"
16018-160180370 = "또 달려오는 거야?!!!"
16018-160180380 = "선생."
16018-160180390 = "맨날 그런 식이야?"
16018-160180400 = "장난으로 그런 말 하는 건 아니지?"
16018-160180410 = "장난 아니야!"
16018-160180420 = "항상 그렇게 생각하는걸?"
16018-160180430 = "말을 말자 진짜."
16018-160180440 = "우리 애들 앞에서는 그런 말 하지 마!"
16018-160180450 = "아"
16018-160180460 = "다른 사람들 앞에서는 당연히 하지 말고!"
16018-160180470 = "아니 그러니까 내 말은"
16018-160180480 = "다른 애들한테 그런 말 하지 말란 게 아니라!"
16018-160180490 = "됐어!!!"
16018-160180500 = "선생. 나 라브인데."
16018-160180510 = "지금 어디든지 간에 뛰어오는 거 아니지?"
16018-160180520 = "일단 뛰었는데……."
16018-160180530 = "진짜 바보야?"
16018-160180540 = "다른 게 아니고, 블랙마켓에서 좋은 걸 찾았거든."
16018-160180550 = "위험한 그런 거 아니고, 진짜 유용한 거야."
16018-160180560 = "선생한테 혹시 도움 될까 해서 알려주려고 하는데,"
16018-160180570 = "?"
16018-160180580 = "또 뛰어오는 거야?"
16018-160180590 = "아니지?"
16018-160180600 = "선생??"
16018-160180610 = "선생."
16018-160180620 = "그 자판기 이상한가 봐."
16018-160180630 = "난 분명 사과주스를 뽑았는데,"
16018-160180640 = "파인애플 같은 맛이 나네……."
16018-160180650 = "상했나? 선생은 괜찮아?"
16018-160180660 = "배탈 안 났어?"
16018-160180670 = "그러게, 내 파인애플주스는 사과 맛이 나던데."
16018-160180680 = "그래? 이상하네."
16018-160180690 = "아."
16018-160180700 = "선생, 지금 한가해?"
16018-160180710 = "한가하지 않아도 나와!"
16018-160180720 = "엥? 왜?"
16018-160180730 = "왜냐니, 그냥 산책 좀 같이하자는 건데."
16018-160180740 = "마침 근처 지나고 있어서 생각났거든."
16018-160180750 = "아, 설마 바빠?"
16018-160180760 = "진짜 바쁘면 안 나와도 돼, 위에 말은 농담이야."
16018-160180770 = "방금 일 다 없어졌어."
16018-160180780 = "오늘 처리할 서류, 다 먹어버렸어."
16018-160180790 = "선생, 어른 맞아?!"
16018-160180800 = "그러면 진짜 나올 수 있는 거야?"
16018-160180810 = "어…… 밑에서 기다린다?"
16018-160180820 = "뛰지 마!! 걸어서 와!!"
16018-160180830 = "아니 또 뛰어오네"
16018-160180840 = "검색해 봤거든?!"
16018-160180850 = "하수도가 아니라 우수관이라잖아!!"
16018-160180860 = "빗물! 빗물이 모인 거라잖아!!"
16018-160180870 = "더러운 물 아니야!!"
16018-160180880 = "아니 난 딱히 뭐라 하진 않았는데……."
16018-160180890 = "기왕 좋은 일 했는데 김새게 진짜!!"
16018-160180900 = "좋은 일 하는 라브는 엄청 멋있었어!"
16018-160180910 = "정 신경 쓰이면 나도 하수도에 퐁당, 하고 들어갈게!"
16018-160180920 = "신성한 퐁당을 그런데 쓰지 마!!"
16018-160180930 = "그리고, 하수도 아니라니까!"
16018-160180940 = "멋있다는 건 고마운데!"
16018-160180950 = "……."
16018-160180960 = "아, 그렇다고 다른 애들한테 오늘 본 거 말하면 안 된다?"
16018-160180970 = "알겠지?!"

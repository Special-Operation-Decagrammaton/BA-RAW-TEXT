[translation]
16018-160180010 = "ขอโทษนะคะ"
16018-160180020 = "นั่นใช่คุณครูของชาเล่ต์หรือเปล่าคะ?"
16018-160180030 = "ใช่นะ? ครูเอง..."
16018-160180040 = "ราบุเหรอ?"
16018-160180050 = "อะไรกัน ใช่จริงๆ ด้วย ที่ถามเพราะคิด\nว่าเป็นแชตของคนอื่นน่ะ"
16018-160180060 = "ราบุเวอร์ชันพูดเพราะ...\nไม่เคยเจอมาก่อนเลย!"
16018-160180070 = "แคปหน้าจอไว้ดูดีกว่า!"
16018-160180080 = "อะไรน่ะ??"
16018-160180090 = "ฉันดูเป็นเด็กนิสัยเสียขนาดนั้นเลย\nงั้นเหรอ?"
16018-160180100 = "อย่างน้อยฉันก็มีมารยาทขั้นพื้นฐาน\nอยู่นะ!!"
16018-160180110 = "เอาเถอะ"
16018-160180120 = "ฉันเดินผ่านชาเล่ต์พอดี ก็เลยนึกถึง\nMOMOTALK ที่เคยแอดไว้"
16018-160180130 = "ก็เลยลองส่งข้อความมาหาน่ะ"
16018-160180140 = "แล้วก็คิดว่าครูอาจจะงานยุ่งและไม่อยู่\nที่ชาเล่ต์ด้วย"
16018-160180150 = "งั้นเอาไว้คราวหน้า"
16018-160180160 = "คนที่วิ่งออกมาจากประตูหน้าตอนนี้คือ\nครูเหรอ?"
16018-160180170 = "เอางี้เลยเหรอ เดี๋ยวสิ"
16018-160180180 = "ชาเล่ต์เป็นที่ที่น่าทึ่งจังเลยนะ"
16018-160180190 = "เป็นการไปครั้งแรกที่ได้ประสบการณ์ดี\nเลยละ"
16018-160180200 = "ไม่ได้มีอะไรพิเศษขนาดนั้นหรอก!"
16018-160180210 = "น่าทึ่งจังเลยนะ ฉันไม่คิดมาก่อนเลยว่า\nจะได้สนิทกับครู"
16018-160180220 = "..."
16018-160180230 = "ไม่สิ ใช้คำว่าสนิทก็ดูจะเกินไปหน่อย"
16018-160180240 = "เอาเป็นว่าวันนี้ฉันสนุกมากเลย"
16018-160180250 = "อยากให้ราบุแวะมาหาทุกวันจัง!"
16018-160180260 = "มาเที่ยวเล่นได้ตลอดเลยนะ!"
16018-160180270 = "หยอดเก่งจังเลยนะ"
16018-160180280 = "อืม"
16018-160180290 = "แต่พูดจริงใช่มั้ย?"
16018-160180300 = "ครู พอมีเวลาหรือเปล่า?"
16018-160180310 = "แต่ถ้ากำลังยุ่งก็ไม่เป็นไรนะ"
16018-160180320 = "สวัสดี ราบุ"
16018-160180330 = "มีธุระอะไรเหรอ?"
16018-160180340 = "อะไรเนี่ย วันนี้ดูสุขุมจัง"
16018-160180350 = "ไม่มีอะไรมากหรอก ฉันแค่เพิ่งเห็นครู\nเดินผ่านไปน่ะ"
16018-160180360 = "แล้วก็ดูเหนื่อยๆ ด้วย ได้นอนพอ..."
16018-160180370 = "นี่ครูวิ่งมาหาฉันอีกแล้วเหรอ?!!!"
16018-160180380 = "ครู"
16018-160180390 = "จะเอาอย่างนี้ตลอดเลยเหรอ?"
16018-160180400 = "ไม่ได้พูดล้อเล่นใช่มั้ย?"
16018-160180410 = "ไม่ได้ล้อเล่นนะ!"
16018-160180420 = "ครูคิดแบบนั้นตลอดเลยต่างหาก"
16018-160180430 = "รู้จักพูดจริงๆ เลย"
16018-160180440 = "อย่าพูดอะไรแบบนั้นต่อหน้าแก๊ง\nหมวกกันน็อกของฉันนะ!"
16018-160180450 = "อ่า"
16018-160180460 = "ต่อหน้าคนอื่นยิ่งต้องห้ามพูดเลย!"
16018-160180470 = "เอ่อ ไม่ใช่ว่าฉันจะ"
16018-160180480 = "ห้ามครูไปพูดอะไรแบบนั้นกับ\nเด็กคนอื่นหรอกนะ!"
16018-160180490 = "ช่างเถอะ!!!"
16018-160180500 = "ครู นี่ราบุนะ"
16018-160180510 = "ไม่ได้กำลังวิ่งออกมารับฉันใช่มั้ย?"
16018-160180520 = "ก็วิ่งออกมาแล้วนะ..."
16018-160180530 = "เชื่อเขาเลย!"
16018-160180540 = "ฉันเจออะไรดีๆ ในตลาดมืดมาน่ะ"
16018-160180550 = "ไม่ใช่ของอันตรายหรอก มันเป็นของ\nที่มีประโยชน์มากๆ ต่างหาก"
16018-160180560 = "แล้วที่มาบอกก็เพราะคิดว่ามันจะเป็น\nประโยชน์กับครูด้วย"
16018-160180570 = "?"
16018-160180580 = "วิ่งออกมาอีกแล้วเหรอ?"
16018-160180590 = "ไม่ใช่ใช่มั้ย?"
16018-160180600 = "ครู??"
16018-160180610 = "ครู"
16018-160180620 = "ตู้ขายสินค้ามันแปลกๆ นะ"
16018-160180630 = "ฉันกดน้ำแอปเปิลแท้ๆ"
16018-160180640 = "แต่รสชาติมันออกมาเหมือนสับปะรด\nเฉยเลย..."
16018-160180650 = "หรือว่ารสเปลี่ยนเพราะเสียนะ?\nแล้วครูโอเคหรือเปล่า?"
16018-160180660 = "ท้องเสียมั้ย?"
16018-160180670 = "จะว่าไป น้ำสับปะรดของครู\nรสชาติเหมือนแอปเปิลเลย"
16018-160180680 = "งั้นเหรอ? แปลกจัง"
16018-160180690 = "อ่า"
16018-160180700 = "ตอนนี้ครูว่างมั้ย?"
16018-160180710 = "ต่อให้ไม่ว่าง ก็ออกมาเถอะ!"
16018-160180720 = "หืม? ทำไมเหรอ?"
16018-160180730 = "ทำไมน่ะเหรอ ฉันแค่อยากชวนไป\nเดินเล่นน่ะ"
16018-160180740 = "ฉันบังเอิญผ่านมาแถวนี้พอดี\nก็เลยนึกถึงขึ้นมาน่ะ"
16018-160180750 = "อ่า หรือว่าไม่ว่างจริงๆ?"
16018-160180760 = "ถ้างานยุ่งก็ไม่ต้องออกมาก็ได้\nเมื่อกี้ฉันแค่พูดเล่นน่ะ"
16018-160180770 = "ไม่เหลืองานให้ทำแล้วละ"
16018-160180780 = "งานของวันนี้ ครูเทหมดละ"
16018-160180790 = "นี่ครูเป็นผู้ใหญ่จริงมั้ยเนี่ย?!"
16018-160180800 = "งั้นก็แปลว่าออกมาหากันได้จริงเหรอ?"
16018-160180810 = "อืม... งั้นฉันจะรอข้างล่างนะ"
16018-160180820 = "ไม่ต้องวิ่งล่ะ!! ค่อยๆ เดินมา!!"
16018-160180830 = "อะไรกัน วิ่งออกมาอีกแล้ว"
16018-160180840 = "ฉันไปลองค้นมาแล้วละนะ!"
16018-160180850 = "มันไม่ใช่ท่อระบายน้ำเสีย แต่ว่าเป็น\nท่อระบายน้ำฝนต่างหาก!!"
16018-160180860 = "น้ำฝน! มันเป็นท่อน้ำฝน!!"
16018-160180870 = "ไม่ใช่น้ำสกปรกสักหน่อย!!"
16018-160180880 = "ครูก็ไม่ได้ว่าอะไรเลยนะ..."
16018-160180890 = "ได้ทำเรื่องดีๆ มาแท้ๆ ดันมาทำให้\nหมดสนุกเฉยเลย!!"
16018-160180900 = "ราบุที่ทำเรื่องดีๆ น่ะเจ๋งมากเลยนะ!"
16018-160180910 = "เอาไว้ครูก็จะโดดป๋อมแป๋มลง\nท่อระบายน้ำเสียด้วยคนนะ!"
16018-160180920 = "อย่าเอาคำว่าป๋อมแป๋มที่ศักดิ์สิทธิ์ไป\nใช้แบบนั้นนะ!!"
16018-160180930 = "แล้วฉันก็บอกอยู่นี่ไงว่าไม่ใช่ท่อระบาย\nน้ำเสีย!"
16018-160180940 = "แต่ก็ขอบคุณที่บอกว่าเจ๋งนะ!"
16018-160180950 = "..."
16018-160180960 = "อ่า แล้วก็อย่าไปเล่าเรื่องที่เห็นวันนี้\nให้เด็กคนอื่นฟังล่ะ"
16018-160180970 = "เข้าใจมั้ย?!"
